<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>UPSET</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#0e0e1a; overflow:hidden; font-family:monospace; color:#fff; }
canvas { display:block; image-rendering:pixelated; }
#ui { position:fixed; top:0; left:0; width:100vw; height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; background:#1a1a2e; z-index:10; }
#ui.hidden { display:none; }
.grid-bg { position:absolute; inset:0; background:repeating-linear-gradient(0deg,transparent,transparent 39px,rgba(255,255,255,0.02) 39px,rgba(255,255,255,0.02) 40px); pointer-events:none; }
.title { font-size:min(14vw,110px); font-weight:bold; letter-spacing:12px; color:#ff4466; text-shadow:0 0 40px rgba(255,68,102,0.5); z-index:1; }
.sub { font-size:min(3vw,15px); color:#888; margin-top:6px; letter-spacing:3px; z-index:1; }
.btn { background:none; border:2px solid #ff4466; color:#ff4466; padding:12px 44px; font-size:min(3vw,18px); font-family:monospace; cursor:pointer; letter-spacing:4px; margin-top:36px; z-index:1; transition:all 0.2s; }
.btn:hover { background:#ff4466; color:#1a1a2e; }
.btn-w { border-color:#fff; color:#fff; }
.btn-w:hover { background:#fff; color:#1a1a2e; }
.controls { margin-top:32px; font-size:min(2.2vw,12px); color:#555; text-align:center; line-height:2.2; z-index:1; }
.controls span { color:#666; }
.gp-status { margin-top:16px; font-size:min(2vw,11px); z-index:1; }
.card-row { display:flex; gap:min(1.5vw,10px); margin-top:16px; flex-wrap:nowrap; justify-content:center; align-items:flex-end; padding:0 10px; z-index:1; }
.card { background:#0d0d1a; border-radius:10px; width:min(17vw,135px); height:min(30vw,240px); cursor:pointer; display:flex; flex-direction:column; overflow:hidden; transition:all 0.25s; color:#fff; font-family:monospace; position:relative; border:2px solid #333; flex-shrink:0; }
.card.sel { transform:translateY(-12px) scale(1.12); z-index:2; }
.card-art { height:min(16vw,90px); display:flex; align-items:center; justify-content:center; position:relative; overflow:hidden; }
.card-art-icon { font-size:min(9vw,44px); z-index:1; filter:drop-shadow(0 0 12px rgba(255,255,255,0.3)); }
.card-picker { display:flex; flex-direction:column; align-items:center; justify-content:flex-end; width:min(12vw,80px); flex-shrink:0; padding:0 6px; z-index:1; }
.card-picker-body { width:30px; height:50px; border-radius:12px 12px 6px 6px; position:relative; }
.card-picker-head { width:28px; height:28px; border-radius:50%; margin-bottom:-4px; position:relative; }
.card-picker-eyes { position:absolute; top:8px; left:50%; transform:translateX(-50%); display:flex; gap:3px; }
.card-picker-eye { width:0; height:0; border-left:3px solid transparent; border-right:3px solid transparent; border-bottom:5px solid #fff; }
.card-picker-label { font-size:11px; font-weight:bold; margin-top:6px; letter-spacing:1px; }
.card-art-bg { position:absolute; inset:0; opacity:0.15; }
.card-dots { position:absolute; inset:0; }
.card-body { padding:10px 12px 12px; display:flex; flex-direction:column; gap:4px; flex:1; }
.card-name { font-size:min(3vw,14px); font-weight:bold; letter-spacing:1px; }
.card-desc { font-size:min(2vw,10px); color:#888; line-height:1.4; }
.card-stats { margin-top:auto; padding-top:6px; border-top:1px solid rgba(255,255,255,0.06); display:flex; flex-direction:column; gap:2px; }
.card-stat { font-size:min(1.8vw,9px); font-weight:bold; letter-spacing:0.5px; }
.card-rarity { position:absolute; top:6px; right:8px; font-size:8px; letter-spacing:2px; padding:2px 6px; border-radius:3px; font-weight:bold; }
.hint { margin-top:14px; font-size:11px; color:#555; z-index:1; }
.score-line { margin-top:6px; font-size:12px; color:#555; z-index:1; }
.winner-text { font-weight:bold; z-index:1; }
.game-wrap { position:fixed; top:0; left:0; width:100vw; height:100vh; display:flex; align-items:center; justify-content:center; background:#0e0e1a; }
.menu-panel { z-index:1; margin-top:28px; width:min(80vw,380px); }
.menu-row { display:flex; align-items:center; justify-content:space-between; padding:10px 16px; border:2px solid transparent; border-radius:6px; margin-bottom:4px; transition:all 0.15s; cursor:pointer; }
.menu-row.focused { border-color:#ff4466; background:rgba(255,68,102,0.08); }
.menu-row:hover { border-color:#ff446666; }
.menu-label { font-size:min(2.5vw,13px); color:#666; letter-spacing:2px; text-transform:uppercase; }
.menu-value { font-size:min(3vw,15px); font-weight:bold; color:#fff; display:flex; align-items:center; gap:10px; }
.menu-arrow { color:#555; font-size:16px; user-select:none; transition:color 0.15s; }
.menu-row.focused .menu-arrow { color:#ff4466; }
.menu-row.focused .menu-label { color:#aaa; }
.menu-start { display:flex; align-items:center; justify-content:center; padding:14px 16px; border:2px solid #444; border-radius:6px; margin-top:8px; cursor:pointer; transition:all 0.15s; font-size:min(3.5vw,18px); font-weight:bold; color:#888; letter-spacing:6px; font-family:monospace; }
.menu-start.focused { border-color:#ff4466; background:rgba(255,68,102,0.15); color:#ff4466; box-shadow:0 0 20px rgba(255,68,102,0.2); }
.splash-prompt { font-size:min(3vw,16px); color:#555; letter-spacing:4px; margin-top:40px; z-index:1; animation:pulse 2s ease-in-out infinite; }
@keyframes pulse { 0%,100%{opacity:0.4;} 50%{opacity:1;} }
</style>
</head>
<body>
<div id="ui">
  <div class="grid-bg"></div>
  <div id="splash-screen" style="display:none"></div>
  <div id="title-screen" style="display:none"></div>
  <div id="controls-screen" style="display:none"></div>
  <div id="cards-screen" style="display:none"></div>
  <div id="gameover-screen" style="display:none"></div>
</div>
<div class="game-wrap" id="game-wrap" style="display:none">
  <canvas id="cv"></canvas>
</div>

<script>
// Stage background image loader
// Standard stage backgrounds (stages 2-4, formerly 3-5)
const STAGE_BG_FILES={
  "THE DREADNOUGHT":{file:"stage3_bg.png",parallax:0.15},
  "THE HIVE":{file:"stage4_bg.png",parallax:0.3},
  "THRONE OF THE HIVE QUEEN":{file:"stage5_bg.png",parallax:0.15}
};
// Zone backgrounds for combined Stage 1
const ZONE_BGS=[
  {name:"LANDING ZONE",file:"stage1_bg.png",startX:0,endX:3000,parallax:0.3},
  {name:"ENTERING THE BASE",file:"stage1_cavemouth.png",startX:3000,endX:3500,parallax:0.2},
  {name:"TUNNEL",file:"stage1_tunnel.png",startX:3500,endX:3900,parallax:0.1},
  {name:"ALIEN BASE",file:"stage1_base.png",startX:3900,endX:7000,parallax:0.5}
];
const bgImages={},zoneImages={};
(function loadAllBGs(){
  for(const[name,cfg]of Object.entries(STAGE_BG_FILES)){const img=new Image();img.src=cfg.file;img.onload=()=>{bgImages[name]=img;};img.onerror=()=>{console.warn("BG fail:",cfg.file);};}
  ZONE_BGS.forEach(z=>{const img=new Image();img.src=z.file;img.onload=()=>{zoneImages[z.file]=img;};img.onerror=()=>{console.warn("Zone BG fail:",z.file);};});
})();

function drawZoneImg(ctx,zone,cameraX,opacity){
  const img=zoneImages[zone.file];
  if(!img||!img.complete||img.naturalWidth===0)return;
  const localX=cameraX-zone.startX;
  const scale=H/img.height,sw=img.width*scale;
  const px=-(localX*zone.parallax);
  if(!isFinite(px)||!isFinite(sw)||sw<=0)return;
  ctx.save();ctx.globalAlpha=opacity;
  ctx.drawImage(img,px,0,sw,H);
  ctx.restore();
}

function drawStageBG(ctx,stageName,cameraX,stageData){
  // Indoor corridor rendering (military base floors)
  if(stageData&&stageData.indoor){
    // Black fill
    ctx.fillStyle="#000";ctx.fillRect(0,0,W,H);
    // Lit corridor area
    const ceilY=40,floorY=GND;
    ctx.fillStyle="#1a1a2e";ctx.fillRect(0,ceilY,W,floorY-ceilY);
    // Top fade (black to corridor)
    const topGrad=ctx.createLinearGradient(0,ceilY-10,0,ceilY+20);
    topGrad.addColorStop(0,"#000");topGrad.addColorStop(1,"#1a1a2e");
    ctx.fillStyle=topGrad;ctx.fillRect(0,ceilY-10,W,30);
    // Bottom fade
    const botGrad=ctx.createLinearGradient(0,floorY-10,0,floorY+20);
    botGrad.addColorStop(0,"#1a1a2e");botGrad.addColorStop(1,"#000");
    ctx.fillStyle=botGrad;ctx.fillRect(0,floorY-10,W,30);
    // Ceiling surface
    ctx.fillStyle="#3a3a42";ctx.fillRect(0,ceilY,W,8);
    ctx.fillStyle="#2a2a32";ctx.fillRect(0,ceilY,W,2);
    // Ceiling details (pipes, panels, lamps) — scroll with parallax
    const px=-(cameraX*0.3);
    for(let lx=px%300;lx<W;lx+=300){
      // Wall lamp (amber glow)
      ctx.fillStyle="rgba(255,160,60,0.04)";ctx.beginPath();ctx.arc(lx,ceilY+20,40,0,Math.PI*2);ctx.fill();
      ctx.fillStyle="rgba(255,140,40,0.08)";ctx.beginPath();ctx.arc(lx,ceilY+10,8,0,Math.PI*2);ctx.fill();
      ctx.fillStyle="#aa7722";ctx.fillRect(lx-3,ceilY+4,6,6);
      ctx.fillStyle="#ffaa44";ctx.fillRect(lx-1,ceilY+5,2,3);
    }
    // Pipes along ceiling
    for(let px2=(px*1.2)%500;px2<W;px2+=500){
      ctx.fillStyle="#333";ctx.fillRect(px2,ceilY+3,80,3);
      ctx.fillStyle="#444";ctx.fillRect(px2,ceilY+3,80,1);
    }
    // Red warning lights
    const frame2=typeof frame!=="undefined"?frame:0;
    for(let rx=(px*0.8)%700;rx<W;rx+=700){
      const pulse=0.3+Math.sin(frame2*0.08)*0.2;
      ctx.fillStyle=`rgba(255,30,30,${pulse*0.06})`;ctx.beginPath();ctx.arc(rx+150,ceilY+15,25,0,Math.PI*2);ctx.fill();
      ctx.fillStyle=`rgba(255,50,50,${pulse})`;ctx.beginPath();ctx.arc(rx+150,ceilY+8,3,0,Math.PI*2);ctx.fill();
    }
    // Floor transition darkness + Floor 2 damage details
    // Floor 2 alien damage (after x=1500)
    if(cameraX>1200){
      const dmgPx=-(cameraX*0.4);
      // Alien slime patches on walls
      for(let sx=dmgPx%400+1600;sx<cameraX+W+50;sx+=400){
        const ssx=sx-cameraX;if(ssx<-20||ssx>W+20)continue;
        ctx.fillStyle="rgba(50,200,50,0.06)";ctx.fillRect(ssx,ceilY+10,30,15);
        ctx.fillStyle="rgba(30,150,30,0.1)";ctx.fillRect(ssx+5,ceilY+12,8,10);
      }
      // Floor cracks
      for(let cx2=dmgPx%350+1550;cx2<cameraX+W+50;cx2+=350){
        const ccx=cx2-cameraX;if(ccx<-10||ccx>W+10)continue;
        ctx.strokeStyle="rgba(0,0,0,0.2)";ctx.lineWidth=1;
        ctx.beginPath();ctx.moveTo(ccx,floorY-1);ctx.lineTo(ccx+20,floorY+3);ctx.lineTo(ccx+35,floorY-2);ctx.stroke();
      }
    }
    // Floor 3 heavy alien damage (after x=3200)
    if(cameraX>2900){
      const dmg3=-(cameraX*0.35);
      // Dense alien slime — more frequent, bigger
      for(let sx3=dmg3%200+3250;sx3<cameraX+W+50;sx3+=200){
        const ssx3=sx3-cameraX;if(ssx3<-30||ssx3>W+30)continue;
        ctx.fillStyle="rgba(50,255,50,0.08)";ctx.fillRect(ssx3,ceilY+8,40,20);
        ctx.fillStyle="rgba(30,200,30,0.12)";ctx.fillRect(ssx3+8,ceilY+10,12,15);
        // Dripping slime
        ctx.fillStyle="rgba(40,220,40,0.1)";ctx.fillRect(ssx3+15,ceilY+25,3,8+Math.sin(frame*0.05+sx3)*3);
      }
      // Ceiling cracks
      for(let cc3=dmg3%250+3300;cc3<cameraX+W+50;cc3+=250){
        const ccx3=cc3-cameraX;if(ccx3<-10||ccx3>W+10)continue;
        ctx.strokeStyle="rgba(0,0,0,0.25)";ctx.lineWidth=1;
        ctx.beginPath();ctx.moveTo(ccx3,ceilY+5);ctx.lineTo(ccx3+15,ceilY+2);ctx.lineTo(ccx3+30,ceilY+6);ctx.stroke();
      }
      // Alien egg clusters on floor (decorative)
      for(let eg=dmg3%500+3400;eg<cameraX+W+50;eg+=500){
        const egx=eg-cameraX;if(egx<-20||egx>W+20)continue;
        ctx.fillStyle="rgba(30,120,30,0.15)";
        ctx.beginPath();ctx.ellipse(egx,floorY-4,8,5,0,0,Math.PI*2);ctx.fill();
        ctx.beginPath();ctx.ellipse(egx+10,floorY-3,6,4,0.3,0,Math.PI*2);ctx.fill();
        ctx.fillStyle="rgba(80,200,80,0.1)";
        ctx.beginPath();ctx.ellipse(egx+2,floorY-5,3,2,0,0,Math.PI*2);ctx.fill();
      }
      // Flickering broken lamps (every other lamp after x=3200 flickers)
      const fFrame=typeof frame!=="undefined"?frame:0;
      for(let fl=dmg3%300+3300;fl<cameraX+W+50;fl+=600){
        const flx=fl-cameraX;if(flx<-20||flx>W+20)continue;
        if(fFrame%40<2){// Brief flash every 40 frames
          ctx.fillStyle="rgba(255,140,40,0.03)";ctx.beginPath();ctx.arc(flx,ceilY+15,20,0,Math.PI*2);ctx.fill();
        }
      }
    }
    // Signs
    if(stageData.signs){stageData.signs.forEach(s=>{
      const sx=s.x-cameraX;if(sx<-120||sx>W+120)return;
      const sw=200,sh=40,sy=ceilY+18;
      if(s.damaged){ctx.save();ctx.translate(sx,sy+sh/2);ctx.rotate(0.087);ctx.translate(-sx,-(sy+sh/2));}
      ctx.fillStyle="#3a3a42";ctx.fillRect(sx-sw/2,sy,sw,sh);
      ctx.strokeStyle="#555";ctx.lineWidth=2;ctx.strokeRect(sx-sw/2,sy,sw,sh);
      // Bolts in corners
      ctx.fillStyle="#777";
      ctx.beginPath();ctx.arc(sx-sw/2+6,sy+6,3,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.arc(sx+sw/2-6,sy+6,3,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.arc(sx-sw/2+6,sy+sh-6,3,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.arc(sx+sw/2-6,sy+sh-6,3,0,Math.PI*2);ctx.fill();
      // Text
      ctx.font="bold 18px monospace";ctx.fillStyle=s.color;ctx.textAlign="center";
      ctx.fillText(s.text,sx,sy+sh/2+6);
      if(s.damaged){
        ctx.strokeStyle="rgba(0,0,0,0.7)";ctx.lineWidth=2;
        ctx.beginPath();
        ctx.moveTo(sx-sw/2+12,sy+sh*0.3);
        ctx.lineTo(sx-sw/4,sy+sh*0.6);
        ctx.lineTo(sx+sw/8,sy+sh*0.4);
        ctx.lineTo(sx+sw/2-12,sy+sh*0.7);
        ctx.stroke();
        ctx.restore();
      }
    });}
    // Ground sections (only draw ground where it exists)
    if(stageData.groundSections){
      stageData.groundSections.forEach(gs=>{
        const gsx=gs.startX-cameraX,gex=gs.endX-cameraX;
        if(gex<-10||gsx>W+10)return;
        ctx.fillStyle="#2a2a3e";ctx.fillRect(gsx,GND,gex-gsx,H-GND);
        ctx.fillStyle="#3a3a42";ctx.fillRect(gsx,GND,gex-gsx,2);
      });
    }else{
      ctx.fillStyle="#2a2a3e";ctx.fillRect(0,GND,W,H-GND);
      ctx.fillStyle="#3a3a42";ctx.fillRect(0,GND,W,2);
    }
    return true;
  }
  // Combined stage with zones — smooth crossfade, max 2 images
  if(stageData&&stageData.zones){
    const camCenter=cameraX+W/2;
    const FADE=60; // small fade zone to avoid overlap on short zones
    // Find current zone index
    let ci=0;
    for(let i=0;i<ZONE_BGS.length;i++){if(camCenter>=ZONE_BGS[i].startX&&camCenter<ZONE_BGS[i].endX){ci=i;break;}}
    const cur=ZONE_BGS[ci];
    const intoZone=camCenter-cur.startX;
    const toZoneEnd=cur.endX-camCenter;
    // Determine ONE adjacent zone to blend with (never two)
    let blendZone=null,blendAmt=0;
    if(intoZone<FADE&&ci>0){
      // Near start — blend with previous
      blendZone=ZONE_BGS[ci-1];blendAmt=1-(intoZone/FADE);
    }else if(toZoneEnd<FADE&&ci<ZONE_BGS.length-1){
      // Near end — blend with next
      blendZone=ZONE_BGS[ci+1];blendAmt=1-(toZoneEnd/FADE);
    }
    // Draw current zone at full opacity
    const curImg=zoneImages[cur.file];
    if(curImg&&curImg.complete&&curImg.naturalWidth>0){drawZoneImg(ctx,cur,cameraX,1);}
    else{ctx.fillStyle=stageData.bg||"#1a1a2e";ctx.fillRect(0,0,W,H);}
    // Draw blend zone on top if applicable
    if(blendZone&&blendAmt>0){drawZoneImg(ctx,blendZone,cameraX,blendAmt);}
    // Tunnel atmosphere (keep)
    if(cur.file==="stage1_tunnel.png"){
      ctx.fillStyle="rgba(5,5,10,0.25)";ctx.fillRect(0,0,W,H);
      [3600,3700,3800].forEach(lx=>{
        const sx=lx-cameraX;
        if(sx>-50&&sx<W+50){
          ctx.fillStyle="rgba(255,150,50,0.06)";ctx.beginPath();ctx.arc(sx,H*0.4,50,0,Math.PI*2);ctx.fill();
          ctx.fillStyle="rgba(255,120,40,0.12)";ctx.beginPath();ctx.arc(sx,H*0.4,8,0,Math.PI*2);ctx.fill();
        }
      });
    }
    return true;
  }
  // Standard single-background stage
  const img=bgImages[stageName],cfg=STAGE_BG_FILES[stageName];
  if(!img||!cfg)return false;
  const scale=H/img.height,sw=img.width*scale;
  ctx.drawImage(img,-(cameraX*(cfg.parallax||0.3)),0,sw,H);
  return true;
}

// Sound engine — Web Audio API, no external files
let audioCtx;try{audioCtx=new(window.AudioContext||window.webkitAudioContext)();}catch(e){audioCtx=null;}
function sfx(freq,type,dur,vol=0.15,slide=0){
  if(!audioCtx)return;try{
    const o=audioCtx.createOscillator(),g=audioCtx.createGain();
    o.type=type;o.frequency.setValueAtTime(freq,audioCtx.currentTime);
    if(slide)o.frequency.exponentialRampToValueAtTime(Math.max(20,freq+slide),audioCtx.currentTime+dur);
    g.gain.setValueAtTime(vol,audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+dur);
    o.connect(g);g.connect(audioCtx.destination);
    o.start();o.stop(audioCtx.currentTime+dur);
  }catch(e){}
}
function noise(dur,vol=0.1){
  if(!audioCtx)return;try{
    const buf=audioCtx.createBuffer(1,audioCtx.sampleRate*dur,audioCtx.sampleRate);
    const d=buf.getChannelData(0);
    for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1);
    const s=audioCtx.createBufferSource(),g=audioCtx.createGain();
    s.buffer=buf;g.gain.setValueAtTime(vol,audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+dur);
    s.connect(g);g.connect(audioCtx.destination);
    s.start();s.stop(audioCtx.currentTime+dur);
  }catch(e){}
}
const SND={
  shoot(){sfx(1800,"sine",0.12,0.1,-1600);},
  hit(){sfx(200,"sawtooth",0.15,0.12,-100);noise(0.08,0.08);},
  jump(){sfx(300,"sine",0.12,0.08,400);},
  land(){noise(0.04,0.04);},
  die(){sfx(400,"sawtooth",0.4,0.15,-350);noise(0.3,0.12);setTimeout(()=>sfx(100,"square",0.3,0.1),100);},
  missile(){noise(0.15,0.25);sfx(100,"square",0.12,0.2,-60);sfx(250,"sawtooth",0.08,0.15,-200);},
  explode(){noise(0.4,0.2);sfx(80,"square",0.3,0.15,-40);setTimeout(()=>noise(0.2,0.1),100);},
  pickup(){sfx(500,"sine",0.1,0.1,300);setTimeout(()=>sfx(900,"sine",0.1,0.1),80);},
  shield(){sfx(1200,"sine",0.15,0.08,-600);},
  reload(){sfx(600,"square",0.06,0.06);setTimeout(()=>sfx(800,"square",0.06,0.06),70);},
  ko(){sfx(600,"square",0.15,0.12);setTimeout(()=>sfx(800,"square",0.15,0.12),150);setTimeout(()=>sfx(1000,"square",0.3,0.15),300);},
  menuNav(){sfx(500,"sine",0.05,0.05);},
  menuSelect(){sfx(700,"sine",0.08,0.08,200);},
  pause(){sfx(400,"sine",0.1,0.08);sfx(300,"sine",0.1,0.06);},
  cardPick(){sfx(600,"sine",0.1,0.1,400);setTimeout(()=>sfx(1000,"sine",0.15,0.1),100);},
  dash(){noise(0.04,0.08);sfx(300,"sawtooth",0.06,0.06,-200);},
  grenadeBounce(){noise(0.03,0.05);sfx(150,"square",0.04,0.05);},
  grenadeBoom(){noise(0.35,0.25);sfx(60,"square",0.3,0.2,-30);setTimeout(()=>noise(0.15,0.12),80);},
  weaponUp(){sfx(500,"sine",0.1,0.1,300);setTimeout(()=>sfx(700,"sine",0.1,0.1,200),100);setTimeout(()=>sfx(1000,"sine",0.15,0.12),200);},

function getStats(crds){
  const s={...BSTATS};s.weapon="pistol";
  crds.forEach(c=>{
    const cd=CARDS.find(x=>x.id===c);if(!cd)return;
    if(cd.weapon){s.weapon=cd.weapon;}
    else if(cd.stat!=="_weapon"){s[cd.stat]+=cd.amount;}
    // HEAVY: also -1 speed
    if(c==="heavy")s.speed-=1;
    // GLASS CANNON: also -20 HP
    if(c==="glasscannon")s.maxHp-=20;
  });
  s.fireRate=Math.max(80,s.fireRate);s.speed=Math.max(1,s.speed);s.gravMult=Math.max(-0.35,s.gravMult);s.maxHp=Math.max(20,s.maxHp);
  return s;
}

function titleCycle(dir){
  if(menuSub==="mode"){
    if(menuRow===0){modeCursor=(modeCursor+MODES.length+dir)%MODES.length;gameMode=MODES[modeCursor].id;}
    else if(menuRow===1){typeCursor=(typeCursor+GAME_TYPES.length+dir)%GAME_TYPES.length;gameType=GAME_TYPES[typeCursor];}
    else if(menuRow===2&&gameMode==="4p-2v2"){friendlyFire=!friendlyFire;}
    else{
      // Check if this row is story players
      const spRow=(gameMode==="4p-2v2"?3:2);
      if(gameType==="story"&&menuRow===spRow){storyPlayers=storyPlayers>=3?1:storyPlayers+1;}
    }
  }
}

// ============ LEVEL ELEMENTS (Phase 1) ============
// All elements are arrays on storyState, initialized per stage in loadStoryStage

// Element update functions — called each frame in storyUpdate
function updateLevelElements(ss,plats,now){
  const allP=ss.players.filter(p=>!p.dead);

  // 1. Spike traps — damage on contact
  if(ss.spikes)ss.spikes.forEach(sp=>{
    allP.forEach(p=>{
      if(p.invincible>0)return;
      if(p.x+PW>sp.x&&p.x<sp.x+sp.w&&p.y+PH>sp.y&&p.y<sp.y+sp.h){
        const dmg=sp.damage||10;
        p.hp-=dmg;p.flash=8;p.vy=-8;p.vx=(p.x<sp.x+sp.w/2?-4:4);SND.hit();
        p.invincible=30;ss.shake={intensity:3,frames:4};
        ss.dmgNums.push({x:p.x+PW/2,y:p.y-5,text:"-"+dmg,color:"#ff4444",life:48,vy:-2});
      }
    });
  });

  // 2. Acid pools — continuous damage while standing in
  if(ss.acidPools)ss.acidPools.forEach(ap=>{
    // Bubble particles
    if(frame%12===0)ss.particles.push({x:ap.x+Math.random()*ap.w,y:GND-2,vx:(Math.random()-0.5),vy:-1-Math.random()*2,life:15,color:"#ff6633"});
    allP.forEach(p=>{
      if(p.invincible>0)return;
      if(p.onGround&&p.y+PH>=GND-2&&p.x+PW>ap.x&&p.x<ap.x+ap.w){
        p.hp-=0.25;p.flash=2; // ~15 damage/sec at 60fps
      }
    });
  });

  // 3. Moving platforms
  if(ss.movingPlats)ss.movingPlats.forEach(mp=>{
    // Move
    if(mp.axis==="h"){mp.x+=mp.speed*mp.dir;if(mp.x>mp.maxX||mp.x<mp.minX)mp.dir*=-1;}
    else{mp.y+=mp.speed*mp.dir;if(mp.y>mp.maxY||mp.y<mp.minY)mp.dir*=-1;}
    // Player standing on it
    allP.forEach(p=>{
      if(p.x+PW>mp.x&&p.x<mp.x+mp.w&&p.y+PH>=mp.y&&p.y+PH<=mp.y+6&&p.vy>=0){
        p.y=mp.y-PH;p.vy=0;p.onGround=true;p.jumpsLeft=1+(p.stats.extraJumps||0);
        if(mp.axis==="h")p.x+=mp.speed*mp.dir;
        else p.y+=mp.speed*mp.dir;
      }
    });
  });

  // 4. Disappearing platforms
  if(ss.disappearPlats)ss.disappearPlats.forEach(dp=>{
    const cycle=(now-dp.startTime)%dp.period;
    dp.visible=cycle<dp.onTime;
    dp.warning=dp.visible&&cycle>dp.onTime-500; // flash last 0.5s
    if(dp.visible){
      allP.forEach(p=>{
        if(p.x+PW>dp.x&&p.x<dp.x+dp.w&&p.y+PH>=dp.y&&p.y+PH<=dp.y+6&&p.vy>=0){
          p.y=dp.y-PH;p.vy=0;p.onGround=true;p.jumpsLeft=1+(p.stats.extraJumps||0);
        }
      });
    }
  });

  // 5. Wall turrets
  if(ss.turrets)ss.turrets=ss.turrets.filter(t=>{
    if(t.hp<=0){
      SND.explode();ss.enemiesKilled++;
      for(let i=0;i<10;i++)ss.particles.push({x:t.x,y:t.y,vx:(Math.random()-0.5)*6,vy:(Math.random()-0.5)*6,life:15,color:"#ff8844"});
      for(let c=0;c<10;c++)ss.coins_on_ground.push({x:t.x+(Math.random()-0.5)*20,y:t.y,vy:-3-Math.random()*3,vx:(Math.random()-0.5)*3,grounded:false});
      return false;
    }
    // Shoot at closest player in range
    const closest=allP.reduce((best,p)=>{const d=Math.sqrt((p.x-t.x)**2+(p.y-t.y)**2);return d<best.d?{p,d}:best;},{p:null,d:Infinity});
    if(closest.p&&closest.d<400&&now-t.lastShot>2000){
      const angle=Math.atan2(closest.p.y+PH/2-t.y,closest.p.x+PW/2-t.x);
      ss.enemyBullets.push({x:t.x,y:t.y,vx:Math.cos(angle)*5,vy:Math.sin(angle)*5,damage:8,friendly:false,sz:3});
      t.lastShot=now;
    }
    if(t.flash>0)t.flash--;
    return true;
  });
  // Turret bullet hit detection is handled by existing friendly bullet code — need to add turret as a target
  ss.enemyBullets.forEach(b=>{
    if(!b.friendly||!ss.turrets)return;
    ss.turrets.forEach(t=>{
      if(b.x>t.x-10&&b.x<t.x+10&&b.y>t.y-10&&b.y<t.y+10){
        t.hp-=b.damage||8;t.flash=4;b.dead=true;SND.hit();
        ss.dmgNums.push({x:t.x,y:t.y-10,text:"-"+(b.damage||8),color:"#ff4466",life:30,vy:-2});
      }
    });
  });

  // 6. Jump pads
  if(ss.jumpPads)ss.jumpPads.forEach(jp=>{
    if(jp.cooldown>0)jp.cooldown--;
    allP.forEach(p=>{
      if(p.x+PW>jp.x&&p.x<jp.x+jp.w&&p.y+PH>=jp.y&&p.y+PH<=jp.y+8&&p.vy>=0&&jp.cooldown<=0){
        p.vy=-20;p.onGround=false;jp.cooldown=15;jp.compress=6;
        sfx(400,"sine",0.15,0.1,600); // boing
      }
    });
    if(jp.compress>0)jp.compress--;
  });

  // 7. Crumbling platforms
  if(ss.crumblePlats)ss.crumblePlats.forEach(cp=>{
    if(cp.state==="solid"){
      let stepped=false;
      allP.forEach(p=>{
        if(p.x+PW>cp.x&&p.x<cp.x+cp.w&&p.y+PH>=cp.y&&p.y+PH<=cp.y+6&&p.vy>=0){
          p.y=cp.y-PH;p.vy=0;p.onGround=true;p.jumpsLeft=1+(p.stats.extraJumps||0);
          stepped=true;
        }
      });
      if(stepped&&!cp.triggered){cp.triggered=true;cp.triggerTime=now;}
      if(cp.triggered&&now-cp.triggerTime>800){
        cp.state="falling";
        for(let i=0;i<12;i++)ss.particles.push({x:cp.x+Math.random()*cp.w,y:cp.y,vx:(Math.random()-0.5)*4,vy:Math.random()*3,life:15,color:"#8a6644"});
      }
    }else if(cp.state==="falling"){
      cp.state="gone";cp.respawnTime=now+4000;
    }else if(cp.state==="gone"&&now>cp.respawnTime){
      cp.state="solid";cp.triggered=false;
    }
    cp.shaking=cp.triggered&&cp.state==="solid";
  });

  // 8. Weapon pickups
  if(ss.weaponPickups)ss.weaponPickups.forEach(wp=>{
    if(!wp.alive)return;
    allP.forEach(p=>{
      if(Math.abs(p.x+PW/2-wp.x)<20&&Math.abs(p.y+PH/2-wp.y)<20){
        p.weapon=wp.weaponIdx;
        const ow=ss.playerOwnedWeapons[p.idx];
        if(!ow.includes(wp.weaponIdx))ow.push(wp.weaponIdx);
        ss.playerWeapons[p.idx]=wp.weaponIdx;
        p.ammo=GG_WEAPONS[wp.weaponIdx].ammo;p.reloading=false;
        wp.alive=false;SND.cardPick();
        ss.dmgNums.push({x:wp.x,y:wp.y-15,text:GG_WEAPONS[wp.weaponIdx].name+"!",color:"#ffcc00",life:60,vy:-1.5});
      }
    });
  });

  // 9. Breakable walls / secret rooms
  if(ss.breakableWalls)ss.breakableWalls.forEach(bw=>{
    if(bw.broken)return;
    // Check friendly bullets hitting the wall
    ss.enemyBullets.forEach(b=>{
      if(!b.friendly||b.dead)return;
      if(b.x>bw.x&&b.x<bw.x+bw.w&&b.y>bw.y&&b.y<bw.y+bw.h){
        bw.hits++;b.dead=true;
        for(let i=0;i<3;i++)ss.particles.push({x:b.x,y:b.y,vx:(Math.random()-0.5)*4,vy:(Math.random()-0.5)*4,life:8,color:"#aa9988"});
        if(bw.hits>=5){
          bw.broken=true;SND.explode();ss.shake={intensity:3,frames:5};
          for(let i=0;i<15;i++)ss.particles.push({x:bw.x+bw.w/2,y:bw.y+bw.h/2,vx:(Math.random()-0.5)*8,vy:(Math.random()-0.5)*8,life:20,color:"#887766"});
          // Spawn secret coins
          if(bw.coins){for(let c=0;c<bw.coins;c++)ss.coins_on_ground.push({x:bw.x+bw.w+20+Math.random()*40,y:bw.y+bw.h/2,vy:-2-Math.random()*3,vx:2+Math.random()*2,grounded:false});}
        }
      }
    });
    // Block player movement (act as solid wall)
    if(!bw.broken){
      allP.forEach(p=>{
        if(p.x+PW>bw.x&&p.x<bw.x+bw.w&&p.y+PH>bw.y&&p.y<bw.y+bw.h){
          if(p.vx>0&&p.x<bw.x)p.x=bw.x-PW;
          else if(p.vx<0&&p.x>bw.x)p.x=bw.x+bw.w;
        }
      });
    }
  });

  // 10. Rope swings
  if(ss.ropes)ss.ropes.forEach(rp=>{
    const MAX_ANGLE=1.4; // ~80 degrees max swing
    if(!rp.occupied){
      // Idle sway
      rp.angle+=rp.angularVel;
      rp.angularVel+=-0.001*Math.sin(rp.angle);
      rp.angularVel*=0.995;
      rp.angle=Math.max(-MAX_ANGLE,Math.min(MAX_ANGLE,rp.angle));
      if(Math.abs(rp.angle)>=MAX_ANGLE)rp.angularVel*=-0.3;
      if(Math.abs(rp.angularVel)<0.001&&Math.abs(rp.angle)<0.02)rp.angularVel+=(Math.random()-0.5)*0.002;
      rp.grabTimer=0; // reset grab timer when unoccupied
    }else{
      // === OCCUPIED — player on rope ===
      // Pendulum physics
      rp.angle+=rp.angularVel;
      rp.angularVel+=-0.002*Math.sin(rp.angle);
      rp.angularVel*=0.995;
      rp.angle=Math.max(-MAX_ANGLE,Math.min(MAX_ANGLE,rp.angle));
      if(Math.abs(rp.angle)>=MAX_ANGLE)rp.angularVel*=-0.3;
      const occ=rp.occupant;
      if(!occ||occ.dead||occ.downed){rp.occupied=false;rp.occupant=null;if(occ)occ._onRope=false;rp._ropeFrames=0;return;}
      // Position player
      occ.x=rp.anchorX+Math.sin(rp.angle)*rp.length-PW/2;
      occ.y=rp.anchorY+Math.cos(rp.angle)*rp.length-PH/2;
      occ.vx=0;occ.vy=0;occ.onGround=false;
      // Pump with LEFT/RIGHT — check ALL input sources directly
      if(keys.a||keys.arrowleft)rp.angularVel-=0.003;
      if(keys.d||keys.arrowright)rp.angularVel+=0.003;
      const gpRope=navigator.getGamepads();
      for(let gi=0;gi<4;gi++){const gpr=gpRope[gi];if(gpr){if(gpr.axes[0]<-0.3)rp.angularVel-=0.003;if(gpr.axes[0]>0.3)rp.angularVel+=0.003;}}
      rp.angularVel=Math.max(-0.06,Math.min(0.06,rp.angularVel));
      // Frame counter for min grab time
      if(!rp._ropeFrames)rp._ropeFrames=0;
      rp._ropeFrames++;
      // === RELEASE CHECK (after 15 frames) ===
      if(rp._ropeFrames>15){
        let wantRelease=false,wantDrop=false;
        // Keyboard: ANY jump key currently pressed
        if(keys.w||keys[" "]||keys.arrowup)wantRelease=true;
        // Keyboard: ANY down key currently pressed
        if(keys.s||keys.arrowdown)wantDrop=true;
        // Controller: check ALL connected gamepads for A button or down
        for(let gi=0;gi<4;gi++){const gpr=gpRope[gi];if(!gpr)continue;
          if(gpr.buttons[3]&&gpr.buttons[3].pressed)wantRelease=true; // Y to release
          if(gpr.axes[1]>0.5)wantDrop=true; // stick down
          if(gpr.buttons[13]&&gpr.buttons[13].pressed)wantDrop=true; // dpad down
        }
        if(wantRelease){
          occ.vx=rp.angularVel*rp.length*1.2;
          occ.vy=-Math.abs(rp.angularVel)*rp.length*0.5-6;
          occ.flipping=true;occ.flipAngle=0;occ.flipDir=occ.vx>=0?1:-1;
          rp.occupied=false;rp.occupant=null;occ._onRope=false;occ._ropeReleaseCooldown=30;rp._ropeFrames=0;
          for(let i=0;i<5;i++)ss.particles.push({x:occ.x+PW/2,y:occ.y+PH,vx:(Math.random()-0.5)*3,vy:Math.random()*2,life:10,color:"#aa8844"});
        }else if(wantDrop){
          occ.vx=0;occ.vy=0;
          rp.occupied=false;rp.occupant=null;occ._onRope=false;occ._ropeReleaseCooldown=30;rp._ropeFrames=0;
        }
      }
    }
    // Grab detection — generous zone around bottom of rope
    if(!rp.occupied){
      const ropeBottomX=rp.anchorX+Math.sin(rp.angle)*rp.length;
      const ropeBottomY=rp.anchorY+Math.cos(rp.angle)*rp.length;
      allP.forEach(p=>{
        if(p._ropeReleaseCooldown>0){p._ropeReleaseCooldown--;return;}
        if(p.dead||p.downed||p._onRope||p.onGround)return;
        if(Math.abs(p.x+PW/2-ropeBottomX)<50&&Math.abs(p.y+PH/2-ropeBottomY)<50){
          rp.occupied=true;rp.occupant=p;p._onRope=true;rp._ropeFrames=0;
          p.flipping=false;p.flipAngle=0;
          // Cancel dash state so player isn't translucent / leaving afterimages on the rope
          p.dashing=0;p.dashTrail=[];
          rp.angularVel=p.vx*0.004;
          for(let i=0;i<4;i++)ss.particles.push({x:ropeBottomX,y:ropeBottomY,vx:(Math.random()-0.5)*3,vy:-Math.random()*2,life:8,color:"#aa8844"});
        }
      });
    }
  });
}

// Element draw functions
function drawLevelElements(ctx,ss,cam,frame){
  const now=Date.now();

  // 1. Spike traps
  if(ss.spikes)ss.spikes.forEach(sp=>{
    const sx=sp.x-cam;if(sx>W+20||sx+sp.w<-20)return;
    ctx.fillStyle="#888";ctx.strokeStyle="#555";ctx.lineWidth=1;
    const numSpikes=Math.floor(sp.w/20);
    for(let i=0;i<numSpikes;i++){
      const tx=sx+i*20+10;
      ctx.beginPath();
      if(sp.dir==="up"){ctx.moveTo(tx-8,sp.y+sp.h);ctx.lineTo(tx,sp.y);ctx.lineTo(tx+8,sp.y+sp.h);}
      else{ctx.moveTo(tx-8,sp.y);ctx.lineTo(tx,sp.y+sp.h);ctx.lineTo(tx+8,sp.y);}
      ctx.closePath();ctx.fill();ctx.stroke();
    }
  });

  // 2. Acid pools
  if(ss.acidPools)ss.acidPools.forEach(ap=>{
    const ax=ap.x-cam;if(ax>W+20||ax+ap.w<-20)return;
    const glow=0.5+Math.sin(frame*0.08)*0.15;
    ctx.fillStyle=`rgba(255,68,34,${glow*0.6})`;ctx.fillRect(ax,GND-4,ap.w,6);
    ctx.fillStyle=`rgba(255,100,20,${glow*0.3})`;ctx.fillRect(ax,GND-6,ap.w,4);
    ctx.fillStyle="#ff4422";ctx.fillRect(ax,GND-2,ap.w,2);
  });

  // 3. Moving platforms
  if(ss.movingPlats)ss.movingPlats.forEach(mp=>{
    const mx=mp.x-cam;if(mx>W+50||mx+mp.w<-50)return;
    ctx.fillStyle="#4a6a8e";ctx.fillRect(mx,mp.y,mp.w,mp.h);
    ctx.fillStyle="#5a7a9e";ctx.fillRect(mx,mp.y,mp.w,2);
    // Direction arrow
    ctx.fillStyle="rgba(255,255,255,0.3)";ctx.font="8px monospace";ctx.textAlign="center";
    ctx.fillText(mp.axis==="h"?(mp.dir>0?"\u25B6":"\u25C0"):(mp.dir>0?"\u25BC":"\u25B2"),mx+mp.w/2,mp.y+mp.h/2+3);
  });

  // 4. Disappearing platforms
  if(ss.disappearPlats)ss.disappearPlats.forEach(dp=>{
    if(!dp.visible)return;
    const dx=dp.x-cam;if(dx>W+50||dx+dp.w<-50)return;
    ctx.globalAlpha=dp.warning?(Math.sin(frame*0.5)>0?1:0.3):0.8;
    ctx.fillStyle="#aa66cc";ctx.fillRect(dx,dp.y,dp.w,dp.h);
    ctx.fillStyle="#bb77dd";ctx.fillRect(dx,dp.y,dp.w,2);
    // Dotted pattern
    ctx.fillStyle="rgba(255,255,255,0.15)";
    for(let i=0;i<dp.w;i+=8)ctx.fillRect(dx+i,dp.y+4,3,3);
    ctx.globalAlpha=1;
  });

  // 5. Turrets
  if(ss.turrets)ss.turrets.forEach(t=>{
    const tx=t.x-cam;if(tx>W+30||tx<-30)return;
    ctx.fillStyle=t.flash>0?"#fff":"#aa6644";
    ctx.beginPath();ctx.arc(tx,t.y,8,0,Math.PI*2);ctx.fill();
    ctx.fillStyle=t.flash>0?"#ddd":"#886633";
    ctx.fillRect(tx+t.facing*2,t.y-3,t.facing*12,6);
    // HP
    if(t.hp<20){ctx.fillStyle="rgba(0,0,0,0.4)";ctx.fillRect(tx-10,t.y-14,20,3);ctx.fillStyle="#ff4444";ctx.fillRect(tx-10,t.y-14,20*(t.hp/20),3);}
  });

  // 6. Jump pads
  if(ss.jumpPads)ss.jumpPads.forEach(jp=>{
    const jx=jp.x-cam;if(jx>W+20||jx+jp.w<-20)return;
    const comp=jp.compress>0?3:0;
    ctx.fillStyle="#222";ctx.fillRect(jx,jp.y+comp,jp.w,jp.h-comp);
    ctx.fillStyle="#ffcc00";ctx.fillRect(jx+2,jp.y+comp,jp.w-4,3);
    ctx.fillStyle="#222";ctx.fillRect(jx+4,jp.y+comp,2,jp.h-comp);ctx.fillRect(jx+jp.w-6,jp.y+comp,2,jp.h-comp);
  });

  // 7. Crumbling platforms
  if(ss.crumblePlats)ss.crumblePlats.forEach(cp=>{
    if(cp.state==="gone")return;
    const cx=cp.x-cam;if(cx>W+50||cx+cp.w<-50)return;
    const shakeX=cp.shaking?(Math.random()-0.5)*3:0;
    ctx.fillStyle="#8a6644";ctx.fillRect(cx+shakeX,cp.y,cp.w,cp.h);
    ctx.fillStyle="#9a7654";ctx.fillRect(cx+shakeX,cp.y,cp.w,2);
    // Cracks
    if(cp.triggered){
      ctx.strokeStyle="#5a4422";ctx.lineWidth=1;
      ctx.beginPath();ctx.moveTo(cx+shakeX+cp.w*0.3,cp.y);ctx.lineTo(cx+shakeX+cp.w*0.4,cp.y+cp.h);ctx.stroke();
      ctx.beginPath();ctx.moveTo(cx+shakeX+cp.w*0.7,cp.y);ctx.lineTo(cx+shakeX+cp.w*0.6,cp.y+cp.h);ctx.stroke();
    }
  });

  // 8. Weapon pickups
  if(ss.weaponPickups)ss.weaponPickups.forEach(wp=>{
    if(!wp.alive)return;
    const wx=wp.x-cam;if(wx>W+20||wx<-20)return;
    const bob=Math.sin(frame*0.06)*4;
    ctx.fillStyle="rgba(255,204,0,0.15)";ctx.beginPath();ctx.arc(wx,wp.y+bob,14,0,Math.PI*2);ctx.fill();
    ctx.font="16px serif";ctx.textAlign="center";ctx.textBaseline="middle";
    ctx.fillText("\u{1F52B}",wx,wp.y+bob);
    ctx.textBaseline="alphabetic";
    ctx.font="bold 8px monospace";ctx.fillStyle="#ffcc00";
    ctx.fillText(GG_WEAPONS[wp.weaponIdx].name,wx,wp.y+bob-16);
  });

  // 9. Breakable walls
  if(ss.breakableWalls)ss.breakableWalls.forEach(bw=>{
    if(bw.broken)return;
    const bx=bw.x-cam;if(bx>W+20||bx+bw.w<-20)return;
    ctx.fillStyle="#665544";ctx.fillRect(bx,bw.y,bw.w,bw.h);
    // Subtle visual tell — slightly different pattern
    ctx.fillStyle="rgba(255,255,255,0.04)";
    for(let i=0;i<bw.h;i+=6)ctx.fillRect(bx+2,bw.y+i,bw.w-4,2);
    // Crack indicators based on hits
    if(bw.hits>0){
      ctx.strokeStyle="rgba(200,180,150,0.5)";ctx.lineWidth=1;
      for(let i=0;i<bw.hits;i++){
        const cy=bw.y+bw.h*(0.2+i*0.15);
        ctx.beginPath();ctx.moveTo(bx,cy);ctx.lineTo(bx+bw.w*(0.3+Math.random()*0.4),cy+(Math.random()-0.5)*8);ctx.stroke();
      }
    }
  });

  // 10. Rope swings
  if(ss.ropes)ss.ropes.forEach(rp=>{
    const ax=rp.anchorX-cam,ay=rp.anchorY;
    const bx=rp.anchorX+Math.sin(rp.angle)*rp.length-cam;
    const by=rp.anchorY+Math.cos(rp.angle)*rp.length;
    if(ax<-50||ax>W+50)return;
    // Anchor hook on ceiling
    ctx.fillStyle="#888";ctx.fillRect(ax-4,ay-2,8,6);
    ctx.fillStyle="#666";ctx.fillRect(ax-2,ay+3,4,4);
    // Rope
    ctx.strokeStyle="#aa8844";ctx.lineWidth=2.5;ctx.lineCap="round";
    ctx.beginPath();ctx.moveTo(ax,ay+5);ctx.lineTo(bx,by);ctx.stroke();
    // Rope segments (knots)
    ctx.fillStyle="#997733";
    for(let t=0.25;t<1;t+=0.25){
      const kx=ax+(bx-ax)*t,ky=ay+5+(by-ay-5)*t;
      ctx.beginPath();ctx.arc(kx,ky,2,0,Math.PI*2);ctx.fill();
    }
    // Handle at bottom
    ctx.fillStyle="#886622";ctx.fillRect(bx-3,by-2,6,6);
    ctx.fillStyle="#aa8844";ctx.fillRect(bx-2,by-1,4,4);
    // "GRAB" hint if not occupied and player nearby
    if(!rp.occupied){
      ctx.font="7px monospace";ctx.fillStyle="rgba(255,255,255,0.3)";ctx.textAlign="center";
      ctx.fillText("GRAB",bx,by+14);
    }
  });
}

function togglePause(){
  if(screen!=="fight")return;
  // Allow pause in both classic (g) and story (storyState) modes
  if(gameType==="story"){
    if(!storyState||storyState.stageComplete)return;
  }else{
    if(!g||g.over)return;
  }
  paused=!paused;SND.pause();
  if(paused){pauseTime=Date.now();pauseSel=0;MUSIC.stop();}
  else{
    MUSIC.start(gameType==="story"?(["warehouse","ruins","lava","space"][storyState.stage-1]||"warehouse"):ar().id);
    const elapsed=Date.now()-pauseTime;
    if(g){g.players.forEach(p=>{if(p.reloading)p.reloadStart+=elapsed;p.lastShot+=elapsed;});
      if(!g.pickupSpawned)g.pickupTime+=elapsed;}
  }
}

// Input
window.addEventListener("keydown",e=>{
  keys[e.key.toLowerCase()]=true;
  const k=e.key.toLowerCase();
  if(["w","a","s","d","f","arrowup","arrowdown","arrowleft","arrowright","/","i","j","k","l","h"].includes(k))e.preventDefault();

  if(screen==="splash"){SND.menuSelect();startMissionBoard();return;}
  if(screen==="controls"){if(k==="escape"||k==="backspace"||k==="enter"||k===" "||k==="b"){startMissionBoard();}return;}
  if(k==="p"&&!paused){togglePause();return;}
  if((k==="r"||k==="x")&&screen==="fight"&&!paused){
    // Manual reload for P1
    if(gameType==="story"&&storyState&&storyState.players[0]){const sp=storyState.players[0];if(!sp.reloading&&sp.ammo<GG_WEAPONS[sp.weapon].ammo){sp.reloading=true;sp.reloadStart=Date.now();}}
    else if(g&&g.players&&g.players[0]){const gp0=g.players[0];if(!gp0.reloading&&gp0.ammo<(gameType==="gungame"?GG_WEAPONS[gp0.ggLevel].ammo:MAX_AMMO+(gp0.stats.maxAmmo||0))){gp0.reloading=true;gp0.reloadStart=Date.now();}}
  }
  if(paused){
    if(k==="p"||k==="escape"){togglePause();return;}
    const pauseOpts=gameType==="story"?2:PAUSE_OPTS.length;
    if(k==="arrowup"||k==="w"){pauseSel=(pauseSel+pauseOpts-1)%pauseOpts;return;}
    if(k==="arrowdown"||k==="s"){pauseSel=(pauseSel+1)%pauseOpts;return;}
    if(k==="enter"||k===" "||k==="f"||k==="/"){
      if(pauseSel===0)togglePause();
      else if(gameType==="story"&&pauseSel===1){paused=false;MUSIC.stop();if(storyAnimId){cancelAnimationFrame(storyAnimId);storyAnimId=null;}goTitle();}
      else if(pauseSel===1){paused=false;startRound();startGameLoop();}
      else if(pauseSel===2){paused=false;goTitle();}
      return;
    }
    return;
  }

  if(screen==="title"){
    const rows=menuRowCount();
    if(k==="arrowup"||k==="w"){menuRow=(menuRow+rows-1)%rows;SND.menuNav();renderTitle();}
    if(k==="arrowdown"||k==="s"){menuRow=(menuRow+1)%rows;SND.menuNav();renderTitle();}
    if(k==="arrowleft"||k==="a"){titleCycle(-1);SND.menuNav();renderTitle();}
    if(k==="arrowright"||k==="d"){titleCycle(1);SND.menuNav();renderTitle();}
    if(k==="escape"||k==="backspace"){if(menuSub==="mode"){menuSub="main";menuRow=0;SND.menuNav();renderTitle();}}
    if(k==="enter"||k===" "){
      if(menuSub==="main"){
        if(menuRow===0){menuSub="mode";menuRow=0;SND.menuSelect();renderTitle();}
        else if(menuRow===1){SND.menuSelect();showScreen("controls");renderControls();}
        else if(menuRow===2){SND.menuSelect();startMatch();}
      }else{
        const backRow=rows-1;
        if(menuRow===backRow){menuSub="main";menuRow=0;SND.menuNav();renderTitle();}
        else{titleCycle(1);SND.menuNav();renderTitle();}
      }
    }
  }
  if(screen==="gameover"&&(k==="enter"||k===" ")){SND.menuSelect();startMatch();}
  if(screen==="cards"){
    if(k==="arrowleft"||k==="a")cursor=Math.max(0,cursor-1);
    if(k==="arrowright"||k==="d")cursor=Math.min(choices.length-1,cursor+1);
    if(k==="enter"||k===" "||k==="f"||k==="/"){SND.cardPick();pickCard(choices[cursor].id);}
    else SND.menuNav();
    renderCards();
  }
});
window.addEventListener("keyup",e=>{keys[e.key.toLowerCase()]=false;});

window.addEventListener("gamepadconnected",()=>{gpOn=true;if(screen==="title")renderTitle();});
window.addEventListener("gamepaddisconnected",(e)=>{gpOn=Array.from(navigator.getGamepads()).some(x=>x);const idx=e.gamepad?.index;if(idx!=null&&idx<4)prevPad[idx]={};});

// Drawing
function drawGun(ctx,x,y,facing,reloading,weapon){
  const f=facing;const w=weapon||"pistol";
  ctx.fillStyle="#777";ctx.fillRect(x,y+2,f*4,5); // grip (shared)
  if(w==="SHOTGUN"||w==="shotgun"){
    // Wide short barrel + pump grip + stock
    ctx.fillStyle="#ccaa88";ctx.fillRect(x-f*2,y-4,f*10,9);
    ctx.fillStyle="#bb9977";ctx.fillRect(x+f*8,y-3,f*6,3);ctx.fillRect(x+f*8,y+1,f*6,3);
    ctx.fillStyle="#aa8866";ctx.fillRect(x+f*3,y+4,f*6,3); // pump grip
    ctx.fillStyle="#997755";ctx.fillRect(x-f*3,y-2,f*3,5); // stock
    ctx.fillStyle=reloading?"#554422":"#ffaa44";ctx.beginPath();ctx.arc(x+f*14,y,2,0,Math.PI*2);ctx.fill();
  }else if(w==="SNIPER"){
    // Long thin barrel + scope + stock
    ctx.fillStyle="#444";ctx.fillRect(x-f*1,y-2,f*22,4);
    ctx.fillStyle="#666";ctx.fillRect(x+f*5,y-5,f*4,3); // scope
    ctx.fillStyle="#555";ctx.fillRect(x-f*4,y-2,f*4,4); // stock
    ctx.fillStyle=reloading?"#333":"#88aacc";ctx.fillRect(x+f*21,y-1,f*2,2); // muzzle
  }else if(w==="ROCKET"){
    // Fat cylindrical barrel, olive green
    ctx.fillStyle="#667744";ctx.fillRect(x-f*1,y-4,f*14,9);
    ctx.fillStyle="#556633";ctx.fillRect(x+f*13,y-3,f*3,7); // open end
    ctx.fillStyle="#778855";ctx.fillRect(x-f*2,y-2,f*3,5); // rear grip
    ctx.fillStyle=reloading?"#445522":"#aacc44";ctx.beginPath();ctx.arc(x+f*16,y,1.5,0,Math.PI*2);ctx.fill();
  }else if(w==="SMG"){
    // Slightly longer than pistol + magazine
    ctx.fillStyle="#aaaacc";ctx.fillRect(x-f*1,y-3,f*12,6);
    ctx.fillStyle="#9999bb";ctx.fillRect(x+f*3,y+3,f*3,5); // magazine
    ctx.fillStyle="#8888aa";ctx.fillRect(x+f*11,y-2,f*3,4); // barrel
    ctx.fillStyle=reloading?"#555":"#ccddff";ctx.beginPath();ctx.arc(x+f*14,y,1.5,0,Math.PI*2);ctx.fill();
  }else if(w==="BOUNCER"){
    // Medium barrel + 3 coil rings
    ctx.fillStyle="#8888cc";ctx.fillRect(x-f*1,y-3,f*14,6);
    ctx.fillStyle="#aaaaee";
    ctx.fillRect(x+f*4,y-4,f*1,8);ctx.fillRect(x+f*7,y-4,f*1,8);ctx.fillRect(x+f*10,y-4,f*1,8); // coils
    ctx.fillStyle=reloading?"#555":"#aaccff";ctx.beginPath();ctx.arc(x+f*14,y,2,0,Math.PI*2);ctx.fill();
    if(!reloading){ctx.fillStyle="rgba(170,170,255,0.25)";ctx.beginPath();ctx.arc(x+f*14,y,5,0,Math.PI*2);ctx.fill();}
  }else if(w==="GOLDEN GUN"){
    // Same as pistol but gold + sparkle
    ctx.fillStyle="#ffcc00";ctx.fillRect(x-f*1,y-3,f*10,7);
    ctx.fillStyle="#ffdd44";ctx.beginPath();ctx.arc(x+f*4,y-3,4,Math.PI,0,facing<0);ctx.fill();
    ctx.fillStyle="#ffee66";ctx.fillRect(x+f*9,y-2,f*5,2);ctx.fillRect(x+f*9,y+1,f*5,2);
    ctx.fillStyle="#fff";ctx.beginPath();ctx.arc(x+f*14,y,2.5,0,Math.PI*2);ctx.fill();
    ctx.fillStyle="rgba(255,255,200,0.4)";ctx.beginPath();ctx.arc(x+f*14,y,5,0,Math.PI*2);ctx.fill();
    // Sparkle
    if(Math.random()<0.3){const sx=x+f*(2+Math.random()*10),sy=y-3+Math.random()*6;ctx.fillStyle="#fff";ctx.fillRect(sx,sy,1,1);}
  }else if(w==="laser"){
    ctx.fillStyle="#115544";ctx.fillRect(x-f*1,y-3,f*8,7);
    ctx.fillStyle="#1a8866";ctx.fillRect(x+f*7,y-2,f*12,4);
    ctx.fillStyle=reloading?"#224422":"#00ffaa";ctx.beginPath();ctx.arc(x+f*19,y,2.5,0,Math.PI*2);ctx.fill();
    if(!reloading){ctx.fillStyle="rgba(0,255,170,0.3)";ctx.beginPath();ctx.arc(x+f*19,y,6,0,Math.PI*2);ctx.fill();}
  }else{
    // Pistol (default) — Halo Magnum style
    const R=reloading;
    // Main body / receiver
    ctx.fillStyle=R?"#555":"#3a3a42";ctx.fillRect(x,y-4,f*14,6);
    // Slide highlight on top
    ctx.fillStyle=R?"#6a6a6a":"#6a6a72";ctx.fillRect(x+f*2,y-5,f*9,2);
    // Slide cuts (detail lines)
    ctx.fillStyle=R?"#444":"#2a2a32";
    ctx.fillRect(x+f*3,y-4,f*1,2);ctx.fillRect(x+f*6,y-4,f*1,2);ctx.fillRect(x+f*9,y-4,f*1,2);
    // Front sight / orange muzzle accent
    ctx.fillStyle=R?"#883322":"#ff5522";ctx.fillRect(x+f*13,y-5,f*1,2);
    // Muzzle tip
    ctx.fillStyle=R?"#444":"#555";ctx.fillRect(x+f*13,y-3,f*2,4);
    // Grip (angled down from body)
    ctx.fillStyle=R?"#222":"#1a1a1e";ctx.fillRect(x+f*2,y+2,f*4,7);
    // Grip texture
    ctx.fillStyle=R?"#111":"#0a0a0e";
    ctx.fillRect(x+f*3,y+4,f*2,1);ctx.fillRect(x+f*3,y+6,f*2,1);
    // Trigger guard
    ctx.fillStyle=R?"#333":"#2a2a32";
    ctx.fillRect(x+f*5,y+2,f*3,1);ctx.fillRect(x+f*7,y+2,f*1,3);
    // Trigger
    ctx.fillStyle=R?"#222":"#1a1a1e";ctx.fillRect(x+f*6,y+3,f*1,1);
    // Magazine well
    ctx.fillStyle=R?"#444":"#3a3a42";ctx.fillRect(x+f*2,y+9,f*4,1);
    // Barrel underside detail
    ctx.fillStyle=R?"#333":"#2a2a32";ctx.fillRect(x+f*8,y+1,f*5,1);
  }
}

function drawPerson(ctx,x,y,w,h,color,facing,flash,fr,ammo,reloading,reloadProg,dead,weapon){
  if(dead)return;
  const f=facing,P=flash>0;
  // Colors
  const sk=P?'#fff':'#d9a06b',skD=P?'#eee':'#b07846',skH=P?'#fff':'#e8c090';
  const pnt=P?'#fff':color,pntD=P?'#eee':shadeColor(color,-40);
  const bt=P?'#eee':'#2a1a0a',btH=P?'#fff':'#3a2a1a';
  const bn=P?'#fff':color,bnD=P?'#eee':shadeColor(color,-25);
  const hr=P?'#ddd':'#1a1a1a';
  const blt=P?'#ddd':'#3a2a1a',bkl=P?'#fff':'#aaa';
  const strp=P?'#eee':'#5c3a1e',bul=P?'#fff':'#ccaa44';

  // Draw bigger than hitbox — center on hitbox
  const cx=x+w/2,baseY=y+h; // bottom of hitbox
  const vw=28,vh=44; // visual size
  const vx=cx-vw/2,vy=baseY-vh;
  const walk=Math.sin(fr*0.3)*5;
  const bob=Math.abs(walk)*0.15;

  // Shadow
  ctx.fillStyle='rgba(0,0,0,0.3)';ctx.beginPath();ctx.ellipse(cx,baseY,13,3,0,0,Math.PI*2);ctx.fill();

  // === BOOTS (chunky combat boots) ===
  const bootW=9,bootH=6;
  ctx.fillStyle=bt;
  ctx.fillRect(cx-10+walk*0.6,baseY-bootH,bootW,bootH);
  ctx.fillRect(cx+1-walk*0.6,baseY-bootH,bootW,bootH);
  ctx.fillStyle=btH; // boot top edge
  ctx.fillRect(cx-9+walk*0.6,baseY-bootH,bootW-2,1);
  ctx.fillRect(cx+2-walk*0.6,baseY-bootH,bootW-2,1);
  ctx.fillStyle='#1a0a00'; // soles
  ctx.fillRect(cx-11+walk*0.6,baseY-1,bootW+2,2);
  ctx.fillRect(cx+0-walk*0.6,baseY-1,bootW+2,2);

  // === LEGS (combat pants with cargo detail) ===
  const legTop=baseY-bootH-12,legBot=baseY-bootH;
  ctx.fillStyle=pnt;
  ctx.fillRect(cx-8+walk*0.4,legTop,8,legBot-legTop); // left leg
  ctx.fillRect(cx+0-walk*0.4,legTop,8,legBot-legTop); // right leg
  // Pants shading
  ctx.fillStyle=pntD;
  ctx.fillRect(cx-4+walk*0.4,legTop,4,legBot-legTop); // left inner
  ctx.fillRect(cx+4-walk*0.4,legTop,4,legBot-legTop); // right inner
  // Knee highlights
  ctx.fillStyle=P?'#fff':shadeColor(color,15);
  ctx.fillRect(cx-7+walk*0.4,legTop+5,3,2);
  ctx.fillRect(cx+1-walk*0.4,legTop+5,3,2);
  // Cargo pocket (small rectangle on thigh)
  ctx.fillStyle=pntD;
  ctx.fillRect(cx-7+walk*0.4,legTop+2,4,3);
  ctx.fillRect(cx+3-walk*0.4,legTop+2,4,3);

  // === BELT ===
  const beltY=legTop-2;
  ctx.fillStyle=blt;ctx.fillRect(cx-9,beltY,18,3);
  ctx.fillStyle=bkl;ctx.fillRect(cx-2,beltY,4,3); // buckle
  ctx.fillStyle=P?'#ddd':'#888';ctx.fillRect(cx-1,beltY+1,2,1);

  // === TORSO (muscular bare chest) ===
  const chestTop=beltY-14,chestW=18;
  // Main body
  ctx.fillStyle=sk;ctx.fillRect(cx-chestW/2,chestTop,chestW,beltY-chestTop);
  // Shoulders (wider)
  ctx.fillStyle=sk;ctx.fillRect(cx-chestW/2-2,chestTop,chestW+4,4);
  // Pec muscles
  ctx.fillStyle=skH;
  ctx.fillRect(cx-6,chestTop+3,5,4); // left pec
  ctx.fillRect(cx+1,chestTop+3,5,4); // right pec
  // Under-pec shadow
  ctx.fillStyle=skD;
  ctx.fillRect(cx-6,chestTop+7,12,1);
  // Center chest line
  ctx.fillStyle=skD;ctx.fillRect(cx-0.5,chestTop+3,1,8);
  // Abs (3 rows of 2)
  ctx.fillStyle=skD;
  ctx.fillRect(cx-4,chestTop+9,3,1);ctx.fillRect(cx+1,chestTop+9,3,1);
  ctx.fillRect(cx-4,chestTop+11,3,1);ctx.fillRect(cx+1,chestTop+11,3,1);

  // === BANDOLIER (diagonal ammo belt) ===
  ctx.fillStyle=strp;
  for(let i=0;i<8;i++){
    const t=i/7;
    const sx=cx+f*(-8+16*t),sy=chestTop+1+(beltY-chestTop-3)*t;
    ctx.fillRect(sx,sy,3,2);
  }
  // Bullet tips
  ctx.fillStyle=bul;
  for(let i=0;i<5;i++){
    const t=0.1+i*0.18;
    const bx2=cx+f*(-8+16*t),by2=chestTop+2+(beltY-chestTop-5)*t;
    ctx.fillRect(bx2+0.5,by2-1,2,1); // brass tip
    ctx.fillStyle=P?'#ddd':'#aa8833';ctx.fillRect(bx2+0.5,by2,2,1); // shell
    ctx.fillStyle=bul;
  }

  // === ARMS ===
  const armY2=chestTop+4;
  const armBob2=reloading?Math.sin(reloadProg*Math.PI*4)*2:0;
  const gaX=cx+f*11,gaY=armY2+armBob2;
  const baX=cx-f*10,baY=armY2+8+walk*0.4;

  // Back arm (swinging)
  ctx.fillStyle=sk;ctx.fillRect(cx-f*9-2,armY2,6,4); // shoulder
  ctx.fillStyle=sk;
  const baMinY=Math.min(armY2+3,baY),baMaxY=Math.max(armY2+3,baY);
  ctx.fillRect(baX-2,baMinY,5,baMaxY-baMinY+4);
  ctx.fillStyle=skD;ctx.fillRect(baX-1,baMinY+2,3,baMaxY-baMinY); // shadow
  // Back fist
  ctx.fillStyle=sk;ctx.fillRect(baX-2,baY+3,6,5);
  ctx.fillStyle=skD;ctx.fillRect(baX-1,baY+6,4,2);

  // Gun arm (extended forward)
  ctx.fillStyle=sk;ctx.fillRect(cx+f*8-2,armY2,6,4); // shoulder/bicep
  ctx.fillStyle=skH;ctx.fillRect(cx+f*8-1,armY2,3,2); // bicep highlight
  // Forearm extending to gun
  ctx.fillStyle=sk;
  const faLen=Math.abs(gaX-(cx+f*10));
  ctx.fillRect(f===1?cx+10:gaX,gaY,Math.max(faLen,4)+2,4);
  ctx.fillStyle=skD;ctx.fillRect(f===1?cx+11:gaX+1,gaY+2,Math.max(faLen,3),1); // shadow
  // Fist gripping gun
  ctx.fillStyle=sk;ctx.fillRect(gaX-1,gaY-1,5,5);

  // Gun
  drawGun(ctx,gaX+f*3,gaY+1+armBob2,f,reloading,weapon);

  // === NECK ===
  ctx.fillStyle=skD;ctx.fillRect(cx-2,chestTop-3,4,4);

  // === HEAD ===
  const hdR=8,hdY=chestTop-8-bob;
  ctx.fillStyle=sk;ctx.beginPath();ctx.arc(cx,hdY,hdR,0,Math.PI*2);ctx.fill();
  // Head shadow
  ctx.fillStyle=skD;ctx.beginPath();ctx.arc(cx-f*2,hdY,hdR,Math.PI*0.4,Math.PI*1.6);ctx.fill();
  // Jaw definition
  ctx.fillStyle=skH;ctx.fillRect(cx+f*2,hdY+4,3,2);

  // === HAIR (dark military cut) ===
  ctx.fillStyle=hr;
  ctx.beginPath();ctx.arc(cx,hdY-1,hdR,Math.PI+0.2,2*Math.PI-0.2);ctx.fill();
  ctx.fillRect(cx-hdR+1,hdY-5,hdR*2-2,4);

  // === BANDANA (the iconic Contra look!) ===
  ctx.fillStyle=bn;ctx.fillRect(cx-hdR,hdY-3,hdR*2,4);
  // Knot on the back
  ctx.fillStyle=bnD;ctx.fillRect(cx-f*hdR-f*1,hdY-3,3,4);
  // TAILS — 2-3 segments flapping behind
  const tw=Math.sin(fr*0.15+1)*2,tw2=Math.sin(fr*0.15+2)*2.5,tw3=Math.sin(fr*0.12+3)*1.5;
  ctx.fillStyle=bn;
  ctx.fillRect(cx-f*(hdR+4),hdY-2+tw*0.3,f*(-5),3);
  ctx.fillStyle=bnD;
  ctx.fillRect(cx-f*(hdR+8),hdY-1+tw2*0.4,f*(-4),2);
  ctx.fillStyle=bn;ctx.globalAlpha=0.7;
  ctx.fillRect(cx-f*(hdR+11),hdY+tw3*0.5,f*(-3),2);
  ctx.globalAlpha=1;

  // === FACE ===
  const eX=cx+f*2;
  // Eyes (stern, determined)
  ctx.fillStyle='#fff';
  ctx.fillRect(eX-4,hdY-1,3,2);ctx.fillRect(eX+1,hdY-1,3,2);
  ctx.fillStyle='#000';
  ctx.fillRect(eX-3+f,hdY,1,1);ctx.fillRect(eX+2+f,hdY,1,1);
  // Brows (angry)
  ctx.fillStyle=hr;
  ctx.fillRect(eX-5,hdY-3,4,1);ctx.fillRect(eX+1,hdY-3,4,1);
  // Nose
  ctx.fillStyle=skD;ctx.fillRect(cx+f*1,hdY+1,1,2);
  // Mouth (tight frown)
  ctx.fillStyle=skD;ctx.fillRect(cx+f*1,hdY+4,3,1);

  // === RELOAD BAR === (ammo dots moved to HUD; only the reload progress bar remains floating)
  if(reloading){const rbw=26,rbx=cx-rbw/2,rby=y-14;ctx.fillStyle='rgba(0,0,0,0.5)';ctx.fillRect(rbx,rby,rbw,4);ctx.fillStyle='#ffcc00';ctx.fillRect(rbx,rby,rbw*reloadProg,4);ctx.strokeStyle='rgba(255,255,255,0.2)';ctx.lineWidth=1;ctx.strokeRect(rbx,rby,rbw,4);}
}

function shadeColor(col,amt){
  let r=parseInt(col.slice(1,3),16),g=parseInt(col.slice(3,5),16),b=parseInt(col.slice(5,7),16);
  r=Math.max(0,Math.min(255,r+amt));g=Math.max(0,Math.min(255,g+amt));b=Math.max(0,Math.min(255,b+amt));
  return"#"+(r<<16|g<<8|b).toString(16).padStart(6,"0");
}

function roundRect(ctx,x,y,w,h,r){
  ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);
  ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();
}

function statDisplay(card){
  let label=STAT_LABELS[card.stat]||card.stat;
  const val=card.amount;
  const invertedStats=["fireRate","reloadMult","gravMult"];
  const isGood=invertedStats.includes(card.stat)?(val<0):(val>0);
  const sign=val>0?"+":"";
  let color=isGood?"#44ff66":"#ff4444";
  let display=sign+val;
  if(card.stat==="shrink"){display="-"+val;color="#44ff66";}
  if(card.stat==="fireRate"||card.stat==="reloadMult")display=sign+val+"ms";
  if(card.stat==="piercing"||card.stat==="explosive"||card.stat==="bouncy"||card.stat==="shield"||card.stat==="extraJumps"||card.stat==="dashPower")display="YES";
  if(card.stat==="ghostTime"){display=sign+(val/1000)+"s";color="#44ff66";}
  if(card.stat==="_weapon"){display=card.weapon.toUpperCase();color="#44ff66";label="Weapon";}
  if(card.stat==="freezeTime"){display=(val/1000)+"s";color="#44ff66";}
  if(card.stat==="rageDmg"){display="+"+val+" (<30% HP)";color="#44ff66";}
  return `<span style="color:${color}">${display}</span> ${label}`;
}

function explodeBullet(b){SND.explode();
  const radius=35;
  for(let i=0;i<12;i++)g.particles.push({x:b.x,y:b.y,vx:(Math.random()-0.5)*8,vy:(Math.random()-0.5)*8,life:12+Math.random()*8,color:["#ff4400","#ff8800","#ffcc00"][Math.floor(Math.random()*3)]});
  for(const t of g.players){
    if(t.idx===b.owner||t.dead)continue;
    if(!friendlyFire&&sameTeam(b.owner,t.idx))continue;
    const dx=t.x+PW/2-b.x,dy=t.y+PH/2-b.y;
    const dist=Math.sqrt(dx*dx+dy*dy);
    if(dist<radius){const dmg=Math.round(b.damage*0.5*(1-dist/radius));t.hp-=Math.max(1,dmg);t.flash=6;}
  }
}

function explodeMissile(m){SND.explode();
  for(let i=0;i<25;i++)g.particles.push({x:m.x,y:m.y,vx:(Math.random()-0.5)*12,vy:(Math.random()-0.5)*12,life:20+Math.random()*15,color:["#ff4400","#ff8800","#ffcc00","#fff"][Math.floor(Math.random()*4)]});
  for(const t of g.players){
    if(t.dead)continue;
    if(t.idx===m.owner&&g.players.filter(p=>!p.dead).length>1)continue;
    if(!friendlyFire&&sameTeam(m.owner,t.idx))continue;
    const dx=t.x+PW/2-m.x,dy=t.y+PH/2-m.y;
    const dist=Math.sqrt(dx*dx+dy*dy);
    if(dist<MISSILE_RADIUS){const falloff=1-dist/MISSILE_RADIUS;t.hp-=Math.round(MISSILE_DMG*falloff);t.flash=10;}
  }
}

function startMatch(){

function startRound(){
  // Randomize arena each round
  arenaIdx=Math.floor(Math.random()*ARENAS.length);
  const n=nPlayers();
  const spawns=n===2?SPAWNS_2:n===3?SPAWNS_3:SPAWNS_4;
  const players=[];
  for(let i=0;i<n;i++){
    const st=getStats(pcards[i]);
    players.push({
      x:spawns[i].x,y:spawns[i].y,vx:0,vy:0,
      hp:st.maxHp,maxHp:st.maxHp,
      facing:spawns[i].f,onGround:false,lastShot:0,
      stats:st,flash:0,ammo:gameType==="gungame"?GG_WEAPONS[ggLevels[i]].ammo:MAX_AMMO+st.maxAmmo,reloading:false,reloadStart:0,
      dead:false,color:PCOLORS[i],idx:i,missileAmmo:0,
      jumpsLeft:1+st.extraJumps,shieldHp:st.shield,lastDash:0,wallSlide:0,frozen:0,
      dashing:0,dashDir:0,dashCooldown:0,dashTrail:[],lastTapL:0,lastTapR:0,ggLevel:ggLevels[i],kills:0,lastHitBy:-1,muzzleFlash:0,squash:0,killStreak:0,grenadeAmmo:3,
      invisible:st.ghostTime>0,ghostEnd:st.ghostTime>0?Date.now()+3*700+400+st.ghostTime:0
    });
  }
  const spawnDelay=PICKUP_SPAWN_MIN+Math.random()*(PICKUP_SPAWN_MAX-PICKUP_SPAWN_MIN);
  const now=Date.now();
  const a=ar(),layouts=a.layouts||[a.plats||[]];
  let roundPlats=layouts[Math.floor(Math.random()*layouts.length)];
  const hz=HAZARDS[a.id]||{};
  // Mark some platforms as moving for applicable arenas
  if(hz.movingPlats){roundPlats=roundPlats.map((p,i)=>i%2===1?{...p,moving:true,ox:p.x,dx:1,range:60+Math.random()*40}:{...p});}
  g={players,bullets:[],particles:[],over:false,pickups:[],missiles:[],pickupSpawned:false,pickupTime:now+spawnDelay,roundStart:now,
    plats:roundPlats,vsPhase:false,vsStart:now,countdown:3,countdownStart:now,countdownDone:false,shake:{intensity:0,frames:0},slowMo:0,
    fallingObjs:[],lastFall:now,hazards:hz,dmgNums:[],ragdolls:[],casings:[],grenades:[],hitstop:0,streakText:null,
    sawblades:(hz.sawblades||[]).map(s=>({...s,angle:0}))};
}

function pickCard(id){
  pcards[currentPicker].push(id);
  cardPickQueue.shift();
  if(cardPickQueue.length>0){
    currentPicker=cardPickQueue[0];
    choices=shufflePick(5);cursor=0;
    renderCards();
  }else{
    rWin=null;
    showScreen("fight");startRound();startGameLoop();
  }
}

function endRound(winner){
  if(g.over)return;
  g.over=true;SND.ko();g.shake={intensity:6,frames:15};g.slowMo=Date.now();g.koShow=false;
  setTimeout(()=>{
    // Gun game: check for golden gun winner
    if(gameType==="gungame"){
      if(g.ggWinner!==undefined){
        mWin=g.ggWinner;rWin=g.ggWinner;
        if(animId){cancelAnimationFrame(animId);animId=null;}
        showScreen("gameover");renderGameover();startMenuPoll();return;
      }
      // No cards in gun game — just start next round
      rnd++;rWin=winner;
      if(animId){cancelAnimationFrame(animId);animId=null;}
      showScreen("fight");startRound();startGameLoop();return;
    }
    if(gameMode==="4p-2v2"){
      scores[winner]++;rWin=winner;
      if(scores[winner]>=WIN_PTS){mWin=winner;if(animId){cancelAnimationFrame(animId);animId=null;}showScreen("gameover");renderGameover();startMenuPoll();return;}
      const losingTeam=winner===0?1:0;
      cardPickQueue=[...TEAMS[losingTeam]].filter(pi=>pi<nPlayers());
    }else{
      scores[winner]++;rWin=winner;
      if(scores[winner]>=WIN_PTS){mWin=winner;if(animId){cancelAnimationFrame(animId);animId=null;}showScreen("gameover");renderGameover();startMenuPoll();return;}
      const n=nPlayers();cardPickQueue=[];
      for(let i=0;i<n;i++){if(i!==winner)cardPickQueue.push(i);}
    }
    rnd++;
    if(animId){cancelAnimationFrame(animId);animId=null;}
    if(cardPickQueue.length>0){
      currentPicker=cardPickQueue[0];choices=shufflePick(5);cursor=0;
      showScreen("cards");renderCards();startMenuPoll();
    }else{showScreen("fight");startRound();startGameLoop();}
  },2000);
}

// Menu gamepad polling
function startMenuPoll(){
  if(menuAnimId)cancelAnimationFrame(menuAnimId);
  function poll(){
    const pads=[];
    for(let i=0;i<4;i++)pads.push(readPad(i));
    const jp=(p,pp,b)=>p&&p[b]&&!pp[b];
    const anyJp=(b)=>{for(let i=0;i<4;i++)if(jp(pads[i],prevPad[i],b))return true;return false;};
    const anyAxis=(axis,dir)=>{for(let i=0;i<4;i++){const p=pads[i],pp=prevPad[i];if(p&&dir>0&&p[axis]>0.5&&!(pp[axis]>0.5))return true;if(p&&dir<0&&p[axis]<-0.5&&!(pp[axis]<-0.5))return true;}return false;};

    if(screen==="splash"){
      if(anyJp("a")||anyJp("start")||anyJp("b")||anyJp("x")){startMissionBoard();}
    }else if(screen==="controls"){
      if(anyJp("b")||anyJp("a")||anyJp("start")){startMissionBoard();}
    }else if(screen==="title"){
      const rows=menuRowCount();
      let changed=false;
      if(anyJp("dU")||anyAxis("ly",-1)){menuRow=(menuRow+rows-1)%rows;changed=true;}
      if(anyJp("dD")||anyAxis("ly",1)){menuRow=(menuRow+1)%rows;changed=true;}
      if(anyJp("dL")||anyAxis("lx",-1)){titleCycle(-1);changed=true;}
      if(anyJp("dR")||anyAxis("lx",1)){titleCycle(1);changed=true;}
      if(changed)renderTitle();
      if(anyJp("b")){if(menuSub==="mode"){menuSub="main";menuRow=0;renderTitle();}}
      if(anyJp("a")||anyJp("start")){
        if(menuSub==="main"){
          if(menuRow===0){menuSub="mode";menuRow=0;renderTitle();}
          else if(menuRow===1){showScreen("controls");renderControls();}
          else if(menuRow===2){startMatch();}
        }else{
          const backRow=rows-1;
          if(menuRow===backRow){menuSub="main";menuRow=0;renderTitle();}
          else{titleCycle(1);renderTitle();}
        }
      }
    }
    else if(screen==="gameover"){
      if(anyJp("a")||anyJp("start"))startMatch();
    }
    else if(screen==="cards"){
      let changed=false;
      if(anyJp("dR")||anyAxis("lx",1)){cursor=Math.min(cursor+1,choices.length-1);changed=true;}
      if(anyJp("dL")||anyAxis("lx",-1)){cursor=Math.max(cursor-1,0);changed=true;}
      if(changed)renderCards();
      // Accept A press OR any pad with A held (for controllers that miss edge detection)
      const anyA=()=>{for(let i=0;i<4;i++){const p=pads[i];if(p&&p.a)return true;}return false;};
      if((anyJp("a")||anyJp("x")||anyJp("start"))&&choices[cursor]){SND.cardPick();pickCard(choices[cursor].id);}
    }
    for(let i=0;i<4;i++)prevPad[i]=pads[i]||{};
    if(screen!=="fight")menuAnimId=requestAnimationFrame(poll);
  }
  menuAnimId=requestAnimationFrame(poll);
}

// Game loop
function startGameLoop(){
  if(animId)cancelAnimationFrame(animId);
  if(menuAnimId){cancelAnimationFrame(menuAnimId);menuAnimId=null;}
  if(mbAnimId){cancelAnimationFrame(mbAnimId);mbAnimId=null;}
  MUSIC.start(ar().id);

  function update(){
    if(!g)return;
    // Hitstop
    if(g.hitstop>0){g.hitstop--;return;}
    // VS phase
    if(g.vsPhase){
      if(Date.now()-g.vsStart>=1500)g.vsPhase=false;
      return;
    }
    // Countdown
    if(!g.countdownDone){
      const elapsed=Date.now()-g.countdownStart;
      const step=Math.floor(elapsed/700);
      if(step<3){
        const newCount=3-step;
        if(newCount!==g.countdown){g.countdown=newCount;sfx([400,500,600][step],"square",0.15,0.12);}
      }else if(step===3&&g.countdown!==0){
        g.countdown=0;sfx(800,"square",0.2,0.18);
      }else if(elapsed>=3*700+400){
        g.countdownDone=true;g.roundStart=Date.now();
        const delay=PICKUP_SPAWN_MIN+Math.random()*(PICKUP_SPAWN_MAX-PICKUP_SPAWN_MIN);
        g.pickupTime=Date.now()+delay;
      }
      return;
    }
    if(g.over)return;
    if(paused){
      for(let i=0;i<4;i++){
        const gp=readPad(i),pp=prevPad[i];
        if(!gp){prevPad[i]=gp||{};continue;}
        if(gp.start&&!pp.start)togglePause();
        if((gp.dU&&!pp.dU)||(gp.ly<-0.5&&!(pp.ly<-0.5)))pauseSel=(pauseSel+PAUSE_OPTS.length-1)%PAUSE_OPTS.length;
        if((gp.dD&&!pp.dD)||(gp.ly>0.5&&!(pp.ly>0.5)))pauseSel=(pauseSel+1)%PAUSE_OPTS.length;
        if(gp.a&&!pp.a){
          if(pauseSel===0)togglePause();
          else if(pauseSel===1){paused=false;startRound();startGameLoop();}
          else if(pauseSel===2){paused=false;goTitle();}
        }
        prevPad[i]=gp||{};
      }
      return;
    }
    const k=keys,now=Date.now();
    const a=ar(),plats=g.plats;
    frame++;

    g.players.forEach(p=>{
      if(p.dead)return;
      const rt=Math.max(300,RELOAD_TIME+p.stats.reloadMult);
      if(p.reloading&&now-p.reloadStart>=rt){p.ammo=gameType==="gungame"?GG_WEAPONS[p.ggLevel].ammo:MAX_AMMO+p.stats.maxAmmo;p.reloading=false;SND.reload();}
      if(p.stats.regen>0&&p.hp<p.maxHp){p.hp=Math.min(p.maxHp,p.hp+p.stats.regen/60);}
      if(p.invisible&&now>=p.ghostEnd){p.invisible=false;}
    });

    g.players.forEach((p,pi)=>{
      if(p.dead)return;
      if(p.frozen&&now<p.frozen){p.vx*=0.8;return;}
      // Dash update
      if(p.dashing>0){
        p.dashing--;p.vx=14*p.dashDir;
        p.dashTrail.push({x:p.x,y:p.y,life:6});
        if(p.dashing<=0){p.dashCooldown=now+1000;}
        return; // skip normal input while dashing
      }
      p.dashTrail=p.dashTrail.filter(t=>{t.life--;return t.life>0;});
      const km=KMAPS[pi];
      const gp=readPad(pi);
      let left=k[km.left],right=k[km.right],jump=k[km.up],shoot=k[km.shoot];
      let dashTrigger=false,dashD=p.facing;
      if(gp&&gp.start&&!prevPad[pi].start)togglePause();
      if(gp){
        if(gp.lx<-0.3||gp.dL)left=true;
        if(gp.lx>0.3||gp.dR)right=true;
        if(gp.a)jump=true;
        if(gp.x||gp.rt)shoot=true;
        // LB = manual reload
        if(gp.lb&&!prevPad[pi].lb&&!p.reloading&&p.ammo<(gameType==="gungame"?GG_WEAPONS[p.ggLevel].ammo:MAX_AMMO+(p.stats.maxAmmo||0))){p.reloading=true;p.reloadStart=Date.now();SND.reload();}
        // B button = dash
        if(gp.b&&!prevPad[pi].b&&now>p.dashCooldown){
          dashTrigger=true;
          dashD=gp.lx<-0.3?-1:gp.lx>0.3?1:p.facing;
        }
        // Y button = switch weapon (or RB)
        if((gp.y&&!prevPad[pi].y)||(gp.rb&&!prevPad[pi].rb)){
          const owned=gameType==="story"?storyState.playerOwnedWeapons[pi]:[];
          if(owned.length>1){
            const curIdx=owned.indexOf(p.weapon||0);
            const nextIdx=(curIdx+1)%owned.length;
            p.weapon=owned[nextIdx];
            if(gameType==="story")storyState.playerWeapons[pi]=p.weapon;
            p.ammo=GG_WEAPONS[p.weapon].ammo;p.reloading=false;
            SND.menuNav();
          }
        }
      }
      // Grenade — LT on controller, G/M on keyboard
      if(gp&&gp.lt&&!prevPad[pi].lt&&p.grenadeAmmo>0){
        p.grenadeAmmo--;const gObj=g||storyState;
        if(gObj.grenades)gObj.grenades.push({x:p.x+PW/2+p.facing*10,y:p.y+10,vx:5*p.facing,vy:-6,owner:pi,born:Date.now()});
        SND.missile();
      }
      if(dashTrigger){p.dashing=8;p.dashDir=dashD;SND.dash();p.dashTrail=[];return;}
      if(a.ice){
        const accel=0.6,maxSpd=p.stats.speed;
        if(left){p.vx-=accel;p.facing=-1;}
        else if(right){p.vx+=accel;p.facing=1;}
        else{p.vx*=a.friction;if(Math.abs(p.vx)<0.2)p.vx=0;}
        if(p.vx>maxSpd)p.vx=maxSpd;
        if(p.vx<-maxSpd)p.vx=-maxSpd;
      }else{
        if(left){p.vx=-p.stats.speed;p.facing=-1;}
        else if(right){p.vx=p.stats.speed;p.facing=1;}
        else p.vx=0;
      }
      if(jump&&p.wallSlide!==0){
        // Wall jump: kick off wall
        p.vx=6*(-p.wallSlide);p.vy=-10;p.wallSlide=0;p.jumpsLeft=p.stats.extraJumps;SND.jump();p.flipping=true;p.flipAngle=0;p.flipDir=p.facing;
        for(let i=0;i<5;i++)g.particles.push({x:p.wallSlide>0?p.x+PW:p.x,y:p.y+PH/2,vx:(-p.wallSlide)*Math.random()*3,vy:(Math.random()-0.5)*3,life:10,color:"#aaa"});
      }else if(jump&&(p.onGround||p.jumpsLeft>0)){
        p.vy=-p.stats.jumpPower;SND.jump();p.flipping=true;p.flipAngle=0;p.flipDir=p.facing;
        if(p.onGround){p.onGround=false;p.jumpsLeft=p.stats.extraJumps;}
        else{p.jumpsLeft--;for(let i=0;i<4;i++)g.particles.push({x:p.x+PW/2,y:p.y+PH,vx:(Math.random()-0.5)*3,vy:Math.random()*2,life:8,color:"#aaa"});}
      }
      if(p.stats.dashPower>0&&!p.onGround&&(left||right)&&now-p.lastDash>500){
        p.vx=(left?-1:1)*(p.stats.speed+p.stats.dashPower*4);p.lastDash=now;
        for(let i=0;i<5;i++)g.particles.push({x:p.x+PW/2,y:p.y+PH/2,vx:(Math.random()-0.5)*4,vy:(Math.random()-0.5)*2,life:8,color:p.color});
      }
      if(shoot&&p.missileAmmo>0&&now-p.lastShot>400){
        const angle=p.facing===1?0:Math.PI;
        g.missiles.push({x:p.x+PW/2+p.facing*14,y:p.y+12,vx:Math.cos(angle)*MISSILE_SPD,vy:Math.sin(angle)*MISSILE_SPD,angle,owner:pi,trail:[]});
        SND.missile();p.missileAmmo--;p.lastShot=now;
      }else if(shoot&&p.missileAmmo<=0&&!p.reloading&&p.ammo>0){
        const bx=p.x+PW/2+p.facing*14,by=p.y+4;
        if(gameType==="gungame"){
          const ggw=GG_WEAPONS[p.ggLevel];
          if(now-p.lastShot>ggw.fireRate){
            for(let s=0;s<ggw.count;s++){
              const ang=ggw.count>1?(s-(ggw.count-1)/2)*ggw.spread*2/(ggw.count-1):0;
              g.bullets.push({x:bx,y:by,vx:Math.cos(ang)*ggw.speed*p.facing,vy:Math.sin(ang)*ggw.speed,
                damage:ggw.damage,owner:pi,sz:ggw.sz,piercing:false,explosive:ggw.explode,
                bouncy:ggw.bounces>0,bouncesLeft:ggw.bounces||0,lifeSteal:0,freeze:0,
                sniper:ggw.sniper,rocket:ggw.rocket,golden:ggw.golden,ggColor:ggw.color,born:now});
            }
            SND.shoot();p.lastShot=now;p.ammo--;p.muzzleFlash=3;
            g.casings.push({x:bx,y:by-3,vx:-p.facing*(1+Math.random()*2),vy:-2-Math.random()*2,life:999,landed:false});
            if(p.ammo<=0){p.reloading=true;p.reloadStart=now;}
          }
        }else if(now-p.lastShot>p.stats.fireRate){
          const baseDmg=p.stats.damage+(p.stats.rageDmg>0&&p.hp/p.maxHp<0.3?p.stats.rageDmg:0);
          const bprops={owner:pi,sz:BSZ+p.stats.bulletSize,piercing:p.stats.piercing>0,explosive:p.stats.explosive>0,bouncy:p.stats.bouncy>0,lifeSteal:p.stats.lifeSteal,freeze:p.stats.freezeTime};
          if(p.stats.weapon==="shotgun"){
            for(let s=-1;s<=1;s++){const angle=s*0.26;const spd=BSPD+p.stats.bulletSpeed;g.bullets.push({x:bx,y:by,vx:Math.cos(angle)*spd*p.facing,vy:Math.sin(angle)*spd,damage:Math.round(baseDmg*0.6),...bprops});}
          }else if(p.stats.weapon==="laser"){
            g.bullets.push({x:bx,y:by,vx:(BSPD+p.stats.bulletSpeed+15)*p.facing,damage:Math.round(baseDmg*0.7),...bprops,sz:2,laser:true});
          // TODO: grenade weapon card removed — this path is unreachable
          }else{
            g.bullets.push({x:bx,y:by,vx:(BSPD+p.stats.bulletSpeed)*p.facing,damage:baseDmg,...bprops});
          }
          SND.shoot();p.lastShot=now;p.ammo--;p.muzzleFlash=3;
          g.casings.push({x:bx,y:by-3,vx:-p.facing*(1+Math.random()*2),vy:-2-Math.random()*2,life:999,landed:false});
          if(p.ammo<=0){p.reloading=true;p.reloadStart=now;}
        }
      }
    });

    for(let i=0;i<4;i++)prevPad[i]=readPad(i)||{};

    g.players.forEach(p=>{
      if(p.dead)return;
      p.vy+=(GRAVITY+p.stats.gravMult);p.x+=p.vx;p.y+=p.vy;p.onGround=false;
      if(p.y+PH>=GND){p.y=GND-PH;p.vy=0;p.onGround=true;p.jumpsLeft=1+p.stats.extraJumps;if(a.ice)p.vx*=a.friction;}
      plats.forEach(pl=>{
        const pR=p.x+PW,pB=p.y+PH,plR=pl.x+pl.w,plB=pl.y+pl.h;
        if(pR>pl.x&&p.x<plR&&pB>pl.y&&p.y<plB){
          const oL=pR-pl.x,oR=plR-p.x,oT=pB-pl.y,oB=plB-p.y;
          const m=Math.min(oL,oR,oT,oB);
          if(m===oT&&p.vy>=0){p.y=pl.y-PH;p.vy=0;p.onGround=true;p.jumpsLeft=1+p.stats.extraJumps;if(a.ice)p.vx*=a.friction;}
          else if(m===oB&&p.vy<0){p.y=plB;p.vy=0;}
          else if(m===oL){p.x=pl.x-PW;p.vx=0;}
          else if(m===oR){p.x=plR;p.vx=0;}
        }
      });
      // Wall wrap: bottom zone (y+PH > 350) wraps, top zone is solid
      const WRAP_Y=350;
      p.wallSlide=0;
      if(p.y+PH>WRAP_Y){
        // Bottom zone — wrap through
        if(p.x+PW<0)p.x=W;
        else if(p.x>W)p.x=-PW;
      }else{
        // Top zone — solid walls + wall slide
        if(p.x<0){p.x=0;p.vx=0;}
        if(p.x+PW>W){p.x=W-PW;p.vx=0;}
        if(!p.onGround&&p.vy>0){
          if(p.x<=0){p.wallSlide=-1;p.vy=Math.min(p.vy,1.5);}
          else if(p.x+PW>=W){p.wallSlide=1;p.vy=Math.min(p.vy,1.5);}
        }
      }
      if(p.flash>0)p.flash--;
    });

    if(!g.pickupSpawned&&now>=g.pickupTime){
      g.pickupSpawned=true;
      const spots=[...PICKUP_SPOTS].sort(()=>Math.random()-0.5);
      g.pickups.push({x:spots[0].x,y:spots[0].y,type:"missile",age:0});
      g.pickups.push({x:spots[1].x,y:spots[1].y,type:"medpack",age:0});
    }

    g.pickups=g.pickups.filter(pk=>{
      pk.age++;
      for(const p of g.players){
        if(p.dead)continue;
        const dx=p.x+PW/2-pk.x,dy=p.y+PH/2-pk.y;
        if(Math.abs(dx)<PW&&Math.abs(dy)<PH){
          if(pk.type==="medpack"){
            p.hp=p.maxHp;p.flash=4;SND.pickup();
            for(let i=0;i<10;i++)g.particles.push({x:pk.x,y:pk.y,vx:(Math.random()-0.5)*5,vy:-Math.random()*4,life:15+Math.random()*10,color:"#44ff66"});
          }else if(pk.type==="missile"){
            p.missileAmmo=MISSILE_AMMO;SND.pickup();
            for(let i=0;i<6;i++)g.particles.push({x:pk.x,y:pk.y,vx:(Math.random()-0.5)*4,vy:-Math.random()*3,life:10+Math.random()*8,color:"#ff8800"});
          }
          return false;
        }
      }
      return true;
    });

    g.missiles=g.missiles.filter(m=>{
      // Homing: find nearest valid target
      let closest=null,closeDist=Infinity;
      for(const t of g.players){
        if(t.idx===m.owner||t.dead)continue;
        if(!friendlyFire&&sameTeam(m.owner,t.idx))continue;
        const dx=(t.x+PW/2)-m.x,dy=(t.y+PH/2)-m.y;
        const d=Math.sqrt(dx*dx+dy*dy);
        if(d<closeDist){closeDist=d;closest=t;}
      }
      if(closest){
        const targetAngle=Math.atan2((closest.y+PH/2)-m.y,(closest.x+PW/2)-m.x);
        let diff=targetAngle-m.angle;
        while(diff>Math.PI)diff-=Math.PI*2;
        while(diff<-Math.PI)diff+=Math.PI*2;
        m.angle+=Math.sign(diff)*Math.min(Math.abs(diff),MISSILE_TURN);
      }
      m.vx=Math.cos(m.angle)*MISSILE_SPD;m.vy=Math.sin(m.angle)*MISSILE_SPD;
      m.x+=m.vx;m.y+=m.vy;
      m.trail.push({x:m.x,y:m.y,life:15});
      m.trail=m.trail.filter(t=>{t.life--;return t.life>0;});
      if(m.x<0||m.x>W||m.y<0||m.y>H){explodeMissile(m);return false;}
      for(const pl of plats){if(m.x>pl.x&&m.x<pl.x+pl.w&&m.y>pl.y&&m.y<pl.y+pl.h){explodeMissile(m);return false;}}
      if(m.y>=GND){explodeMissile(m);return false;}
      for(const t of g.players){
        if(t.idx===m.owner||t.dead)continue;
        if(!friendlyFire&&sameTeam(m.owner,t.idx))continue;
        if(m.x>t.x-4&&m.x<t.x+PW+4&&m.y>t.y-4&&m.y<t.y+PH+4){explodeMissile(m);return false;}
      }
      return true;
    });

    g.bullets=g.bullets.filter(b=>{
      // Grenade: apply gravity and auto-explode after 1.5s
      if(b.grenade){b.vy=(b.vy||0)+0.2;b.y+=b.vy;if(b.y>=GND){explodeBullet(b);return false;}if(now-b.born>1500){explodeBullet(b);return false;}}
      b.x+=b.vx;if(b.x<-10||b.x>W+10)return false;if(b.y<-10||b.y>H+10)return false;
      let platHit=false;
      if(!b.piercing){
        plats.forEach(pl=>{if(b.x>pl.x&&b.x<pl.x+pl.w&&b.y>pl.y&&b.y<pl.y+pl.h){
          if(b.bouncy){b.vx*=-1;if(b.bouncesLeft!==undefined){b.bouncesLeft--;if(b.bouncesLeft<0){platHit=true;}}}else{platHit=true;}
          for(let i=0;i<3;i++)g.particles.push({x:b.x,y:b.y,vx:(Math.random()-0.5)*4,vy:-Math.random()*3,life:8+Math.random()*5,color:"#ffaa44"});
        }});
      }
      if(platHit){if(b.explosive)explodeBullet(b);return false;}
      for(const t of g.players){
        if(t.idx===b.owner||t.dead||t.invisible||t.dashing>0)continue;
        if(!friendlyFire&&sameTeam(b.owner,t.idx))continue;
        const owner=g.players[b.owner];
        const growMod=owner?owner.stats.enemyGrow*4:0;
        const shrinkMod=t.stats.shrink*4;
        const hitW=PW+growMod-shrinkMod,hitH=PH+growMod-shrinkMod;
        const hx=t.x+PW/2-hitW/2,hy=t.y+PH/2-hitH/2;
        if(b.x>hx-2&&b.x<hx+hitW+2&&b.y>hy&&b.y<hy+hitH){
          let dmg=b.damage;
          if(t.shieldHp>0){t.shieldHp--;dmg=0;t.flash=4;SND.shield();g.dmgNums.push({x:b.x,y:t.y-5,text:"BLOCKED!",color:"#44ffff",life:48,vy:-2});
            for(let i=0;i<6;i++)g.particles.push({x:b.x,y:b.y,vx:(Math.random()-0.5)*5,vy:(Math.random()-0.5)*5,life:12,color:"#4488ff"});
          }else{dmg=Math.max(1,dmg-(t.stats.armor||0));t.hp-=dmg;t.flash=8;SND.hit();t.vx+=b.vx*0.3;t.vy-=2;g.shake={intensity:3,frames:6};g.hitstop=2;t.lastHitBy=b.owner;
            g.dmgNums.push({x:b.x,y:t.y-5,text:"-"+dmg,color:PCOLORS[b.owner],life:48,vy:-2});
            if(b.freeze>0){t.frozen=now+b.freeze;t.vx=0;}
          }
          if(b.lifeSteal>0&&owner&&dmg>0){owner.hp=Math.min(owner.maxHp,owner.hp+b.lifeSteal);}

}

// ============ STORY MODE ============
let storyAnimId=null;

function startStory(){
  frame=0;prevPad[0]={};prevPad[1]={};prevPad[2]={};prevPad[3]={};
  if(mbAnimId){cancelAnimationFrame(mbAnimId);mbAnimId=null;}
  initStory();
  showScreen("fight");
  loadStoryStage(1);
  startStoryLoop();
}

function loadStoryStage(num){
  const sd=STORY_STAGES[num-1];
  storyState.stage=num;storyState.stageComplete=false;storyState.bossActive=false;storyState.boss=null;
  storyState.enemies=[];storyState.enemyBullets=[];storyState.coins_on_ground=[];storyState.grenades=[];
  storyState.particles=[];storyState.dmgNums=[];storyState.ragdolls=[];storyState.casings=[];
  storyState.healthPickups=sd.healthPickups?sd.healthPickups.map(h=>({...h,alive:true})):[];
  storyState.ammoCrates=sd.ammoCrates?sd.ammoCrates.map(a=>({...a,alive:true})):[];
  // Level elements (Phase 1)
  storyState.spikes=sd.spikes?sd.spikes.map(s=>({...s,dir:s.dir||"up",h:s.h||16})):[];
  storyState.acidPools=sd.acidPools||[];
  storyState.movingPlats=sd.movingPlats?sd.movingPlats.map(m=>({...m,dir:1,h:m.h||14})):[];
  storyState.disappearPlats=sd.disappearPlats?sd.disappearPlats.map(d=>({...d,visible:true,warning:false,startTime:Date.now(),period:d.period||4000,onTime:d.onTime||2000,h:d.h||14})):[];
  storyState.turrets=sd.turrets?sd.turrets.map(t=>({...t,hp:t.hp||20,lastShot:0,flash:0,facing:t.facing||1})):[];
  storyState.jumpPads=sd.jumpPads?sd.jumpPads.map(j=>({...j,w:j.w||30,h:j.h||10,cooldown:0,compress:0})):[];
  storyState.crumblePlats=sd.crumblePlats?sd.crumblePlats.map(c=>({...c,state:"solid",triggered:false,triggerTime:0,respawnTime:0,shaking:false,h:c.h||14})):[];
  storyState.weaponPickups=sd.weaponPickups?sd.weaponPickups.map(w=>({...w,alive:true})):[];
  storyState.breakableWalls=sd.breakableWalls?sd.breakableWalls.map(b=>({...b,hits:0,broken:false})):[];
  storyState.ropes=sd.ropes?sd.ropes.map(r=>({...r,angle:r.angle||0,angularVel:0,occupied:false,occupant:null})):[];
  storyState.extraLifePickups=sd.extraLife?[{...sd.extraLife,alive:true}]:[];
  storyState.checkpoints=sd.checkpoints||(sd.checkpoint?[sd.checkpoint]:[]);storyState.checkpoint=0;
  // Spawn enemies based on stage definition
  // Scale difficulty by player count: more players = tougher enemies
  const np=storyState.numPlayers;
  const hpScale=np===1?1:np===2?1.4:1.8; // 40% more HP per extra player
  const dmgScale=np===1?1:np===2?1.2:1.4; // 20% more damage per extra player
  sd.enemies.forEach(e=>{
    const def=ENEMY_DEFS[e.type];
    const spawnY=def.flying?150+Math.random()*100:GND-def.h;
    // Variant roll: 60% normal, 30% red (enraged), 10% gold (treasure)
    const roll=Math.random();
    let variant="normal",vHpMult=1,vDmgMult=1,vSpdMult=1,vCoinMult=1,vSizeMult=1;
    if(roll>0.9){variant="gold";vHpMult=1.5;vCoinMult=3;vSizeMult=1.15;}
    else if(roll>0.6){variant="red";vHpMult=1.3;vDmgMult=1.3;vSpdMult=1.4;vSizeMult=1.1;}
    const scaledHp=Math.round(def.hp*hpScale*vHpMult),scaledDmg=Math.round((def.damage||5)*dmgScale*vDmgMult);
    const vSpeed=Math.round((def.speed||1)*vSpdMult*10)/10;
    const vCoins=Math.round((def.coins||5)*vCoinMult);
    storyState.enemies.push({type:e.type,...def,speed:vSpeed,damage:scaledDmg,coins:vCoins,
      x:e.x,y:spawnY,spawnX:e.x,preSpawn:true,walkingIn:false,vx:0,vy:0,hp:scaledHp,maxHp:scaledHp,
      w:Math.round(def.w*vSizeMult),h:Math.round(def.h*vSizeMult),
      variant,facing:-1,lastShot:0,spawned:false,dead:false,flash:0,ai:{state:"idle",timer:0}});
  });
  // Boss
  if(sd.boss){
    const b=sd.boss;
    const bossHp=Math.round(b.hp*hpScale);
    storyState.boss={type:b.type,x:b.x,y:GND-b.height,hp:bossHp,maxHp:bossHp,width:b.width,height:b.height,
      speed:b.speed,damage:b.damage,color:b.color,facing:-1,flash:0,lastAttack:Date.now(),attackCD:2500,
      state:"chase",vy:0,shockwave:null,dead:false,stateTimer:Date.now(),lastStomp:Date.now(),lastBlob:Date.now(),lastSlam:Date.now(),lastSlime:Date.now(),lastSpawn:Date.now(),lastRain:Date.now()};
  }
  // Players
  storyState.players=[];
  for(let pi=0;pi<storyState.numPlayers;pi++){
    const st=getStats(storyState.playerCards[pi]);
    const wpn=storyState.playerWeapons[pi];
    const ggw=GG_WEAPONS[wpn];
    storyState.players.push({x:80+pi*30,y:GND-PH,vx:0,vy:0,hp:st.maxHp,maxHp:st.maxHp,facing:1,onGround:false,
      lastShot:0,ammo:ggw.ammo,reloading:false,reloadStart:0,flash:0,stats:st,
      dashing:0,dashDir:0,dashCooldown:0,dashTrail:[],wallSlide:0,jumpsLeft:1+st.extraJumps,
      muzzleFlash:0,squash:0,dead:false,downed:false,downedTime:0,invincible:0,weapon:wpn,idx:pi,color:PCOLORS[pi],grenadeAmmo:3,
      _wasOnGround:false,_onRope:false});
  }
  storyState.cameraX=0;
  // Countdown
  storyState.briefing=true;storyState.briefingStart=Date.now();
