  storyState.countdown=3;storyState.countdownStart=Date.now()+2000;storyState.countdownDone=false;
  storyState.shake={intensity:0,frames:0};storyState.hitstop=0;
}

function startStoryLoop(){
  if(storyAnimId)cancelAnimationFrame(storyAnimId);
  if(animId){cancelAnimationFrame(animId);animId=null;}
  if(menuAnimId){cancelAnimationFrame(menuAnimId);menuAnimId=null;}
  MUSIC.start(["warehouse","ruins","lava","space"][storyState.stage-1]||"warehouse");

  function storyUpdate(){
    const ss=storyState,k=keys,now=Date.now();
    if(!ss.players.length||ss.stageComplete)return;
    // Run player update for each player
    const p=ss.players[0]; // P1 alias for legacy code below
    // Mission briefing phase
    if(ss.briefing){if(Date.now()-ss.briefingStart>=2000)ss.briefing=false;return;}
    if(ss.hitstop>0){ss.hitstop--;return;}
    // Countdown
    if(!ss.countdownDone){
      const elapsed=now-ss.countdownStart;
      const step=Math.floor(elapsed/700);
      if(step<3){ss.countdown=3-step;}
      else if(step===3){ss.countdown=0;}
      else if(elapsed>=3*700+400){ss.countdownDone=true;}
      return;
    }
    if(ss.players.every(pl=>pl.dead))return;
    // Gamepad pause check (must run even when paused so controller can unpause)
    if(paused){
      for(let gpi=0;gpi<ss.numPlayers;gpi++){
        const gp=readPad(gpi),pp=prevPad[gpi]||{};
        if(gp&&gp.start&&!pp.start)togglePause();
        if(gp&&gp.a&&!pp.a){
          if(pauseSel===0)togglePause();
          else if(pauseSel===1){paused=false;MUSIC.stop();if(storyAnimId){cancelAnimationFrame(storyAnimId);storyAnimId=null;}goTitle();}
        }
        if(gp){
          if((gp.dU&&!pp.dU)||(gp.ly<-0.5&&!(pp.ly<-0.5)))pauseSel=(pauseSel+1)%2;
          if((gp.dD&&!pp.dD)||(gp.ly>0.5&&!(pp.ly>0.5)))pauseSel=(pauseSel+1)%2;
        }
        prevPad[gpi]=readPad(gpi)||{};
      }
      return;
    }
    frame++;
    const sd=STORY_STAGES[ss.stage-1];
    const plats=sd.plats;
    const ggw=GG_WEAPONS[p.weapon];

    // Reload
    const p1ReloadTime=Math.max(300,RELOAD_TIME+(p.stats.reloadMult||0));
    if(p.reloading&&now-p.reloadStart>=p1ReloadTime){p.ammo=ggw.ammo;p.reloading=false;SND.reload();}
    if(p.invincible>0)p.invincible--;
    if(p.muzzleFlash>0)p.muzzleFlash--;
    if(p.squash>0)p.squash--;
    if(p.flash>0)p.flash--;

    // Skip input if P1 is downed, dead, or on rope (rope handles its own physics)
    if(!p.downed&&!p.dead&&!p._onRope){
    // Player input
    if(p.dashing>0){
      p.dashing--;p.vx=14*p.dashDir;
      p.dashTrail.push({x:p.x,y:p.y,life:6});
      if(p.dashing<=0)p.dashCooldown=now+1000;
    }else{
      p.dashTrail=p.dashTrail.filter(t=>{t.life--;return t.life>0;});
      const gp=readPad(0);
      let left=k.a,right=k.d,jump=k.w,shoot=k.f;
      if(gp){
        if(gp.lx<-0.3||gp.dL)left=true;
        if(gp.lx>0.3||gp.dR)right=true;
        if(gp.a)jump=true;
        if(gp.x||gp.rt||gp.rb)shoot=true;
        if(gp.b&&!prevPad[0].b&&now>p.dashCooldown){p.dashing=8;p.dashDir=gp.lx<-0.3?-1:gp.lx>0.3?1:p.facing;SND.dash();p.dashTrail=[];}
        if((gp.y&&!prevPad[0].y)||(gp.rb&&!prevPad[0].rb)){
          const owned=ss.playerOwnedWeapons[0];
          if(owned.length>1){const ci=owned.indexOf(p.weapon||0);p.weapon=owned[(ci+1)%owned.length];ss.playerWeapons[0]=p.weapon;p.ammo=GG_WEAPONS[p.weapon].ammo;p.reloading=false;SND.menuNav();}
        }
        if(gp.start&&!prevPad[0].start)togglePause();
        if(gp.lt&&!prevPad[0].lt&&p.grenadeAmmo>0){p.grenadeAmmo--;ss.grenades.push({x:p.x+PW/2+p.facing*10,y:p.y+10,vx:5*p.facing,vy:-6,owner:0,born:now});SND.missile();}
        if(gp.lb&&!prevPad[0].lb&&!p.reloading&&p.ammo<GG_WEAPONS[p.weapon].ammo){p.reloading=true;p.reloadStart=now;}
      }
      if(left){p.vx=-p.stats.speed;p.facing=-1;}
      else if(right){p.vx=p.stats.speed;p.facing=1;}
      else p.vx=0;
      // Wall jump — only trigger on fresh press
      const jumpFresh=jump&&!p._prevJump;
      p._prevJump=jump;
      if(jumpFresh&&p.wallSlide!==0){p.vx=6*(-p.wallSlide);p.vy=-10;p.wallSlide=0;SND.jump();p.flipping=true;p.flipAngle=0;p.flipDir=p.facing;}
      else if(jumpFresh&&(p.onGround||p.jumpsLeft>0)){
        p.vy=-p.stats.jumpPower;SND.jump();p.flipping=true;p.flipAngle=0;p.flipDir=p.facing;
        if(p.onGround){p.onGround=false;p.jumpsLeft=p.stats.extraJumps;}
        else p.jumpsLeft--;
      }
      // Shoot
      if(shoot&&!p.reloading&&p.ammo>0&&now-p.lastShot>ggw.fireRate){
        const bx=p.x+PW/2+p.facing*14,by=p.y+4;
        for(let s=0;s<ggw.count;s++){
          const ang=ggw.count>1?(s-(ggw.count-1)/2)*ggw.spread*2/(ggw.count-1):0;
          ss.particles.push({x:bx,y:by,vx:-p.facing*(1+Math.random()*2),vy:-2-Math.random()*2,life:999,landed:false,casing:true}); // casing
          const bvx=Math.cos(ang)*ggw.speed*p.facing;
          ss.enemyBullets.push({x:bx,y:by,vx:bvx,vy:Math.sin(ang)*ggw.speed,damage:ggw.damage+p.stats.damage-8,
            owner:-1,friendly:true,sz:ggw.sz,explosive:ggw.explode,bouncy:ggw.bounces>0,bouncesLeft:ggw.bounces||0});
        }
        SND.shoot();p.lastShot=now;p.ammo--;p.muzzleFlash=3;
        if(p.ammo<=0){p.reloading=true;p.reloadStart=now;}
      }
      prevPad[0]=readPad(0)||{};
    }

    // Player physics
    p.vy+=GRAVITY;p.x+=p.vx;p.y+=p.vy;p.onGround=false;
    // Ground collision — check ground sections if stage has gaps
    const hasGround=!sd.groundSections||sd.groundSections.some(gs=>p.x+PW>gs.startX&&p.x<gs.endX);
    if(p.y+PH>=GND&&hasGround){p.y=GND-PH;p.vy=0;p.onGround=true;p.jumpsLeft=1+p.stats.extraJumps;if(!p._wasOnGround)p.squash=4;}
    plats.forEach(pl=>{
      if(p.x+PW>pl.x&&p.x<pl.x+pl.w&&p.y+PH>pl.y&&p.y<pl.y+pl.h){
        const oT=p.y+PH-pl.y;
        if(oT<10&&p.vy>=0){p.y=pl.y-PH;p.vy=0;p.onGround=true;p.jumpsLeft=1+p.stats.extraJumps;if(!p._wasOnGround)p.squash=4;}
      }
    });
    p._wasOnGround=p.onGround;
    // Clamp to stage bounds
    if(p.x<0)p.x=0;if(p.x>sd.width-PW)p.x=sd.width-PW;
    // Wall slide
    p.wallSlide=0;
    if(!p.onGround&&p.vy>0){
      if(p.x<=0){p.wallSlide=-1;p.vy=Math.min(p.vy,1.5);}
      else if(p.x>=sd.width-PW){p.wallSlide=1;p.vy=Math.min(p.vy,1.5);}
    }
    } // end P1 alive check
    // Extra players update (P2, P3, etc.)
    for(let epi=1;epi<ss.numPlayers;epi++){
      const ep=ss.players[epi];if(!ep||ep.dead||ep.downed||ep._onRope)continue;
      const ekm=KMAPS[epi],egp=readPad(epi),eggw=GG_WEAPONS[ep.weapon];
      const epReloadTime=Math.max(300,RELOAD_TIME+(ep.stats.reloadMult||0));
      if(ep.reloading&&now-ep.reloadStart>=epReloadTime){ep.ammo=eggw.ammo;ep.reloading=false;SND.reload();}
      if(ep.invincible>0)ep.invincible--;if(ep.muzzleFlash>0)ep.muzzleFlash--;if(ep.squash>0)ep.squash--;if(ep.flash>0)ep.flash--;
      if(ep.dashing>0){ep.dashing--;ep.vx=14*ep.dashDir;ep.dashTrail.push({x:ep.x,y:ep.y,life:6});if(ep.dashing<=0)ep.dashCooldown=now+1000;}
      else{
        ep.dashTrail=ep.dashTrail.filter(t=>{t.life--;return t.life>0;});
        let el=k[ekm.left],er=k[ekm.right],ej=k[ekm.up],es=k[ekm.shoot];
        if(egp){if(egp.lx<-0.3||egp.dL)el=true;if(egp.lx>0.3||egp.dR)er=true;if(egp.a)ej=true;if(egp.x||egp.rt)es=true;
          if(egp.b&&!prevPad[epi].b&&now>ep.dashCooldown){ep.dashing=8;ep.dashDir=egp.lx<-0.3?-1:egp.lx>0.3?1:ep.facing;SND.dash();ep.dashTrail=[];}
          if((egp.y&&!prevPad[epi].y)||(egp.rb&&!prevPad[epi].rb)){
            const owned=ss.playerOwnedWeapons[epi];
            if(owned&&owned.length>1){const ci=owned.indexOf(ep.weapon||0);ep.weapon=owned[(ci+1)%owned.length];ss.playerWeapons[epi]=ep.weapon;ep.ammo=GG_WEAPONS[ep.weapon].ammo;ep.reloading=false;SND.menuNav();}
          }
          if(egp.lt&&!prevPad[epi].lt&&ep.grenadeAmmo>0){ep.grenadeAmmo--;ss.grenades.push({x:ep.x+PW/2+ep.facing*10,y:ep.y+10,vx:5*ep.facing,vy:-6,owner:epi,born:now});SND.missile();}
          if(egp.lb&&!prevPad[epi].lb&&!ep.reloading&&ep.ammo<GG_WEAPONS[ep.weapon].ammo){ep.reloading=true;ep.reloadStart=now;}
        }
        if(el){ep.vx=-ep.stats.speed;ep.facing=-1;}else if(er){ep.vx=ep.stats.speed;ep.facing=1;}else ep.vx=0;
        const ejFresh=ej&&!ep._prevJump;ep._prevJump=ej;
        if(ejFresh&&ep.wallSlide!==0){ep.vx=6*(-ep.wallSlide);ep.vy=-10;ep.wallSlide=0;SND.jump();ep.flipping=true;ep.flipAngle=0;ep.flipDir=ep.facing;}
        else if(ejFresh&&(ep.onGround||ep.jumpsLeft>0)){ep.vy=-ep.stats.jumpPower;SND.jump();ep.flipping=true;ep.flipAngle=0;ep.flipDir=ep.facing;if(ep.onGround){ep.onGround=false;ep.jumpsLeft=ep.stats.extraJumps;}else ep.jumpsLeft--;}
        if(es&&!ep.reloading&&ep.ammo>0&&now-ep.lastShot>eggw.fireRate){
          const bx=ep.x+PW/2+ep.facing*14,by=ep.y+4;
          for(let s=0;s<eggw.count;s++){const ang=eggw.count>1?(s-(eggw.count-1)/2)*eggw.spread*2/(eggw.count-1):0;
            ss.enemyBullets.push({x:bx,y:by,vx:Math.cos(ang)*eggw.speed*ep.facing,vy:Math.sin(ang)*eggw.speed,damage:eggw.damage+ep.stats.damage-8,owner:epi,friendly:true,sz:eggw.sz,explosive:eggw.explode,bouncy:eggw.bounces>0,bouncesLeft:eggw.bounces||0});}
          SND.shoot();ep.lastShot=now;ep.ammo--;ep.muzzleFlash=3;if(ep.ammo<=0){ep.reloading=true;ep.reloadStart=now;}}
        prevPad[epi]=readPad(epi)||{};
      }
      ep.vy+=GRAVITY;ep.x+=ep.vx;ep.y+=ep.vy;ep.onGround=false;
      const epHasGnd=!sd.groundSections||sd.groundSections.some(gs=>ep.x+PW>gs.startX&&ep.x<gs.endX);
      if(ep.y+PH>=GND&&epHasGnd){ep.y=GND-PH;ep.vy=0;ep.onGround=true;ep.jumpsLeft=1+ep.stats.extraJumps;if(!ep._wasOnGround)ep.squash=4;}
      plats.forEach(pl=>{if(ep.x+PW>pl.x&&ep.x<pl.x+pl.w&&ep.y+PH>pl.y&&ep.y<pl.y+pl.h){const oT=ep.y+PH-pl.y;if(oT<10&&ep.vy>=0){ep.y=pl.y-PH;ep.vy=0;ep.onGround=true;ep.jumpsLeft=1+ep.stats.extraJumps;if(!ep._wasOnGround)ep.squash=4;}}});
      ep._wasOnGround=ep.onGround;
      if(ep.x<0)ep.x=0;if(ep.x>sd.width-PW)ep.x=sd.width-PW;
      ep.wallSlide=0;
      if(!ep.onGround&&ep.vy>0){if(ep.x<=0){ep.wallSlide=-1;ep.vy=Math.min(ep.vy,1.5);}else if(ep.x>=sd.width-PW){ep.wallSlide=1;ep.vy=Math.min(ep.vy,1.5);}}
    }

    // Camera — follow midpoint of alive players
    const aliveSP=ss.players.filter(pl=>!pl.dead);
    if(aliveSP.length>1){
      const midX=aliveSP.reduce((s,pl)=>s+pl.x,0)/aliveSP.length;
      ss.cameraX=Math.max(0,Math.min(sd.width-W,midX-W/2));
    }else if(aliveSP.length===1){
      ss.cameraX=Math.max(0,Math.min(sd.width-W,aliveSP[0].x-300));
    }
    // Don't let players go behind camera
    ss.players.forEach(pl=>{if(!pl.dead&&pl.x<ss.cameraX)pl.x=ss.cameraX;});

    // Checkpoint
    if(ss.checkpoints&&ss.checkpoints.length){
      ss.checkpoints.forEach(cx=>{
        if(cx>ss.checkpoint&&aliveSP.some(pl=>Math.abs(pl.x+PW/2-cx)<30)){
          ss.checkpoint=cx;
          ss.dmgNums.push({x:cx,y:GND-60,text:"CHECKPOINT!",color:"#44ff66",life:90,vy:-1.5});
          SND.pickup();
        }
      });
    }

    // Enemy update
    ss.enemies.forEach(e=>{
      if(e.dead)return;
      // Pre-spawn: dormant until a player gets within 600px of spawnX
      if(e.preSpawn){
        let nearestDist=Infinity,nearestP=null;
        ss.players.forEach(tp=>{if(!tp.dead){const d=Math.abs(tp.x-e.spawnX);if(d<nearestDist){nearestDist=d;nearestP=tp;}}});
        if(nearestP&&nearestDist<600){
          if(e.flying){e.x=e.spawnX;e.y=10;e.facing=nearestP.x<e.spawnX?-1:1;}
          else if(e.spawnX>=ss.cameraX+W/2){e.x=ss.cameraX+W+30;e.facing=-1;}
          else{e.x=ss.cameraX-30-e.w;e.facing=1;}
          e.preSpawn=false;e.walkingIn=true;e.spawned=true;
        }
        return;
      }
      // Walking in: move toward spawnX, then begin normal AI
      if(e.walkingIn){
        const dx=e.spawnX-e.x;
        e.x+=Math.sign(dx)*e.speed;
        if(e.flying){
          const targetY=e.hoverY||(GND-220),dy=targetY-e.y;
          e.y+=Math.sign(dy)*Math.min(2,Math.abs(dy));
          e.y=Math.max(10,Math.min(GND-20,e.y));
          if(Math.abs(dx)<5&&Math.abs(dy)<5){e.x=e.spawnX;e.y=targetY;e.walkingIn=false;}
        }else{
          e.vy=(e.vy||0)+GRAVITY;e.y+=e.vy;
          if(e.y+e.h>=GND){e.y=GND-e.h;e.vy=0;}
          if(Math.abs(dx)<5){e.x=e.spawnX;e.walkingIn=false;}
        }
        if(e.flash>0)e.flash--;
        return;
      }
      // Skip AI for enemies left far behind by camera
      if(e.x<ss.cameraX-200){e.spawned=true;return;}
      e.spawned=true;
      // Find closest alive player
      let closestP=null,closestDist=Infinity;
      ss.players.forEach(tp=>{if(!tp.dead){const d=Math.abs(tp.x-e.x);if(d<closestDist){closestDist=d;closestP=tp;}}});
      if(!closestP)return;
      const dx=closestP.x-e.x,dist=Math.abs(dx);
      e.facing=dx>0?1:-1;
      // AI by type
      if(e.type==="grunt"){
        if(dist>200){e.vx=e.speed*e.facing;}else{e.vx=0;
          if(e.ranged&&now-e.lastShot>e.fireRate){
            ss.enemyBullets.push({x:e.x+e.w/2+e.facing*10,y:e.y+e.h/2,vx:e.bulletSpeed*e.facing,vy:0,damage:e.damage,friendly:false,sz:3});
            e.lastShot=now;
          }
        }
      }else if(e.type==="rusher"){
        e.vx=e.speed*e.facing;
        // Check contact with ALL players
        ss.players.forEach(tp=>{
          if(tp.dead||tp.invincible>0||tp.dashing>0)return;
          const rdist=Math.abs(tp.x-e.x);
          if(rdist<PW+e.w&&Math.abs(tp.y-e.y)<PH){
            tp.hp-=e.damage;tp.flash=8;tp.vx=e.facing*5;tp.vy=-3;SND.hit();
            ss.shake={intensity:3,frames:6};ss.hitstop=2;
            ss.dmgNums.push({x:tp.x+PW/2,y:tp.y-5,text:"-"+e.damage,color:"#ff4444",life:48,vy:-2});
          }
        });
      }else if(e.type==="tank"){
        if(dist>150){e.vx=e.speed*e.facing;}else{e.vx=0;
          if(now-e.lastShot>e.fireRate){
            for(let s=-1;s<=1;s++){
              ss.enemyBullets.push({x:e.x+e.w/2+e.facing*15,y:e.y+e.h/2,vx:e.bulletSpeed*e.facing,vy:s*1.5,damage:e.damage,friendly:false,sz:4});
            }
            e.lastShot=now;
          }
        }
      }else if(e.type==="stalker"){
        if(dist>250){e.vx=e.speed*e.facing;}
        else if(dist>100){e.vx=0;
          if(now-e.lastShot>e.fireRate){
            ss.enemyBullets.push({x:e.x+e.w/2+e.facing*10,y:e.y+e.h/2,vx:e.bulletSpeed*e.facing,vy:0,damage:e.damage,friendly:false,sz:3});
            e.lastShot=now;
          }
        }else{e.vx=-e.speed*e.facing;} // retreat
      }else if(e.type==="bomber"){
        // Flying suicide bomber — flies toward closest player, explodes on contact or wall hit
        if(!e.flyY)e.flyY=e.y; // initial hover height
        const angle=Math.atan2(closestP.y-e.y,closestP.x-e.x);
        e.vx=Math.cos(angle)*e.speed;e.vy=Math.sin(angle)*e.speed;
        // Check contact with players — explode
        ss.players.forEach(tp=>{
          if(tp.dead||tp.invincible>0||tp.dashing>0)return;
          if(Math.abs(tp.x-e.x)<PW+e.w/2&&Math.abs(tp.y-e.y)<PH+e.h/2){
            e.hp=0; // trigger death/explosion below
          }
        });
      }else if(e.type==="flyer"){
        // Aerial dive-bomber — hover, telegraph, dive, recover
        if(!e.flyState){e.flyState="hover";e.hoverY=e.hoverY||(GND-220);e.flyTimer=0;}
        if(e.flyState==="hover"){
          e.vx=Math.sign(closestP.x-e.x)*e.speed;
          e.vy=(e.hoverY-e.y)*0.05;
          if(dist<150){e.flyState="telegraph";e.flyTimer=now;e.diveTargetX=closestP.x+PW/2;e.diveTargetY=closestP.y+PH/2;}
        }else if(e.flyState==="telegraph"){
          e.vx=0;e.vy=0;
          if(now-e.flyTimer>500){
            e.flyState="dive";
            const a=Math.atan2(e.diveTargetY-e.y,e.diveTargetX-e.x);
            e.vx=Math.cos(a)*e.diveSpeed;e.vy=Math.sin(a)*e.diveSpeed;
          }
        }else if(e.flyState==="dive"){
          let hitP=false;
          ss.players.forEach(tp=>{
            if(tp.dead||tp.invincible>0||tp.dashing>0)return;
            if(Math.abs(tp.x+PW/2-e.x-e.w/2)<PW/2+e.w/2&&Math.abs(tp.y+PH/2-e.y-e.h/2)<PH/2+e.h/2){
              tp.hp-=e.damage;tp.flash=8;tp.vx+=Math.sign(e.vx)*5;tp.vy=-4;SND.hit();
              ss.shake={intensity:3,frames:6};
              ss.dmgNums.push({x:tp.x+PW/2,y:tp.y-5,text:"-"+e.damage,color:"#ff4444",life:48,vy:-2});
              hitP=true;
            }
          });
          if(hitP){e.flyState="recover";e.flyTimer=now;e.vy=-5;e.vx*=-0.5;}
          else if(e.y+e.h>=GND){e.hp-=3;e.flash=4;e.flyState="recover";e.flyTimer=now;e.vy=-3;e.vx=0;}
        }else if(e.flyState==="recover"){
          e.vy=(e.hoverY-e.y)*0.04;e.vx*=0.9;
          if(now-e.flyTimer>1000)e.flyState="hover";
        }
      }
      // Physics
      if(e.type==="bomber"&&e.flying){
        // Bombers fly — no gravity, but check walls/platforms to explode
        e.x+=e.vx;e.y+=e.vy;
        let hitWall=false;
        if(e.y+e.h>=GND||e.y<0){hitWall=true;}
        if(e.x<0||e.x+e.w>sd.width){hitWall=true;}
        plats.forEach(pl=>{if(e.x+e.w>pl.x&&e.x<pl.x+pl.w&&e.y+e.h>pl.y&&e.y<pl.y+pl.h){hitWall=true;}});
        if(hitWall){e.hp=0;} // explode
      }else if(e.type==="flyer"){
        e.x+=e.vx;e.y+=e.vy;
        if(e.x<0){e.x=0;e.vx=Math.abs(e.vx);}
        if(e.x+e.w>sd.width){e.x=sd.width-e.w;e.vx=-Math.abs(e.vx);}
        if(e.y+e.h>GND)e.y=GND-e.h;
        if(e.y<10)e.y=10;
      }else{
        e.vy=(e.vy||0)+GRAVITY;e.x+=e.vx;e.y+=e.vy;
        if(e.y+e.h>=GND){e.y=GND-e.h;e.vy=0;}
      }
      // Bomber immediate death check — explode on contact/wall
      if(e.type==="bomber"&&e.hp<=0&&!e.dead){
        e.dead=true;SND.explode();ss.enemiesKilled++;ss.shake={intensity:5,frames:8};
        for(let i=0;i<18;i++)ss.particles.push({x:e.x+e.w/2,y:e.y+e.h/2,vx:(Math.random()-0.5)*12,vy:(Math.random()-0.5)*12,life:16,color:["#ff4400","#ff8800","#44ff44"][Math.floor(Math.random()*3)]});
        // Damage all players in radius — 50% of max HP
        ss.players.forEach(tp=>{if(tp.dead||tp.invincible>0)return;
          const dx=tp.x+PW/2-e.x-e.w/2,dy=tp.y+PH/2-e.y-e.h/2,dist=Math.sqrt(dx*dx+dy*dy);
          if(dist<e.explodeRadius){
            const dmg=Math.round(tp.maxHp*0.5*(1-dist/e.explodeRadius));
            tp.hp-=dmg;tp.flash=8;const a2=Math.atan2(dy,dx);tp.vx+=Math.cos(a2)*6;tp.vy-=4;
            ss.dmgNums.push({x:tp.x+PW/2,y:tp.y-5,text:"-"+dmg,color:"#ff4444",life:48,vy:-2});
          }});
        for(let c=0;c<e.coins;c++)ss.coins_on_ground.push({x:e.x+e.w/2+(Math.random()-0.5)*20,y:e.y,vy:-3-Math.random()*3,vx:(Math.random()-0.5)*3,grounded:false});
      }
      // Platform collision (non-bombers only)
      if(e.type!=="bomber"){
      plats.forEach(pl=>{
        if(e.x+e.w>pl.x&&e.x<pl.x+pl.w&&e.y+e.h>pl.y&&e.y<pl.y+pl.h){
          const oT=e.y+e.h-pl.y,oB=pl.y+pl.h-e.y,oL=e.x+e.w-pl.x,oR=pl.x+pl.w-e.x;
          const m=Math.min(oT,oB,oL,oR);
          if(m===oT&&e.vy>=0){e.y=pl.y-e.h;e.vy=0;}
          else if(m===oL){e.x=pl.x-e.w;e.vx=0;e.facing*=-1;}
          else if(m===oR){e.x=pl.x+pl.w;e.vx=0;e.facing*=-1;}
        }
      });
      // Stage bounds — bounce off edges
      if(e.x<0){e.x=0;e.vx=0;e.facing=1;}
      if(e.x+e.w>sd.width){e.x=sd.width-e.w;e.vx=0;e.facing=-1;}
      // Spike avoidance — reverse if about to walk into spikes
      if(ss.spikes){ss.spikes.forEach(sp=>{
        if(e.y+e.h>sp.y&&e.x+e.w>sp.x-10&&e.x<sp.x+sp.w+10){
          if(e.vx>0&&e.x<sp.x){e.x=sp.x-e.w-2;e.vx=0;e.facing=-1;}
          else if(e.vx<0&&e.x>sp.x){e.x=sp.x+sp.w+2;e.vx=0;e.facing=1;}
        }
      });}
      } // end non-bomber collision
      if(e.flash>0)e.flash--;
    });

    // Boss update — active AI
    if(ss.boss&&!ss.boss.dead){
      const b=ss.boss;
      if(aliveSP.some(tp=>tp.x>sd.width-1200)||aliveSP.some(tp=>Math.abs(tp.x-b.x)<500)){
        if(!ss.bossActive){SND.bossIntro();ss.bossIntroTime=Date.now();}ss.bossActive=true;
      }
      if(ss.bossActive){
        const bTarget=aliveSP.reduce((c,tp)=>Math.abs(tp.x-b.x)<Math.abs(c.x-b.x)?tp:c,aliveSP[0]);
        const bdx=bTarget.x-b.x;b.facing=bdx>0?1:-1;
        const bMinX=Math.max(0,sd.width-1200),bMaxX=sd.width-b.width-20;
        if(!b.stateTimer)b.stateTimer=now;

        if(b.type==="megagrunt"){
          // MEGA GRUNT — melee-focused giant
          const dist=Math.abs(bdx);
          if(b.state==="chase"){
            // Move toward player
            b.x+=b.speed*1.5*b.facing;
            // Charge if close enough
            if(dist<300&&now-b.stateTimer>1000){b.state="charge";b.stateTimer=now;}
            // Stomp if very close
            if(dist<80&&now-b.lastStomp>3000){
              b.state="stomp";b.stateTimer=now;b.lastStomp=now;
            }
            // Blob spit if far
            if(dist>200&&now-b.lastBlob>4000){
              b.lastBlob=now;
              for(let i=-1;i<=1;i++){
                ss.enemyBullets.push({x:b.x+b.width/2,y:b.y+20,vx:4*b.facing+i*1.5,vy:-6,damage:b.damage,friendly:false,sz:7,gravity:true,bossBlob:true});
              }
              SND.missile();
            }
          }else if(b.state==="charge"){
            b.x+=b.speed*3*b.facing;
            if(now-b.stateTimer>2000){b.state="pause";b.stateTimer=now;}
          }else if(b.state==="pause"){
            if(now-b.stateTimer>1000){b.state="chase";b.stateTimer=now;}
          }else if(b.state==="stomp"){
            if(now-b.stateTimer<200){b.y-=2;} // rise
            else if(now-b.stateTimer<400){b.y+=4;} // slam down
            else{
              b.y=GND-b.height; // reset
              // Shockwave
              ss.enemyBullets.push({x:b.x+b.width/2,y:GND-8,vx:-4,vy:0,damage:15,friendly:false,sz:4,shockwave:true,life:100});
              ss.enemyBullets.push({x:b.x+b.width/2,y:GND-8,vx:4,vy:0,damage:15,friendly:false,sz:4,shockwave:true,life:100});
              ss.shake={intensity:6,frames:10};SND.explode();
              b.state="pause";b.stateTimer=now;
            }
          }
          // Ground slam every 8s
          if(b.state==="chase"&&now-b.lastSlam>8000){
            b.lastSlam=now;b.state="stomp";b.stateTimer=now;b.lastStomp=now;
          }
        }else if(b.type==="hivequeen"){
          // HIVE QUEEN — flying ranged boss
          // Hover movement — sine wave
          b.y=150+Math.sin(now*0.001)*40;
          b.x+=Math.sin(now*0.0008)*1.5;
          // Phase calculation
          const hpPct=b.hp/b.maxHp;
          const phase=hpPct>0.66?1:hpPct>0.33?2:3;
          const spdMult=phase>=2?1.5:1;
          const freqMult=phase>=2?0.5:1;
          // Homing slime shots
          if(now-b.lastSlime>1500*freqMult){
            b.lastSlime=now;
            const numShots=phase>=2?3:2;
            for(let i=0;i<numShots;i++){
              const angle=Math.atan2(bTarget.y-b.y,bTarget.x-b.x)+((Math.random()-0.5)*0.4);
              ss.enemyBullets.push({x:b.x+b.width/2,y:b.y+b.height/2,vx:Math.cos(angle)*2.5*spdMult,vy:Math.sin(angle)*2.5*spdMult,damage:10,friendly:false,sz:5,homing:true,target:bTarget});
            }
          }
          // Spawn grunts
          if(now-b.lastSpawn>6000*freqMult){
            b.lastSpawn=now;
            const numGrunts=phase>=2?2:1;
            const liveGrunts=ss.enemies.filter(e=>!e.dead&&e.type==="grunt").length;
            if(liveGrunts<3){
              for(let g=0;g<numGrunts;g++){
                const def=ENEMY_DEFS.grunt;
                ss.enemies.push({type:"grunt",...def,hp:5,maxHp:5,x:b.x+Math.random()*b.width,y:GND-def.h,vx:0,vy:0,
                  facing:-1,lastShot:0,spawned:true,dead:false,flash:0,ai:{state:"idle",timer:0}});
              }
            }
          }
          // Slime rain (every 10s)
          if(now-b.lastRain>10000*freqMult){
            b.lastRain=now;
            const numDrops=phase>=3?12:8;
            for(let d=0;d<numDrops;d++){
              const rx=bMinX+Math.random()*(bMaxX-bMinX);
              ss.enemyBullets.push({x:rx,y:-20-Math.random()*60,vx:0,vy:2+Math.random()*2,damage:8,friendly:false,sz:5,gravity:true});
            }
          }
          // Phase transition flashes
          if(!b.phase2Triggered&&hpPct<=0.66){b.phase2Triggered=true;ss.shake={intensity:5,frames:15};ss.dmgNums.push({x:b.x+b.width/2,y:b.y-30,text:"ENRAGED!",color:"#ff4444",life:90,vy:-1});}
          if(!b.phase3Triggered&&hpPct<=0.33){b.phase3Triggered=true;ss.shake={intensity:8,frames:20};ss.dmgNums.push({x:b.x+b.width/2,y:b.y-30,text:"FINAL STAND!",color:"#ff0000",life:90,vy:-1});}
        }
        // Clamp position
        if(b.x<bMinX)b.x=bMinX;if(b.x>bMaxX)b.x=bMaxX;
        if(b.type==="megagrunt"&&b.y>GND-b.height)b.y=GND-b.height;
      }
      if(b.flash>0)b.flash--;
    }
    // Shockwave + homing bullet updates
    ss.enemyBullets.forEach(b=>{
      if(b.shockwave){b.life--;if(b.life<=0)b.dead=true;}
      if(b.homing&&b.target&&!b.target.dead){
        const dx=b.target.x+PW/2-b.x,dy=b.target.y+PH/2-b.y;
        const a=Math.atan2(dy,dx);b.vx+=(Math.cos(a)*0.1);b.vy+=(Math.sin(a)*0.1);
        const spd=Math.sqrt(b.vx*b.vx+b.vy*b.vy);if(spd>4){b.vx*=4/spd;b.vy*=4/spd;}
      }
    });

    // Bullets (player + enemy)
    ss.enemyBullets=ss.enemyBullets.filter(b=>{
      if(b.gravity)b.vy=(b.vy||0)+0.15;
      b.x+=b.vx;b.y+=(b.vy||0);
      if(b.x<ss.cameraX-50||b.x>ss.cameraX+W+50||b.y<-50||b.y>H+50)return false;
      if(b.friendly){
        // Player bullet hits enemies
        for(const e of ss.enemies){
          if(e.dead)continue;
          if(b.x>e.x&&b.x<e.x+e.w&&b.y>e.y&&b.y<e.y+e.h){
            e.hp-=b.damage;e.flash=6;SND.hit();ss.hitstop=2;ss.shake={intensity:2,frames:4};
            ss.dmgNums.push({x:b.x,y:e.y-5,text:"-"+b.damage,color:"#ff4466",life:48,vy:-2});
            if(e.hp<=0){
              e.dead=true;SND.die();ss.enemiesKilled++;
              // Bomber explosion — area damage
              if(e.type==="bomber"){
                SND.explode();ss.shake={intensity:5,frames:8};
                for(let i=0;i<18;i++)ss.particles.push({x:e.x+e.w/2,y:e.y+e.h/2,vx:(Math.random()-0.5)*12,vy:(Math.random()-0.5)*12,life:16,color:["#ff4400","#ff8800","#44ff44"][Math.floor(Math.random()*3)]});
                ss.players.forEach(tp=>{if(tp.dead||tp.invincible>0)return;const dx=tp.x+PW/2-e.x-e.w/2,dy=tp.y+PH/2-e.y-e.h/2,dist=Math.sqrt(dx*dx+dy*dy);
                  if(dist<60){tp.hp-=Math.round(e.damage*(1-dist/60));tp.flash=8;const a2=Math.atan2(dy,dx);tp.vx+=Math.cos(a2)*5;tp.vy-=4;}});
              }
              // Drop coins
              const killer=ss.players[b.owner]||ss.players[0];
              const coinAmt=Math.round(e.coins*(1+(killer.stats.luckyMultiplier||0)));
              for(let c=0;c<coinAmt;c++){
                ss.coins_on_ground.push({x:e.x+e.w/2+(Math.random()-0.5)*20,y:e.y,vy:-3-Math.random()*3,vx:(Math.random()-0.5)*3,grounded:false});
              }
              // Ragdoll
              for(let i=0;i<4;i++)ss.ragdolls.push({type:"limb",x:e.x+e.w/2,y:e.y+e.h/2,w:4,h:6,
                vx:(Math.random()-0.5)*8,vy:-4-Math.random()*4,rot:0,vr:(Math.random()-0.5)*0.4,color:e.color,life:40,bounced:false});
            }
            if(b.explosive){
              for(let i=0;i<12;i++)ss.particles.push({x:b.x,y:b.y,vx:(Math.random()-0.5)*8,vy:(Math.random()-0.5)*8,life:12,color:"#ff8800"});
            }
            return false;
          }
        }
        // Hit boss
        if(ss.boss&&!ss.boss.dead){
          const bo=ss.boss;
          if(b.x>bo.x&&b.x<bo.x+bo.width&&b.y>bo.y&&b.y<bo.y+bo.height){
            bo.hp-=b.damage;bo.flash=6;SND.hit();ss.hitstop=2;ss.shake={intensity:3,frames:5};
            ss.dmgNums.push({x:b.x,y:bo.y-5,text:"-"+b.damage,color:"#ff4466",life:48,vy:-2});
            if(bo.hp<=0){
              bo.dead=true;SND.bossDeath();ss.shake={intensity:8,frames:20};
              for(let i=0;i<30;i++)ss.particles.push({x:bo.x+bo.width/2,y:bo.y+bo.height/2,vx:(Math.random()-0.5)*15,vy:(Math.random()-0.5)*15,life:30,color:bo.color});
              // Drop coins
              const bossCoins=ss.stage===3?100:200;
              for(let c=0;c<bossCoins;c++)ss.coins_on_ground.push({x:bo.x+bo.width/2+(Math.random()-0.5)*60,y:bo.y+bo.height/2,vy:-4-Math.random()*5,vx:(Math.random()-0.5)*6,grounded:false});
            }
            return false;
          }
        }
        // Platform collision
        plats.forEach(pl=>{if(b.x>pl.x&&b.x<pl.x+pl.w&&b.y>pl.y&&b.y<pl.y+pl.h){
          if(b.bouncy&&b.bouncesLeft>0){b.vx*=-1;b.bouncesLeft--;}else{b.dead=true;}}});
        return !b.dead;
      }else{
        // Enemy bullet hits any player
        for(const tp of ss.players){
          if(tp.dead||tp.invincible>0||tp.dashing>0)continue;
          if(b.x>tp.x&&b.x<tp.x+PW&&b.y>tp.y&&b.y<tp.y+PH){
            tp.hp-=b.damage;tp.flash=8;SND.hit();tp.vx+=b.vx*0.3;tp.vy-=2;
            ss.shake={intensity:3,frames:6};ss.hitstop=2;
            ss.dmgNums.push({x:b.x,y:tp.y-5,text:"-"+b.damage,color:"#ff4444",life:48,vy:-2});
            return false;
          }
        }
        return true;
      }
    });

    // Coins
    ss.coins_on_ground=ss.coins_on_ground.filter(c=>{
      if(!c.grounded){c.vy+=0.3;c.x+=c.vx;c.y+=c.vy;if(c.y>=GND-4){c.y=GND-4;c.grounded=true;c.vx=0;c.vy=0;}}
      for(const sp of ss.players){if(!sp.dead&&Math.abs(sp.x+PW/2-c.x)<20&&Math.abs(sp.y+PH/2-c.y)<20){ss.coins++;ss.totalCoins++;SND.pickup();return false;}}
      return true;
    });

    // Health pickups (any player can collect)
    ss.healthPickups.forEach(h=>{
      if(!h.alive)return;
      ss.players.forEach(sp=>{if(sp.dead)return;
        if(Math.abs(sp.x+PW/2-h.x)<20&&Math.abs(sp.y+PH/2-h.y)<20){
          sp.hp=Math.min(sp.maxHp,sp.hp+25);h.alive=false;SND.pickup();}});
    });
    ss.extraLifePickups.forEach(h=>{
      if(!h.alive)return;
      ss.players.forEach(sp=>{if(sp.dead)return;
        if(Math.abs(sp.x+PW/2-h.x)<20&&Math.abs(sp.y+PH/2-h.y)<20){
          ss.lives++;h.alive=false;SND.pickup();}});
    });

    // Ammo crates
    if(ss.ammoCrates){ss.ammoCrates.forEach(ac=>{
      if(!ac.alive)return;
      ss.players.forEach(sp=>{if(sp.dead||!ac.alive)return;
        if(Math.abs(sp.x+PW/2-ac.x)<18&&Math.abs(sp.y+PH/2-ac.y)<18){
          const wpnDef=GG_WEAPONS[sp.weapon];sp.ammo=Math.min(sp.ammo+(wpnDef.crateRefill||wpnDef.ammo),wpnDef.ammo*2);sp.reloading=false;sp.grenadeAmmo++;ac.alive=false;SND.reload();
          for(let i=0;i<8;i++)ss.particles.push({x:ac.x,y:ac.y,vx:(Math.random()-0.5)*5,vy:-Math.random()*4,life:12,color:"#ffcc44"});
        }});
    });}

    // Coin magnet effect (all players)
    ss.players.forEach(sp=>{
      if(sp.dead)return;
      const magnetRange=30+(sp.stats.coinMagnetRange||0);
      if(magnetRange>30){
        ss.coins_on_ground.forEach(c=>{
          if(!c.grounded)return;
          const dx=sp.x+PW/2-c.x,dy=sp.y+PH/2-c.y,dist=Math.sqrt(dx*dx+dy*dy);
          if(dist<magnetRange&&dist>5){const force=0.5*(1-dist/magnetRange);c.x+=dx*force*0.1;c.y+=dy*force*0.1;}
        });
      }
    });

    // Grenades update (story mode)
    if(ss.grenades)ss.grenades=ss.grenades.filter(gr=>{
      gr.vy=(gr.vy||0)+GRAVITY;gr.x+=gr.vx;gr.y+=gr.vy;
      if(gr.y>=GND-4){gr.y=GND-4;gr.vy*=-0.5;gr.vx*=0.7;}
      if(gr.x<0){gr.x=0;gr.vx*=-0.6;}if(gr.x>sd.width){gr.x=sd.width;gr.vx*=-0.6;}
      plats.forEach(pl=>{if(gr.x>pl.x&&gr.x<pl.x+pl.w&&gr.y>pl.y-4&&gr.y<pl.y+pl.h){gr.y=pl.y-4;gr.vy*=-0.5;gr.vx*=0.7;}});
      // Direct enemy hit
      let directHit=false;
      ss.enemies.forEach(e=>{if(!e.dead&&gr.x>e.x&&gr.x<e.x+e.w&&gr.y>e.y&&gr.y<e.y+e.h){directHit=true;}});
      if(now-gr.born>1500||directHit){
        SND.explode();ss.shake={intensity:5,frames:10};
        for(let i=0;i<20;i++)ss.particles.push({x:gr.x,y:gr.y,vx:(Math.random()-0.5)*14,vy:(Math.random()-0.5)*14,life:18,color:["#ff4400","#ff8800","#ffcc00","#fff"][Math.floor(Math.random()*4)]});
        // Damage enemies + players in radius
        ss.enemies.forEach(e=>{if(e.dead)return;const dx=e.x+e.w/2-gr.x,dy=e.y+e.h/2-gr.y,dist=Math.sqrt(dx*dx+dy*dy);
          if(dist<70){e.hp-=Math.round(25*(1-dist/70));e.flash=6;if(e.hp<=0){e.dead=true;SND.die();ss.enemiesKilled++;
            for(let c=0;c<e.coins;c++)ss.coins_on_ground.push({x:e.x+e.w/2+(Math.random()-0.5)*20,y:e.y,vy:-3-Math.random()*3,vx:(Math.random()-0.5)*3,grounded:false});}}});
        ss.players.forEach(tp=>{if(tp.dead)return;const dx=tp.x+PW/2-gr.x,dy=tp.y+PH/2-gr.y,dist=Math.sqrt(dx*dx+dy*dy);
          if(dist<70){const dmg=Math.round(15*(1-dist/70));tp.hp-=dmg;tp.flash=8;const a2=Math.atan2(dy,dx);tp.vx+=Math.cos(a2)*5;tp.vy+=Math.sin(a2)*5-3;}});
        if(ss.boss&&!ss.boss.dead){const dx=ss.boss.x+ss.boss.width/2-gr.x,dy=ss.boss.y+ss.boss.height/2-gr.y,dist=Math.sqrt(dx*dx+dy*dy);
          if(dist<70){ss.boss.hp-=Math.round(25*(1-dist/70));ss.boss.flash=6;}}
        return false;
      }
      return true;
    });

    // Level elements update
    updateLevelElements(ss,plats,now);

    // Damage numbers + ragdolls + particles
    ss.dmgNums=ss.dmgNums.filter(d=>{d.y+=d.vy;d.vy*=0.95;d.life--;return d.life>0;});
    ss.ragdolls=ss.ragdolls.filter(r=>{r.vy+=0.4;r.x+=r.vx;r.y+=r.vy;r.rot+=r.vr;r.life--;if(r.y>=GND-5&&!r.bounced){r.bounced=true;r.vy*=-0.4;r.vx*=0.5;}if(r.y>=GND-5){r.y=GND-5;r.vy=0;r.vx*=0.9;}return r.life>0;});
    ss.particles=ss.particles.filter(pt=>{
      if(pt.casing){if(!pt.landed){pt.vy+=0.3;pt.x+=pt.vx;pt.y+=pt.vy;if(pt.y>=GND-2){pt.y=GND-2;pt.landed=true;pt.life=600;}}else{pt.life--;if(pt.life<=0)return false;}return true;}
      pt.x+=pt.vx;pt.y+=pt.vy;pt.vy+=0.1;pt.life--;return pt.life>0;
    });

    // Player death + revive system
    ss.players.forEach(dp=>{
      // Kill plane — falling off-screen is instant death (no revive possible)
      if(dp.y>H+100&&!dp.dead){dp.hp=0;dp.dead=true;dp.downed=false;SND.die();}
      if(dp.hp<=0&&!dp.dead&&!dp.downed){
        // Player goes DOWN — 3 second revive window
        dp.downed=true;dp.downedTime=now;dp.vx=0;dp.vy=0;
        SND.die();ss.shake={intensity:6,frames:15};
        // Ragdoll particles
        for(let i=0;i<10;i++)ss.particles.push({x:dp.x+PW/2,y:dp.y+PH/2,vx:(Math.random()-0.5)*8,vy:(Math.random()-0.5)*8,life:15,color:dp.color});
      }
      // Downed state — flash for 3 seconds, can be revived
      if(dp.downed&&!dp.dead){
        dp.hp=0;dp.vx=0;
        // Check if revive window expired
        if(now-dp.downedTime>3000){
          dp.dead=true;dp.downed=false; // permanently out for this level
        }else{
          // Check if alive player is standing near and pressing A
          ss.players.forEach(rp=>{
            if(rp.idx===dp.idx||rp.dead||rp.downed)return;
            const dist=Math.abs(rp.x-dp.x);
            if(dist<40&&Math.abs(rp.y-dp.y)<30){
              // Auto-revive when close — transfer 30% of reviver's HP
              const giveHp=Math.round(rp.maxHp*0.3);
              if(rp.hp>giveHp+10){ // reviver must have enough HP to survive
                rp.hp-=giveHp;
                dp.downed=false;dp.hp=giveHp;dp.invincible=60;
                dp.ammo=GG_WEAPONS[dp.weapon].ammo;dp.reloading=false;
                SND.revive();
                ss.dmgNums.push({x:dp.x+PW/2,y:dp.y-15,text:"REVIVED!",color:"#44ff66",life:60,vy:-1.5});
                ss.dmgNums.push({x:rp.x+PW/2,y:rp.y-15,text:"-"+giveHp+" HP",color:"#ff8844",life:48,vy:-1.5});
              }
            }
          });
        }
      }
    });
    // Check total wipe — all players dead (not downed, fully dead)
    if(ss.players.every(dp=>dp.dead)&&!ss._gameOverTriggered){
      ss._gameOverTriggered=true;
      if(ss.lives>0){
        // Respawn at last checkpoint
        ss.lives--;
        const sdRespawn=STORY_STAGES[ss.stage-1];
        setTimeout(()=>{
          if(!ss||ss.stageComplete)return;
          const rx=ss.checkpoint||0;
          ss.players.forEach((rp,rpi)=>{
            rp.x=rx+rpi*30;rp.y=GND-PH;rp.vx=0;rp.vy=0;
            rp.hp=rp.maxHp;rp.dead=false;rp.downed=false;
            rp.invincible=120;rp.flash=0;rp.dashing=0;rp.frozen=0;
            rp.ammo=GG_WEAPONS[rp.weapon].ammo;rp.reloading=false;
            rp._onRope=false;rp.flipping=false;rp.flipAngle=0;
          });
          ss.cameraX=Math.max(0,Math.min(sdRespawn.width-W,rx-300));
          ss.dmgNums.push({x:rx,y:GND-80,text:"RESPAWN",color:"#44ff66",life:60,vy:-1.5});
          SND.revive();
          ss._gameOverTriggered=false;
        },1500);
      }else{
        setTimeout(()=>{MUSIC.stop();showScreen("gameover");renderStoryGameOver();startMenuPoll();},2000);
      }
    }

    // Stage complete check
    const allDead=ss.enemies.every(e=>e.dead);
    const bossOk=!sd.boss||ss.boss.dead;
    if(allDead&&bossOk&&aliveSP.some(tp=>tp.x>sd.width-100)&&!ss.stageComplete){
      ss.stageComplete=true;SND.stageClear();
      MUSIC.stop();
      // Clear all enemies + airborne projectiles so nothing lingers visually during transition
      ss.enemies=[];ss.enemyBullets=[];ss.grenades=[];
      if(ss.stage>=4){
        // Victory!
        setTimeout(()=>{showScreen("gameover");renderStoryVictory();startMenuPoll();},1500);
      }else{
        setTimeout(()=>{shopCardPool=[];showScreen("gameover");renderShop();startMenuPoll();},1000);
      }
    }
  }

  function storyDraw(){
    const ss=storyState;if(!ss||!ss.players||ss.players.length===0)return;
    const p=ss.player,sd=STORY_STAGES[ss.stage-1];
    const cam=ss.cameraX,now=Date.now();
    ctx.save();
    if(ss.shake.frames>0){ctx.translate((Math.random()-0.5)*ss.shake.intensity*2,(Math.random()-0.5)*ss.shake.intensity*2);ss.shake.frames--;}

    // Background — use custom image if available, else fallback color
    if(!drawStageBG(ctx,sd.name,cam,sd)){
      ctx.fillStyle=sd.bg;ctx.fillRect(0,0,W,H);
    }
    // Ground
    ctx.fillStyle=sd.gnd;ctx.fillRect(0,GND,W,H-GND);
    ctx.fillStyle=sd.gndLine;ctx.fillRect(0,GND,W,2);

    // Platforms
    const depth=8;
    sd.plats.forEach(pl=>{
      const px=pl.x-cam;if(px>W+50||px+pl.w<-50)return;
      ctx.fillStyle=sd.platSide;ctx.beginPath();ctx.moveTo(px+pl.w,pl.y);ctx.lineTo(px+pl.w+depth,pl.y+depth);ctx.lineTo(px+pl.w+depth,pl.y+pl.h+depth);ctx.lineTo(px+pl.w,pl.y+pl.h);ctx.closePath();ctx.fill();
      ctx.fillStyle=sd.platBot;ctx.beginPath();ctx.moveTo(px,pl.y+pl.h);ctx.lineTo(px+depth,pl.y+pl.h+depth);ctx.lineTo(px+pl.w+depth,pl.y+pl.h+depth);ctx.lineTo(px+pl.w,pl.y+pl.h);ctx.closePath();ctx.fill();
      ctx.fillStyle=sd.platFill;ctx.fillRect(px,pl.y,pl.w,pl.h);
      ctx.fillStyle=sd.platTop;ctx.fillRect(px,pl.y,pl.w,2);
    });

    // End gate — locked until all enemies dead
    if(!ss.stageComplete){
      const gx=sd.width-60-cam;
      const allClear=ss.enemies.every(e=>e.dead)&&(!sd.boss||ss.boss.dead);
      const remaining=ss.enemies.filter(e=>!e.dead).length;
      if(allClear){
        // Open gate — glowing green
        ctx.fillStyle=`rgba(100,255,200,${0.15+Math.sin(frame*0.08)*0.08})`;ctx.fillRect(gx,GND-80,40,80);
        ctx.strokeStyle=`rgba(100,255,200,${0.5+Math.sin(frame*0.08)*0.3})`;ctx.lineWidth=2;ctx.strokeRect(gx,GND-80,40,80);
        ctx.font="bold 9px monospace";ctx.fillStyle="#66ffcc";ctx.textAlign="center";ctx.fillText("EXIT",gx+20,GND-85);
        // Animated arrows
        const ay=Math.sin(frame*0.1)*3;
        ctx.fillStyle="#66ffcc";ctx.beginPath();ctx.moveTo(gx+20,GND-70+ay);ctx.lineTo(gx+14,GND-60+ay);ctx.lineTo(gx+26,GND-60+ay);ctx.closePath();ctx.fill();
      }else{
        // Locked gate — red/grey
        ctx.fillStyle="rgba(255,50,50,0.08)";ctx.fillRect(gx,GND-80,40,80);
        ctx.strokeStyle="rgba(255,50,50,0.3)";ctx.lineWidth=2;ctx.strokeRect(gx,GND-80,40,80);
        ctx.font="bold 9px monospace";ctx.fillStyle="#aa4444";ctx.textAlign="center";ctx.fillText("LOCKED",gx+20,GND-85);
        ctx.font="8px monospace";ctx.fillStyle="#884444";ctx.fillText(remaining+" left",gx+20,GND-40);
      }
    }

    // Coins on ground
    ss.coins_on_ground.forEach(c=>{
      const cx=c.x-cam;
      ctx.fillStyle="#ffcc00";ctx.beginPath();ctx.arc(cx,c.y,3,0,Math.PI*2);ctx.fill();
      ctx.fillStyle="#ffee66";ctx.beginPath();ctx.arc(cx-0.5,c.y-0.5,1.5,0,Math.PI*2);ctx.fill();
    });

    // Health/life pickups
    ss.healthPickups.forEach(h=>{if(!h.alive)return;const hx=h.x-cam;ctx.font="16px serif";ctx.textAlign="center";ctx.fillText("\u2764\uFE0F",hx,h.y+8);});
    ss.extraLifePickups.forEach(h=>{if(!h.alive)return;const hx=h.x-cam;ctx.font="14px serif";ctx.textAlign="center";ctx.fillText("\u{1F496}",hx,h.y+8);});
    // Ammo crates
    if(ss.ammoCrates){ss.ammoCrates.forEach(ac=>{
      if(!ac.alive)return;const ax=ac.x-cam;if(ax<-20||ax>W+20)return;
      ctx.fillStyle="#885533";ctx.fillRect(ax-8,ac.y-8,16,16);
      ctx.fillStyle="#aa7744";ctx.fillRect(ax-6,ac.y-6,12,12);
      ctx.strokeStyle="#664422";ctx.lineWidth=1;ctx.strokeRect(ax-8,ac.y-8,16,16);
      // Bullet icon
      ctx.fillStyle="#ffcc00";ctx.fillRect(ax-2,ac.y-4,4,8);
      ctx.fillStyle="#ffee66";ctx.beginPath();ctx.arc(ax,ac.y-4,2,0,Math.PI*2);ctx.fill();
    });}

    // Enemies
    ss.enemies.forEach(e=>{
      if(e.dead||!e.spawned)return;
      const ex=e.x-cam;if(ex>W+50||ex<-50)return;
      const fadeWalkIn=e.walkingIn&&e.type==="stalker";
      ctx.globalAlpha=fadeWalkIn?0.5:1;
      const variantColor=e.variant==="gold"?"#ffcc22":e.variant==="red"?"#cc3333":e.color;
      const c=e.flash>0?"#fff":variantColor;
      // Draw enemy — alien bug style inspired by reference
      const ecx=ex+e.w/2,headR=e.w/2-2,headY=e.y+headR+2;
      const dark=e.flash>0?"#ccc":shadeColor(variantColor,-30);
      // Variant aura
      if(e.variant==="gold"&&!e.flash){ctx.fillStyle="rgba(255,204,0,0.08)";ctx.beginPath();ctx.arc(ecx,e.y+e.h/2,e.w,0,Math.PI*2);ctx.fill();}
      if(e.variant==="red"&&!e.flash){ctx.fillStyle="rgba(255,50,50,0.06)";ctx.beginPath();ctx.arc(ecx,e.y+e.h/2,e.w*0.8,0,Math.PI*2);ctx.fill();}
      // Legs (stubby)
      ctx.fillStyle=dark;
      const legW=e.w*0.2,legH=e.h*0.25;
      ctx.fillRect(ecx-e.w*0.35,e.y+e.h-legH,legW,legH);
      ctx.fillRect(ecx+e.w*0.15,e.y+e.h-legH,legW,legH);
      // Feet
      ctx.beginPath();ctx.arc(ecx-e.w*0.35+legW/2,e.y+e.h,legW/2,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.arc(ecx+e.w*0.15+legW/2,e.y+e.h,legW/2,0,Math.PI*2);ctx.fill();
      // Body
      ctx.fillStyle=c;
      roundRect(ctx,ecx-e.w*0.35,e.y+e.h*0.45,e.w*0.7,e.h*0.35,4);ctx.fill();
      // Head (big round)
      ctx.fillStyle=c;
      ctx.beginPath();ctx.arc(ecx,headY,headR,0,Math.PI*2);ctx.fill();
      // Head shading
      ctx.fillStyle=dark;
      ctx.beginPath();ctx.arc(ecx-3,headY,headR,Math.PI*0.5,Math.PI*1.5);ctx.fill();
      // Antennae
      ctx.strokeStyle=dark;ctx.lineWidth=1.5;ctx.lineCap="round";
      ctx.beginPath();ctx.moveTo(ecx-5,headY-headR+2);ctx.lineTo(ecx-8,headY-headR-10);ctx.stroke();
      ctx.beginPath();ctx.moveTo(ecx+5,headY-headR+2);ctx.lineTo(ecx+8,headY-headR-10);ctx.stroke();
      // Antenna tips (glowing balls)
      ctx.fillStyle=e.flash>0?"#fff":"#ffee44";
      ctx.beginPath();ctx.arc(ecx-8,headY-headR-10,2.5,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.arc(ecx+8,headY-headR-10,2.5,0,Math.PI*2);ctx.fill();
      // Eyes (big, dark, like reference)
      const eyeR=headR*0.3;
      ctx.fillStyle=e.flash>0?"#fff":"#111";
      ctx.beginPath();ctx.arc(ecx-headR*0.3,headY-2,eyeR,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.arc(ecx+headR*0.3,headY-2,eyeR,0,Math.PI*2);ctx.fill();
      // Eye shine
      ctx.fillStyle="#fff";
      ctx.beginPath();ctx.arc(ecx-headR*0.3+1,headY-3,eyeR*0.35,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.arc(ecx+headR*0.3+1,headY-3,eyeR*0.35,0,Math.PI*2);ctx.fill();
      // Mouth (jagged zigzag line)
      ctx.strokeStyle=e.flash>0?"#aaa":"#333";ctx.lineWidth=1.5;
      ctx.beginPath();
      const mouthY=headY+headR*0.4,mouthW=headR*0.8;
      ctx.moveTo(ecx-mouthW,mouthY);
      for(let t=0;t<5;t++){ctx.lineTo(ecx-mouthW+mouthW*2/5*(t+0.5),mouthY+(t%2===0?3:-3));ctx.lineTo(ecx-mouthW+mouthW*2/5*(t+1),mouthY);}
      ctx.stroke();
      // Tank: extra spikes on top
      if(e.type==="tank"){
        ctx.fillStyle=e.flash>0?"#ddd":"#999922";
        for(let s=0;s<3;s++){const sx=ecx-12+s*12,sy=headY-headR-2;ctx.beginPath();ctx.moveTo(sx,sy);ctx.lineTo(sx+4,sy-8);ctx.lineTo(sx+8,sy);ctx.closePath();ctx.fill();}
      }
      // Stalker: longer legs already handled by h:40
      // Bomber: wings + glowing body
      if(e.type==="bomber"){
        const wingFlap=Math.sin(frame*0.4)*8;
        ctx.fillStyle=e.flash>0?"#ddd":"#116633";
        // Left wing
        ctx.beginPath();ctx.moveTo(ecx-4,headY+4);
        ctx.lineTo(ecx-e.w-8,headY-10+wingFlap);ctx.lineTo(ecx-e.w,headY+10+wingFlap*0.5);ctx.lineTo(ecx-4,headY+8);ctx.closePath();ctx.fill();
        // Right wing
        ctx.beginPath();ctx.moveTo(ecx+4,headY+4);
        ctx.lineTo(ecx+e.w+8,headY-10-wingFlap);ctx.lineTo(ecx+e.w,headY+10-wingFlap*0.5);ctx.lineTo(ecx+4,headY+8);ctx.closePath();ctx.fill();
        // Wing veins
        ctx.strokeStyle="rgba(0,0,0,0.3)";ctx.lineWidth=0.5;
        ctx.beginPath();ctx.moveTo(ecx-4,headY+6);ctx.lineTo(ecx-e.w-4,headY-5+wingFlap);ctx.stroke();
        ctx.beginPath();ctx.moveTo(ecx+4,headY+6);ctx.lineTo(ecx+e.w+4,headY-5-wingFlap);ctx.stroke();
        // Glowing red danger indicator
        ctx.fillStyle=`rgba(255,50,0,${0.2+Math.sin(frame*0.15)*0.1})`;
        ctx.beginPath();ctx.arc(ecx,headY+10,8,0,Math.PI*2);ctx.fill();
      }
      // Rusher: claws
      if(e.type==="rusher"){
        ctx.fillStyle=e.flash>0?"#ddd":"#887722";
        const armY=e.y+e.h*0.5;
        ctx.fillRect(ecx-e.w*0.5-4,armY,6,3);ctx.fillRect(ecx+e.w*0.5-2,armY,6,3);
        // Claw tips
        ctx.fillRect(ecx-e.w*0.5-6,armY-2,3,2);ctx.fillRect(ecx+e.w*0.5+2,armY-2,3,2);
      }
      // Flyer: ground shadow + animated wings + telegraph glow
      if(e.type==="flyer"){
        // Ground shadow (helps player track position)
        const shGnd=GND-2;
        ctx.fillStyle="rgba(0,0,0,0.25)";
        ctx.beginPath();ctx.ellipse(ecx,shGnd,e.w*0.55,3,0,0,Math.PI*2);ctx.fill();
        // Wing flap rate by state
        const flapRate=e.flyState==="dive"?2:e.flyState==="telegraph"?2:4;
        const wingUp=Math.floor(frame/flapRate)%2===0;
        const wingY=headY+2;
        const wingExtend=wingUp?-12:-4;
        ctx.fillStyle=e.flash>0?"#fff":"rgba(170,255,220,0.75)";
        // Left wing
        ctx.beginPath();ctx.moveTo(ecx-3,wingY);
        ctx.lineTo(ecx-e.w*0.85,wingY+wingExtend);ctx.lineTo(ecx-e.w*0.7,wingY+4);
        ctx.closePath();ctx.fill();
        // Right wing
        ctx.beginPath();ctx.moveTo(ecx+3,wingY);
        ctx.lineTo(ecx+e.w*0.85,wingY+wingExtend);ctx.lineTo(ecx+e.w*0.7,wingY+4);
        ctx.closePath();ctx.fill();
        // Telegraph red glow
        if(e.flyState==="telegraph"){
          ctx.fillStyle=`rgba(255,68,68,${0.25+Math.sin(frame*0.5)*0.15})`;
          ctx.beginPath();ctx.arc(ecx,headY,e.w*0.7,0,Math.PI*2);ctx.fill();
        }
      }
      // HP bar
      if(e.hp<e.maxHp){
        ctx.fillStyle="rgba(0,0,0,0.5)";ctx.fillRect(ex,e.y-10,e.w,4);
        ctx.fillStyle="#44ff44";ctx.fillRect(ex,e.y-10,e.w*(e.hp/e.maxHp),4);
        ctx.strokeStyle="rgba(255,255,255,0.1)";ctx.lineWidth=1;ctx.strokeRect(ex,e.y-10,e.w,4);
      }
      ctx.globalAlpha=1;
    });

    // Boss
    if(ss.boss&&!ss.boss.dead){
      const b=ss.boss,bx=b.x-cam,bcx=bx+b.width/2,bcy=b.y+b.height/2;
      const c=b.flash>0?"#fff":b.color;
      const dark=b.flash>0?"#ccc":shadeColor(b.color,-40);
      const hpPct=b.hp/b.maxHp;

      if(b.type==="megagrunt"){
        // MEGA GRUNT — big hulking alien with spikes, arms, legs
        // Shadow
        ctx.fillStyle="rgba(0,0,0,0.3)";ctx.beginPath();ctx.ellipse(bcx,GND,b.width/2+5,6,0,0,Math.PI*2);ctx.fill();
        // Legs
        ctx.fillStyle=dark;
        const lw=b.width*0.2,lh=b.height*0.25,walk=Math.sin(frame*0.15)*3;
        ctx.fillRect(bcx-b.width*0.3,b.y+b.height-lh+walk,lw,lh);
        ctx.fillRect(bcx+b.width*0.1,b.y+b.height-lh-walk,lw,lh);
        // Feet
        ctx.beginPath();ctx.arc(bcx-b.width*0.3+lw/2,b.y+b.height+walk,lw/2+2,0,Math.PI*2);ctx.fill();
        ctx.beginPath();ctx.arc(bcx+b.width*0.1+lw/2,b.y+b.height-walk,lw/2+2,0,Math.PI*2);ctx.fill();
        // Body
        ctx.fillStyle=c;roundRect(ctx,bx+8,b.y+b.height*0.35,b.width-16,b.height*0.45,8);ctx.fill();
        ctx.fillStyle=dark;roundRect(ctx,bx+8,b.y+b.height*0.35,b.width*0.4,b.height*0.45,8);ctx.fill();
        // Arms
        ctx.strokeStyle=c;ctx.lineWidth=8;ctx.lineCap="round";
        ctx.beginPath();ctx.moveTo(bx+5,b.y+b.height*0.45);ctx.lineTo(bx-15,b.y+b.height*0.6+walk);ctx.stroke();
        ctx.beginPath();ctx.moveTo(bx+b.width-5,b.y+b.height*0.45);ctx.lineTo(bx+b.width+15,b.y+b.height*0.6-walk);ctx.stroke();
        // Fists
        ctx.fillStyle=c;
        ctx.beginPath();ctx.arc(bx-15,b.y+b.height*0.6+walk,7,0,Math.PI*2);ctx.fill();
        ctx.beginPath();ctx.arc(bx+b.width+15,b.y+b.height*0.6-walk,7,0,Math.PI*2);ctx.fill();
        // Head
        const headR=b.width*0.35;
        ctx.fillStyle=c;ctx.beginPath();ctx.arc(bcx,b.y+headR+2,headR,0,Math.PI*2);ctx.fill();
        ctx.fillStyle=dark;ctx.beginPath();ctx.arc(bcx-b.facing*5,b.y+headR+2,headR,Math.PI*0.5,Math.PI*1.5);ctx.fill();
        // Spikes on head
        ctx.fillStyle=b.flash>0?"#ddd":"#228822";
        for(let s=0;s<5;s++){const sa=-0.8+s*0.4,sx=bcx+Math.cos(sa-Math.PI/2)*headR,sy=b.y+headR+2+Math.sin(sa-Math.PI/2)*headR;
          ctx.beginPath();ctx.moveTo(sx-4,sy);ctx.lineTo(sx,sy-12);ctx.lineTo(sx+4,sy);ctx.closePath();ctx.fill();}
        // Eyes — angry
        ctx.fillStyle="#ff0000";
        ctx.beginPath();ctx.arc(bcx+b.facing*10-6,b.y+headR,5,0,Math.PI*2);ctx.fill();
        ctx.beginPath();ctx.arc(bcx+b.facing*10+6,b.y+headR,5,0,Math.PI*2);ctx.fill();
        ctx.fillStyle="#000";
        ctx.beginPath();ctx.arc(bcx+b.facing*10-6,b.y+headR+1,2.5,0,Math.PI*2);ctx.fill();
        ctx.beginPath();ctx.arc(bcx+b.facing*10+6,b.y+headR+1,2.5,0,Math.PI*2);ctx.fill();
        // Angry brow
        ctx.strokeStyle="#222";ctx.lineWidth=2;
        ctx.beginPath();ctx.moveTo(bcx+b.facing*10-12,b.y+headR-6);ctx.lineTo(bcx+b.facing*10-3,b.y+headR-4);ctx.stroke();
        ctx.beginPath();ctx.moveTo(bcx+b.facing*10+12,b.y+headR-6);ctx.lineTo(bcx+b.facing*10+3,b.y+headR-4);ctx.stroke();
        // Mouth
        ctx.strokeStyle="#222";ctx.lineWidth=2;
        ctx.beginPath();const my=b.y+headR+12;
        ctx.moveTo(bcx-12,my);for(let t=0;t<6;t++){ctx.lineTo(bcx-12+t*5,my+(t%2===0?3:-3));}ctx.stroke();
      }else{
        // HIVE QUEEN — floating alien with tentacles and crown
        // Glow aura
        const glowA=0.1+Math.sin(frame*0.05)*0.05;
        ctx.fillStyle=`rgba(255,68,255,${glowA})`;ctx.beginPath();ctx.arc(bcx,bcy,b.width/2+15,0,Math.PI*2);ctx.fill();
        // Tentacles hanging down
        ctx.strokeStyle=dark;ctx.lineWidth=5;ctx.lineCap="round";
        for(let t=0;t<4;t++){
          const tx=bx+15+t*(b.width-30)/3,wave=Math.sin(frame*0.08+t*1.5)*8;
          ctx.beginPath();ctx.moveTo(tx,b.y+b.height);
          ctx.quadraticCurveTo(tx+wave,b.y+b.height+25,tx+wave*0.5,b.y+b.height+45);ctx.stroke();
        }
        // Main body — oval
        ctx.fillStyle=c;ctx.beginPath();ctx.ellipse(bcx,bcy,b.width/2,b.height/2,0,0,Math.PI*2);ctx.fill();
        ctx.fillStyle=dark;ctx.beginPath();ctx.ellipse(bcx-10,bcy,b.width/2,b.height/2,0,Math.PI*0.3,Math.PI*1.3);ctx.fill();
        // Crown/crest on top
        ctx.fillStyle=b.flash>0?"#ffd":"#ff88ff";
        for(let c2=0;c2<3;c2++){const cx2=bcx-15+c2*15,cy2=b.y-5;
          ctx.beginPath();ctx.moveTo(cx2-5,cy2+10);ctx.lineTo(cx2,cy2-8);ctx.lineTo(cx2+5,cy2+10);ctx.closePath();ctx.fill();}
        // Eyes — large alien eyes
        ctx.fillStyle="#fff";
        ctx.beginPath();ctx.ellipse(bcx-12,bcy-5,8,10,0,0,Math.PI*2);ctx.fill();
        ctx.beginPath();ctx.ellipse(bcx+12,bcy-5,8,10,0,0,Math.PI*2);ctx.fill();
        ctx.fillStyle=hpPct>0.33?"#aa00aa":"#ff0000";
        ctx.beginPath();ctx.arc(bcx-12,bcy-3,4,0,Math.PI*2);ctx.fill();
        ctx.beginPath();ctx.arc(bcx+12,bcy-3,4,0,Math.PI*2);ctx.fill();
        ctx.fillStyle="#fff";
        ctx.beginPath();ctx.arc(bcx-13,bcy-5,1.5,0,Math.PI*2);ctx.fill();
        ctx.beginPath();ctx.arc(bcx+11,bcy-5,1.5,0,Math.PI*2);ctx.fill();
        // Phase indicator glow
        if(hpPct<=0.33){ctx.strokeStyle=`rgba(255,0,0,${0.3+Math.sin(frame*0.15)*0.2})`;ctx.lineWidth=3;ctx.beginPath();ctx.ellipse(bcx,bcy,b.width/2+5,b.height/2+5,0,0,Math.PI*2);ctx.stroke();}
        else if(hpPct<=0.66){ctx.strokeStyle=`rgba(255,100,0,${0.2+Math.sin(frame*0.1)*0.1})`;ctx.lineWidth=2;ctx.beginPath();ctx.ellipse(bcx,bcy,b.width/2+3,b.height/2+3,0,0,Math.PI*2);ctx.stroke();}
      }
      // HP bar — below stage HUD
      const hpBarY=42;
      ctx.font="bold 10px monospace";ctx.fillStyle="#fff";ctx.textAlign="center";
      ctx.fillText(b.type==="megagrunt"?"MEGA GRUNT":"HIVE QUEEN",W/2,hpBarY);
      ctx.fillStyle="rgba(0,0,0,0.6)";ctx.fillRect(W/2-120,hpBarY+4,240,10);
      ctx.fillStyle=hpPct>0.33?"#ff4444":"#ff0000";ctx.fillRect(W/2-120,hpBarY+4,240*hpPct,10);
      ctx.strokeStyle="rgba(255,255,255,0.2)";ctx.lineWidth=1;ctx.strokeRect(W/2-120,hpBarY+4,240,10);
      ctx.font="8px monospace";ctx.fillStyle="#aaa";ctx.fillText(Math.ceil(b.hp)+"/"+b.maxHp,W/2,hpBarY+12);
      const phase=hpPct>0.66?1:hpPct>0.33?2:3;
      if(phase>1){ctx.fillStyle=phase===3?"#ff0000":"#ff8800";ctx.fillText("PHASE "+phase,W/2,hpBarY+22);}
    }
    // Boss intro overlay (2 seconds)
    if(ss.bossIntroTime){
      const introElapsed=Date.now()-ss.bossIntroTime;
      if(introElapsed<2000){
        const introAlpha=introElapsed<1500?0.5:0.5*(1-(introElapsed-1500)/500);
        ctx.fillStyle=`rgba(0,0,0,${introAlpha})`;ctx.fillRect(0,0,W,H);
        ctx.textAlign="center";
        // Boss name reveal
        const nameAlpha=Math.min(1,introElapsed/400);
        ctx.globalAlpha=nameAlpha;
        ctx.font="bold 28px monospace";ctx.fillStyle="#ff4444";
        const bossName=ss.boss.type==="megagrunt"?"MEGA GRUNT":"HIVE QUEEN";
        ctx.fillText(bossName,W/2,H/2-10);
        ctx.font="12px monospace";ctx.fillStyle="#888";
        ctx.fillText("PREPARE FOR BATTLE",W/2,H/2+15);
        // Warning bars top and bottom
        ctx.fillStyle=`rgba(255,68,102,${0.3*nameAlpha})`;
        ctx.fillRect(0,0,W,4);ctx.fillRect(0,H-4,W,4);
        ctx.globalAlpha=1;
      }else{ss.bossIntroTime=null;}
    }

    // Grenades
    if(ss.grenades)ss.grenades.forEach(gr=>{
      const gx=gr.x-cam,timeLeft=1500-(Date.now()-gr.born);
      const blinkRate=timeLeft<500?2:timeLeft<1000?4:8;
      ctx.fillStyle="#446622";ctx.beginPath();ctx.ellipse(gx,gr.y,5,6,0,0,Math.PI*2);ctx.fill();
      ctx.fillStyle="#557733";ctx.beginPath();ctx.ellipse(gx-1,gr.y-1,4,5,0,0,Math.PI*2);ctx.fill();
      ctx.strokeStyle="#335511";ctx.lineWidth=0.5;ctx.beginPath();ctx.moveTo(gx-4,gr.y);ctx.lineTo(gx+4,gr.y);ctx.stroke();
      ctx.beginPath();ctx.moveTo(gx,gr.y-5);ctx.lineTo(gx,gr.y+5);ctx.stroke();
      ctx.fillStyle="#888";ctx.fillRect(gx-2,gr.y-7,4,3);
      ctx.strokeStyle="#999";ctx.lineWidth=1;ctx.beginPath();ctx.arc(gx+3,gr.y-8,2,0,Math.PI*2);ctx.stroke();
      if(Math.floor(frame/blinkRate)%2===0){ctx.fillStyle="#ff2200";ctx.beginPath();ctx.arc(gx,gr.y-7,1.5,0,Math.PI*2);ctx.fill();}
    });

    // Enemy bullets
    ss.enemyBullets.forEach(b=>{
      const bx=b.x-cam;
      ctx.fillStyle=b.friendly?"#ffcc00":"#ff4444";
      ctx.beginPath();ctx.arc(bx,b.y,b.sz||3,0,Math.PI*2);ctx.fill();
    });

    // Level elements
    drawLevelElements(ctx,ss,cam,frame);

    // Players
    ss.players.forEach(sp=>{
      // Downed player — flash on ground with revive prompt
      if(sp.downed&&!sp.dead){
        const px=sp.x-cam;
        const flashOn=Math.floor(frame/6)%2===0;
        if(flashOn){
          ctx.globalAlpha=0.5;
          ctx.fillStyle=sp.color;ctx.fillRect(px+2,sp.y+PH-8,PW-4,8); // body on ground
          ctx.beginPath();ctx.arc(px+PW/2,sp.y+PH-10,6,0,Math.PI*2);ctx.fill(); // head
          ctx.globalAlpha=1;
        }
        // Revive timer bar
        const timeLeft=Math.max(0,3000-(Date.now()-sp.downedTime));
        const pct=timeLeft/3000;
        ctx.fillStyle="rgba(0,0,0,0.5)";ctx.fillRect(px-5,sp.y-12,PW+10,4);
        ctx.fillStyle=pct>0.5?"#ffcc00":"#ff4444";ctx.fillRect(px-5,sp.y-12,(PW+10)*pct,4);
        // "REVIVE!" text
        ctx.font="bold 8px monospace";ctx.fillStyle="#ffcc00";ctx.textAlign="center";
        ctx.fillText("REVIVE!",px+PW/2,sp.y-16);
        return;
      }
      if(sp.dead)return;
      const fr=Math.abs(sp.vx)>0.1?frame:0;
      const rp=sp.reloading?Math.min(1,(now-sp.reloadStart)/RELOAD_TIME):0;
      const px=sp.x-cam;
      if(sp.dashTrail.length>0){sp.dashTrail.forEach(t=>{ctx.globalAlpha=t.life/6*0.3;drawPerson(ctx,t.x-cam,t.y,PW,PH,sp.color,sp.facing,0,fr,0,false,0,false,GG_WEAPONS[sp.weapon].name);});ctx.globalAlpha=1;}
      if(sp.invincible>0&&frame%4<2)ctx.globalAlpha=0.4;
      if(sp.dashing>0)ctx.globalAlpha=0.5;
      // Flip animation update
      if(sp._onRope){sp.flipping=false;sp.flipAngle=0;}
      else if(sp.flipping&&!sp.onGround){sp.flipAngle=(sp.flipAngle||0)+0.2*(sp.flipDir||1);}
      if(sp.onGround&&sp.flipping){sp.flipping=false;sp.flipAngle=0;}
      const sq=sp.squash>0;
      const stNeedsTx=sq||sp.flipping;
      if(stNeedsTx){ctx.save();ctx.translate(px+PW/2,sp.y+PH/2);if(sp.flipping)ctx.rotate(sp.flipAngle);if(sq)ctx.scale(1.2,0.85);ctx.translate(-(px+PW/2),-(sp.y+PH/2));}
      drawPerson(ctx,px,sp.y,PW,PH,sp.color,sp.facing,sp.flash,fr,sp.ammo,sp.reloading,rp,false,GG_WEAPONS[sp.weapon].name);
      if(stNeedsTx)ctx.restore();
      ctx.globalAlpha=1;
      if(sp.muzzleFlash>0){ctx.fillStyle="rgba(255,255,200,0.8)";ctx.beginPath();ctx.arc(px+PW/2+sp.facing*23,sp.y+4,6,0,Math.PI*2);ctx.fill();ctx.fillStyle="rgba(255,255,255,0.5)";ctx.beginPath();ctx.arc(px+PW/2+sp.facing*23,sp.y+4,3,0,Math.PI*2);ctx.fill();}
    });

    // Ragdolls
    ss.ragdolls.forEach(r=>{ctx.globalAlpha=r.life/20;ctx.fillStyle=r.color;ctx.fillRect(r.x-cam-2,r.y-2,r.w,r.h);ctx.globalAlpha=1;});

    // Casings
    ss.particles.forEach(pt=>{if(pt.casing){ctx.fillStyle="#ccaa44";ctx.fillRect(pt.x-cam,pt.y,3,2);}});

    // Particles
    ss.particles.forEach(pt=>{if(pt.casing)return;ctx.globalAlpha=pt.life/25;ctx.fillStyle=pt.color;ctx.fillRect(pt.x-cam-2,pt.y-2,4,4);});
    ctx.globalAlpha=1;

    // Damage numbers
    ss.dmgNums.forEach(d=>{ctx.globalAlpha=d.life/48;ctx.font="bold 14px monospace";ctx.fillStyle=d.color;ctx.textAlign="center";ctx.fillText(d.text,d.x-cam,d.y);});
    ctx.globalAlpha=1;

    // HUD (fixed, not affected by camera)
    ctx.font="bold 14px monospace";ctx.textAlign="left";
    // Lives
    ctx.fillStyle="#ff4466";
    for(let i=0;i<ss.lives;i++)ctx.fillText("\u2764",12+i*18,22);
    // HP bars for all players
    ss.players.forEach((sp,si)=>{
      const hpY=28+si*12;
      ctx.fillStyle=sp.color;ctx.font="bold 9px monospace";ctx.textAlign="left";
      ctx.fillText("P"+(si+1),12,hpY+7);
      ctx.fillStyle="rgba(0,0,0,0.4)";ctx.fillRect(30,hpY,70,8);
      if(!sp.dead){ctx.fillStyle=sp.hp/sp.maxHp>0.3?"#44ff66":"#ff4444";ctx.fillRect(30,hpY,70*Math.max(0,sp.hp/sp.maxHp),8);}
      else{ctx.font="7px monospace";ctx.fillStyle="#888";ctx.fillText("DEAD",35,hpY+7);}
      // Grenade count
      if(!sp.dead){ctx.font="8px monospace";ctx.fillStyle="#557733";ctx.textAlign="left";ctx.fillText("\u{1F4A3}"+sp.grenadeAmmo,105,hpY+7);}
      // Weapon name + ammo count
      if(!sp.dead){
        const wpDef=GG_WEAPONS[sp.weapon],maxA=wpDef.ammo,ratio=sp.ammo/maxA;
        const ammoCol=sp.reloading?"#888":(ratio>=1?"#ffcc00":(ratio<0.25?"#ff4444":"#fff"));
        ctx.font="bold 8px monospace";ctx.fillStyle=wpDef.color||"#fff";ctx.textAlign="left";
        ctx.fillText(wpDef.name,130,hpY+7);
        ctx.fillStyle=ammoCol;
        ctx.fillText(sp.reloading?"...":(sp.ammo+"/"+maxA),130+wpDef.name.length*5+6,hpY+7);
      }
    });
    ctx.font="bold 14px monospace";
    // Coins
    ctx.textAlign="right";ctx.fillStyle="#ffcc00";ctx.fillText("\u{1F4B0} "+ss.coins,W-12,22);
    // Enemies left
    const enemiesLeft=ss.enemies.filter(e=>!e.dead).length;
    ctx.font="bold 11px monospace";ctx.textAlign="right";
    if(enemiesLeft===0){ctx.fillStyle=Math.floor(frame/8)%2===0?"#44dd66":"#aaffcc";ctx.fillText("STAGE CLEAR!",W-12,38);}
    else{ctx.fillStyle="#fff";ctx.fillText("ENEMIES LEFT: "+enemiesLeft,W-12,38);}
    // Stage
    ctx.textAlign="center";ctx.fillStyle="#fff";ctx.font="bold 12px monospace";
    let zoneName=sd.name;
    if(sd.zones){const cc=ss.cameraX+W/2;for(const z of ZONE_BGS){if(cc>=z.startX&&cc<z.endX){zoneName=z.name;break;}}}
    ctx.fillText("STAGE "+ss.stage+" \u2014 "+zoneName,W/2,18);
    // Loadout HUD — bottom of screen per player
    ss.players.forEach((sp,si)=>{
      const np2=ss.numPlayers;
      const startX=np2===1?10:np2===2?(si===0?10:W-200):si===0?10:si===1?W/2-60:W-200;
      const owned=ss.playerOwnedWeapons[si];
      // Show "OUT" for dead players
      if(sp.dead){ctx.font="bold 8px monospace";ctx.fillStyle="#555";ctx.textAlign="left";ctx.fillText("P"+(si+1)+" OUT",startX,H-16);return;}
      if(sp.downed){ctx.font="bold 8px monospace";ctx.fillStyle="#ff4444";ctx.textAlign="left";ctx.fillText("P"+(si+1)+" DOWN",startX,H-16);return;}

      // Draw weapon slots
      owned.forEach((wpnIdx,wi)=>{
        const ggw=GG_WEAPONS[wpnIdx];
        const slotX=startX+wi*50;
        const slotY=H-28;
        const selected=sp.weapon===wpnIdx;
        // Box
        ctx.fillStyle=selected?"rgba(255,255,255,0.12)":"rgba(255,255,255,0.04)";
        ctx.fillRect(slotX-2,slotY-2,46,24);
        if(selected){ctx.strokeStyle=sp.color;ctx.lineWidth=2;ctx.strokeRect(slotX-2,slotY-2,46,24);}
        else{ctx.strokeStyle="rgba(255,255,255,0.1)";ctx.lineWidth=1;ctx.strokeRect(slotX-2,slotY-2,46,24);}
        // Weapon name
        ctx.font="bold 7px monospace";ctx.fillStyle=selected?"#fff":ggw.color||"#888";ctx.textAlign="center";
        ctx.fillText(ggw.name,slotX+22,slotY+8);
        // Ammo count (only for selected weapon, color-coded)
        if(selected){
          ctx.font="7px monospace";
          const ratio=sp.ammo/ggw.ammo;
          ctx.fillStyle=sp.reloading?"#888":(ratio>=1?"#ffcc00":(ratio<0.25?"#ff4444":"#fff"));
          ctx.fillText(sp.reloading?"RELOADING":(sp.ammo+"/"+ggw.ammo),slotX+22,slotY+17);
        }
      });
      // Grenade count
      const grenX=startX+owned.length*50+5;
      ctx.fillStyle="rgba(255,255,255,0.04)";ctx.fillRect(grenX,H-30,36,24);
      ctx.strokeStyle="rgba(255,255,255,0.1)";ctx.lineWidth=1;ctx.strokeRect(grenX,H-30,36,24);
      ctx.font="7px monospace";ctx.fillStyle="#557733";ctx.textAlign="center";
      ctx.fillText("\u{1F4A3}"+sp.grenadeAmmo,grenX+18,H-14);
    });

    // Mission briefing overlay
    if(ss.briefing){
      const bElapsed=Date.now()-ss.briefingStart;
      const bAlpha=bElapsed<300?bElapsed/300:bElapsed>1700?1-(bElapsed-1700)/300:1;
      ctx.fillStyle=`rgba(0,0,0,${0.75*bAlpha})`;ctx.fillRect(0,0,W,H);
      ctx.globalAlpha=bAlpha;ctx.textAlign="center";
      ctx.font="bold 12px monospace";ctx.fillStyle="#ff4466";
      ctx.fillText("MISSION BRIEFING",W/2,H/2-50);
      ctx.font="bold 28px monospace";ctx.fillStyle="#fff";
      ctx.fillText("STAGE "+ss.stage,W/2,H/2-20);
      ctx.font="bold 18px monospace";ctx.fillStyle="#ff4466";
      ctx.fillText(sd.name,W/2,H/2+10);
      const descs=["Clear the landing zone and infiltrate the alien base","Defeat the Mega Grunt","Fight through the alien hive","Destroy the Hive Queen"];
      ctx.font="11px monospace";ctx.fillStyle="#888";
      ctx.fillText(descs[ss.stage-1]||"",W/2,H/2+35);
      ctx.fillStyle="rgba(255,68,102,0.4)";ctx.fillRect(W/2-120,H/2-58,240,2);ctx.fillRect(W/2-120,H/2+45,240,2);
      ctx.globalAlpha=1;
    }

    // Countdown
    if(!ss.countdownDone&&!ss.briefing){
      ctx.fillStyle="rgba(0,0,0,0.3)";ctx.fillRect(0,0,W,H);
      ctx.textAlign="center";
      if(ss.countdown>0){ctx.font="bold 64px monospace";ctx.fillStyle="#fff";ctx.fillText(ss.countdown,W/2,H/2+10);}
      else{ctx.font="bold 64px monospace";ctx.fillStyle="#ff4466";ctx.fillText("FIGHT!",W/2,H/2+10);}
      ctx.font="12px monospace";ctx.fillStyle="#666";ctx.fillText(sd.name,W/2,H/2+40);
    }

    // Pause overlay (story mode)
    if(paused){
      ctx.fillStyle="rgba(0,0,0,0.65)";ctx.fillRect(0,0,W,H);
      ctx.font="bold 48px monospace";ctx.fillStyle="#fff";ctx.textAlign="center";
      ctx.fillText("PAUSED",W/2,H/2-70);
      // Stats
      ctx.font="12px monospace";ctx.fillStyle="#aaa";
      ctx.fillText("STAGE "+ss.stage+" \u2014 "+sd.name,W/2,H/2-45);
      ctx.fillText("\u2764 "+ss.lives+" lives  |  \u{1F4B0} "+ss.coins+" coins",W/2,H/2-28);
      // Per-player stats
      ss.players.forEach((sp,si)=>{
        const wpnName=GG_WEAPONS[sp.weapon]?.name||"PISTOL";
        const hpTxt=sp.dead?"DEAD":Math.round(sp.hp)+"/"+sp.maxHp;
        ctx.fillStyle=sp.color;ctx.font="bold 11px monospace";
        ctx.fillText("P"+(si+1)+": "+wpnName+"  HP:"+hpTxt,W/2,H/2-8+si*16);
      });
      // Cards
      const allCards=ss.playerCards[0]||[];
      if(allCards.length>0){
        ctx.font="14px serif";ctx.fillStyle="#fff";
        ctx.fillText(allCards.map(c=>CARDS.find(cd=>cd.id===c)?.icon||"").join(" "),W/2,H/2+30+ss.numPlayers*10);
      }
      // Buttons
      const btnW=180,btnH=32,btnGap=10,startY=H/2+45+ss.numPlayers*10;
      ["RESUME","QUIT TO TITLE"].forEach((opt,i)=>{
        const by=startY+i*(btnH+btnGap);
        const sel=i===pauseSel;
        ctx.fillStyle=sel?"rgba(255,68,102,0.2)":"rgba(255,255,255,0.05)";
        ctx.fillRect(W/2-btnW/2,by,btnW,btnH);
        ctx.strokeStyle=sel?"#ff4466":"#555";ctx.lineWidth=2;ctx.strokeRect(W/2-btnW/2,by,btnW,btnH);
        ctx.font=sel?"bold 16px monospace":"14px monospace";ctx.fillStyle=sel?"#ff4466":"#888";
        ctx.fillText(opt,W/2,by+btnH/2+5);
      });
      ctx.font="10px monospace";ctx.fillStyle="#555";
      ctx.fillText("\u2191\u2193 select  |  A / Enter confirm",W/2,startY+2*(btnH+btnGap)+10);
    }

    ctx.restore();
  }

  function storyLoop(){try{storyUpdate();}catch(e){console.error("storyUpdate error:",e);}try{storyDraw();}catch(e){console.error("storyDraw error:",e);}storyAnimId=requestAnimationFrame(storyLoop);}
  storyAnimId=requestAnimationFrame(storyLoop);
}

// Shop screen
let shopCardPool=[];
function renderShop(){
  const ss=storyState;
  if(shopCardPool.length===0)shopCardPool=shufflePick(4);
  const weapons=GG_WEAPONS.slice(0,5);
  const wpnCosts=[0,50,80,120,200];
  // Weapons section
  let whtml=weapons.map((w,i)=>{
    const owned=ss.playerOwnedWeapons[0].includes(i)||(ss.numPlayers>1&&ss.playerOwnedWeapons[1].includes(i));
    const cost=wpnCosts[i];const canBuy=!owned&&ss.coins>=cost;
    return `<div style="display:inline-block;background:rgba(255,255,255,0.05);border:2px solid ${owned?"#44cc44":canBuy?"#ffcc00":"#333"};border-radius:6px;padding:10px;margin:4px;width:90px;text-align:center;cursor:${canBuy||owned?"pointer":"default"};font-family:monospace;color:#fff;vertical-align:top;"
      onclick="${owned?"":canBuy?`buyWeapon(${i},${cost})`:""}" >
      <div style="font-size:12px;font-weight:bold;color:${w.color||"#bbb"}">${w.name}</div>
      <div style="font-size:10px;color:${owned?"#44cc44":"#888"};margin-top:4px">${owned?"OWNED":"\u{1F4B0}"+cost}</div>
    </div>`;
  }).join("");
  // Consumables
  const healCost=20;const canHeal=ss.coins>=healCost&&ss.player&&ss.player.hp<ss.player.maxHp;
  let consumeHtml=`<div style="display:inline-block;background:rgba(255,255,255,0.05);border:2px solid ${canHeal?"#ff4466":"#333"};border-radius:6px;padding:10px;margin:4px;width:100px;text-align:center;cursor:${canHeal?"pointer":"default"};font-family:monospace;color:#fff;"
    onclick="${canHeal?"shopHeal()":""}">
    <div style="font-size:20px">\u2764\uFE0F</div>
    <div style="font-size:11px;font-weight:bold;color:#ff4466;margin-top:4px">FULL HEAL</div>
    <div style="font-size:9px;color:#888">Restore to full HP</div>
    <div style="font-size:10px;color:#ffcc00;margin-top:4px">\u{1F4B0}${healCost}</div>
  </div>`;
  // Cards section
  let chtml=shopCardPool.map((c,i)=>{
    const canBuy=ss.coins>=60;
    return `<div style="display:inline-block;background:rgba(255,255,255,0.05);border:2px solid ${canBuy?c.color:"#333"};border-radius:6px;padding:10px;margin:4px;width:90px;text-align:center;cursor:${canBuy?"pointer":"default"};font-family:monospace;color:#fff;vertical-align:top;"
      onclick="${canBuy?`buyCard('${c.id}',${i})`:""}" >
      <div style="font-size:18px">${c.icon}</div>
      <div style="font-size:10px;font-weight:bold;color:${c.color};margin-top:3px">${c.name}</div>
      <div style="font-size:8px;color:#888">${c.desc}</div>
      <div style="font-size:10px;color:#ffcc00;margin-top:3px">\u{1F4B0}60</div>
    </div>`;
  }).join("");
  const canReroll=ss.coins>=10;
  chtml+=`<div style="display:inline-block;margin:4px;vertical-align:top;">
    <button style="background:${canReroll?"rgba(255,255,255,0.1)":"rgba(255,255,255,0.03)"};border:2px solid ${canReroll?"#aaa":"#333"};border-radius:6px;padding:8px 12px;color:${canReroll?"#fff":"#555"};font-family:monospace;font-size:10px;cursor:${canReroll?"pointer":"default"}"
      onclick="${canReroll?"shopReroll()":""}">REROLL (\u{1F4B0}10)</button>
  </div>`;
  const hpText=ss.players.map((p,i)=>`P${i+1}:${Math.round(p.hp)}/${p.maxHp}`).join(" ");
  document.getElementById("gameover-screen").innerHTML=`
    <div style="font-size:min(5vw,32px);font-weight:bold;color:#ffcc00;letter-spacing:4px;z-index:1">ARMORY</div>
    <div style="font-size:11px;color:#888;margin-top:4px;z-index:1">\u{1F4B0} ${ss.coins} &nbsp;|&nbsp; \u2764 ${ss.lives} lives &nbsp;|&nbsp; ${ss.players.map((p,i)=>"P"+(i+1)+":"+GG_WEAPONS[ss.playerWeapons[i]].name).join(" | ")} &nbsp;|&nbsp; ${hpText}</div>
    <div style="margin-top:12px;font-size:11px;color:#666;letter-spacing:2px;z-index:1">WEAPONS</div>
    <div style="margin-top:4px;z-index:1">${whtml}</div>
    <div style="margin-top:10px;font-size:11px;color:#666;letter-spacing:2px;z-index:1">CONSUMABLES</div>
    <div style="margin-top:4px;z-index:1">${consumeHtml}</div>
    <div style="margin-top:10px;font-size:11px;color:#666;letter-spacing:2px;z-index:1">CARDS (\u{1F4B0}60 each)</div>
    <div style="margin-top:4px;z-index:1">${chtml}</div>
    <div style="margin-top:4px;z-index:1"><span style="font-size:9px;color:#555">Owned: ${ss.playerCards[0].map(c=>CARDS.find(x=>x.id===c)?.icon||"").join(" ")||"none"}</span></div>
    <button class="btn" onclick="continueStory()" style="margin-top:12px;padding:10px 36px;">CONTINUE \u25B6</button>
    <div class="hint" style="margin-top:4px">Stage ${ss.stage+1} \u2014 ${STORY_STAGES[ss.stage]?.name||"?"}</div>
  `;
}
window.buyWeapon=function(idx,cost){
  const ss=storyState;
  // Check if any player already owns it
  const anyOwns=ss.playerOwnedWeapons.some(ow=>ow.includes(idx));
  if(ss.coins>=cost&&!anyOwns){
    ss.coins-=cost;
    // Give to all players
    for(let i=0;i<ss.numPlayers;i++){
      ss.playerOwnedWeapons[i].push(idx);
      ss.playerWeapons[i]=idx;
      if(ss.players[i])ss.players[i].weapon=idx;
    }
    SND.cardPick();renderShop();
  }
};
window.buyCard=function(id,slotIdx){
  const ss=storyState;
  if(ss.coins>=60){
    ss.coins-=60;
    // Give card to all players
    for(let i=0;i<ss.numPlayers;i++)ss.playerCards[i].push(id);
    SND.cardPick();renderShop();
  }
};
window.shopHeal=function(){
  const ss=storyState;
  // Heal all players
  let healed=false;
  ss.players.forEach(p=>{if(p&&p.hp<p.maxHp){p.hp=p.maxHp;healed=true;}});
  if(ss.coins>=20&&healed){ss.coins-=20;SND.pickup();renderShop();}
};
window.shopReroll=function(){
  if(storyState.coins>=10){storyState.coins-=10;shopCardPool=shufflePick(4);SND.menuNav();renderShop();}
};
function continueStory(){
  showScreen("fight");
  loadStoryStage(storyState.stage+1);
  startStoryLoop();
}

function renderStoryGameOver(){
  document.getElementById("gameover-screen").innerHTML=`
    <div class="winner-text" style="font-size:min(10vw,52px);color:#ff4444;text-shadow:0 0 40px #ff444466">GAME OVER</div>
    <div style="font-size:14px;color:#888;margin-top:8px">Stage ${storyState.stage} \u2014 ${STORY_STAGES[storyState.stage-1].name}</div>
    <div style="font-size:12px;color:#555;margin-top:4px">Enemies killed: ${storyState.enemiesKilled} | Coins: ${storyState.totalCoins}</div>
    <button class="btn" onclick="startStory()" style="margin-top:24px">RETRY</button>
    <button class="btn btn-w" onclick="goTitle()" style="margin-top:12px">TITLE SCREEN</button>
  `;
}

function renderStoryVictory(){
  document.getElementById("gameover-screen").innerHTML=`
    <div class="winner-text" style="font-size:min(10vw,52px);color:#44ffaa;text-shadow:0 0 40px #44ffaa66">VICTORY</div>
    <div style="font-size:16px;color:#fff;margin-top:8px">THE ALIENS ARE DEFEATED</div>
    <div style="font-size:12px;color:#888;margin-top:12px">
      Stages: 4/4 | Enemies: ${storyState.enemiesKilled} | Coins: ${storyState.totalCoins}<br>
      Weapons: ${storyState.playerOwnedWeapons[0].map(w=>GG_WEAPONS[w].name).join(", ")}<br>
      Cards: ${storyState.playerCards[0].map(c=>CARDS.find(x=>x.id===c)?.icon||"").join(" ")||"none"}
    </div>
    <button class="btn" onclick="startStory()" style="margin-top:24px">PLAY AGAIN</button>
    <button class="btn btn-w" onclick="goTitle()" style="margin-top:12px">TITLE SCREEN</button>
  `;
  SND.victory();
}

// ============ MISSION BOARD MENU ============
let mbState={mode:0,sub:null,subSel:0,splashDone:false,frame:0,flash1:0,flash2:20};
const MB_MODES=[
  {name:"CAMPAIGN",desc:"Save the world",players:"1-3 players",stars:3,type:"story"},
  {name:"VERSUS",desc:"Card battles",players:"2-4 players",stars:2,type:"classic"},
  {name:"GUN GAME",desc:"Weapon racing",players:"2-4 players",stars:4,type:"gungame"}
];
const MB_SUBS={
  story:["1 PLAYER","2 PLAYER CO-OP","3 PLAYER CO-OP"],
  classic:["2P FFA","3P FFA","4P FFA","2v2 TEAMS"],
  gungame:["2P","3P","4P"]
};
let mbAnimId=null;


function startMissionBoard(){
  frame=0;prevPad[0]={};prevPad[1]={};prevPad[2]={};prevPad[3]={};
  if(mbAnimId)cancelAnimationFrame(mbAnimId);
  if(animId){cancelAnimationFrame(animId);animId=null;}
  if(menuAnimId){cancelAnimationFrame(menuAnimId);menuAnimId=null;}
  if(storyAnimId){cancelAnimationFrame(storyAnimId);storyAnimId=null;}
  MUSIC.stop();
  // Show canvas, hide UI
  ui.classList.add("hidden");
  gameWrap.style.display="flex";
  screen="missionboard";
  mbState={mode:0,sub:null,subSel:0,splashDone:false,frame:0,flash1:0,flash2:25};

  function mbUpdate(){
    mbState.frame++;
    // Muzzle flash timers
    mbState.flash1--;mbState.flash2--;
    if(mbState.flash1<-40-Math.random()*30)mbState.flash1=3;
    if(mbState.flash2<-50-Math.random()*20)mbState.flash2=3;

    // Splash phase — press any button
    if(!mbState.splashDone){
      let anyKey=false;
      for(const kk in keys){if(keys[kk])anyKey=true;}
      const gp=readPad(0);
      if(anyKey||(gp&&(gp.a||gp.start||gp.b||gp.x))){
        mbState.splashDone=true;
        // Clear all keys to prevent carry-over
        for(const kk in keys)keys[kk]=false;
      }
      prevPad[0]=readPad(0)||{};
      return;
    }

    // Input
    const gp=readPad(0);
    if(mbState.sub===null){
      // Main mode selection
      if(keys.arrowup||keys.w){mbState.mode=(mbState.mode+2)%3;SND.menuNav();keys.arrowup=false;keys.w=false;}
      if(keys.arrowdown||keys.s){mbState.mode=(mbState.mode+1)%3;SND.menuNav();keys.arrowdown=false;keys.s=false;}
      if(gp){
        const pp=prevPad[0]||{};
        if((gp.dU&&!pp.dU)||(gp.ly<-0.5&&!(pp.ly<-0.5))){mbState.mode=(mbState.mode+2)%3;SND.menuNav();}
        if((gp.dD&&!pp.dD)||(gp.ly>0.5&&!(pp.ly>0.5))){mbState.mode=(mbState.mode+1)%3;SND.menuNav();}
        if(gp.a&&!pp.a){mbState.sub=MB_MODES[mbState.mode].type;mbState.subSel=0;SND.menuSelect();}
        if(gp.x&&!pp.x){showScreen("controls");renderControls();startMenuPoll();return;}
      }
      if(keys.enter||keys[" "]){mbState.sub=MB_MODES[mbState.mode].type;mbState.subSel=0;SND.menuSelect();keys.enter=false;keys[" "]=false;}
      if(keys.h){showScreen("controls");renderControls();startMenuPoll();keys.h=false;return;}
    }else{
      // Sub-panel selection
      const opts=MB_SUBS[mbState.sub];
      if(keys.arrowup||keys.w){mbState.subSel=(mbState.subSel+opts.length-1)%opts.length;SND.menuNav();keys.arrowup=false;keys.w=false;}
      if(keys.arrowdown||keys.s){mbState.subSel=(mbState.subSel+1)%opts.length;SND.menuNav();keys.arrowdown=false;keys.s=false;}
      if(keys.escape||keys.backspace){mbState.sub=null;SND.menuNav();keys.escape=false;keys.backspace=false;}
      if(gp){
        const pp=prevPad[0]||{};
        if((gp.dU&&!pp.dU)||(gp.ly<-0.5&&!(pp.ly<-0.5))){mbState.subSel=(mbState.subSel+opts.length-1)%opts.length;SND.menuNav();}
        if((gp.dD&&!pp.dD)||(gp.ly>0.5&&!(pp.ly>0.5))){mbState.subSel=(mbState.subSel+1)%opts.length;SND.menuNav();}
        if(gp.b&&!pp.b){mbState.sub=null;SND.menuNav();}
        if(gp.a&&!pp.a){launchMode();return;}
      }
      if(keys.enter||keys[" "]){launchMode();keys.enter=false;keys[" "]=false;return;}
    }
    prevPad[0]=readPad(0)||{};
  }

  function launchMode(){
    SND.menuSelect();
    const t=mbState.sub,sel=mbState.subSel;
    if(t==="story"){storyPlayers=sel+1;gameType="story";startMatch();}
    else if(t==="classic"){
      gameType="classic";
      if(sel===0){gameMode="2p";}else if(sel===1){gameMode="3p";}else if(sel===2){gameMode="4p-ffa";}else{gameMode="4p-2v2";}
      startMatch();
    }else if(t==="gungame"){
      gameType="gungame";
      if(sel===0){gameMode="2p";}else if(sel===1){gameMode="3p";}else{gameMode="4p-ffa";}
      startMatch();
    }
  }

  function mbDraw(){
    const f=mbState.frame;
    ctx.fillStyle="#0a0a1a";ctx.fillRect(0,0,W,H);

    // Scanlines
    for(let sy=0;sy<H;sy+=2){ctx.fillStyle="rgba(255,255,255,0.008)";ctx.fillRect(0,sy,W,1);}

    // Stars/sparks in background
    for(let i=0;i<15;i++){
      const sx=(i*53+f*0.1)%W,ssy=(i*37)%120+10;
      ctx.fillStyle=`rgba(255,255,255,${0.1+Math.sin(f*0.02+i)*0.08})`;ctx.fillRect(sx,ssy,1,1);
    }

    // Ground rubble silhouette
    ctx.fillStyle="#151520";
    ctx.beginPath();ctx.moveTo(0,H);ctx.lineTo(0,H-15);
    for(let rx=0;rx<W;rx+=20){ctx.lineTo(rx,H-10-Math.random()*8);}
    ctx.lineTo(W,H);ctx.closePath();ctx.fill();

    // Smoke particles
    for(let i=0;i<5;i++){
      const sx=(i*160+f*0.3)%W,ssy=H-30-((f*0.5+i*80)%150);
      ctx.fillStyle=`rgba(100,100,120,${0.03+Math.sin(f*0.01+i)*0.01})`;
      ctx.beginPath();ctx.arc(sx,ssy,8+i*3,0,Math.PI*2);ctx.fill();
    }

    // Draw commandos
    // Commandos flanking the mission board (using drawPerson for consistency)
    const boardLeft=W/2-160,boardRight=W/2+160;
    if(mbState.splashDone){
      drawPerson(ctx,boardLeft-45,250,PW,PH,PCOLORS[0],1,0,0,0,false,0,false,"PISTOL");
      drawPerson(ctx,boardRight+25,250,PW,PH,PCOLORS[1],-1,0,0,0,false,0,false,"PISTOL");
      // Muzzle flashes
      if(mbState.flash1>0){ctx.fillStyle="rgba(255,255,200,0.9)";ctx.beginPath();ctx.arc(boardLeft-45+PW/2+28,265,7,0,Math.PI*2);ctx.fill();ctx.fillStyle="rgba(255,255,255,0.5)";ctx.beginPath();ctx.arc(boardLeft-45+PW/2+28,265,3,0,Math.PI*2);ctx.fill();}
      if(mbState.flash2>0){ctx.fillStyle="rgba(255,255,200,0.9)";ctx.beginPath();ctx.arc(boardRight+25+PW/2-28,265,7,0,Math.PI*2);ctx.fill();ctx.fillStyle="rgba(255,255,255,0.5)";ctx.beginPath();ctx.arc(boardRight+25+PW/2-28,265,3,0,Math.PI*2);ctx.fill();}
    }else{
      drawPerson(ctx,W/2-130,H-80,PW,PH,PCOLORS[0],1,0,0,0,false,0,false,"PISTOL");
