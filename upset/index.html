      drawPerson(ctx,W/2+110,H-80,PW,PH,PCOLORS[1],-1,0,0,0,false,0,false,"PISTOL");
      if(mbState.flash1>0){ctx.fillStyle="rgba(255,255,200,0.9)";ctx.beginPath();ctx.arc(W/2-130+PW/2+28,H-65,8,0,Math.PI*2);ctx.fill();}
      if(mbState.flash2>0){ctx.fillStyle="rgba(255,255,200,0.9)";ctx.beginPath();ctx.arc(W/2+110+PW/2-28,H-65,8,0,Math.PI*2);ctx.fill();}
    }

    // Splash screen phase
    if(!mbState.splashDone){
      ctx.font="bold 72px monospace";ctx.fillStyle="#ff4466";ctx.textAlign="center";
      ctx.shadowColor="rgba(255,68,102,0.5)";ctx.shadowBlur=30;
      ctx.fillText("UPSET",W/2,H/2-40);
      ctx.shadowBlur=0;
      ctx.font="14px monospace";
      ctx.fillStyle=Math.sin(f*0.08)>0?"#888":"#444";
      ctx.fillText("PRESS ANY BUTTON TO START",W/2,H/2+10);
      ctx.fillStyle="#333";ctx.font="10px monospace";
      return;
    }

    // Mission Board
    const bw=320,bh=280,bx=W/2-bw/2,by=60;

    // Board background
    ctx.fillStyle="rgba(14,14,26,0.95)";ctx.fillRect(bx,by,bw,bh);
    // Board border
    ctx.strokeStyle="#ff4466";ctx.lineWidth=3;ctx.strokeRect(bx,by,bw,bh);
    // Corner rivets
    const rivet=(rx,ry)=>{ctx.fillStyle="#ff4466";ctx.fillRect(rx-3,ry-3,6,6);ctx.fillStyle="#cc3355";ctx.fillRect(rx-1,ry-1,2,2);};
    rivet(bx,by);rivet(bx+bw,by);rivet(bx,by+bh);rivet(bx+bw,by+bh);

    // Header bar
    ctx.fillStyle="#ff4466";ctx.fillRect(bx,by,bw,24);
    ctx.font="bold 13px monospace";ctx.fillStyle="#fff";ctx.textAlign="center";
    ctx.fillText("UPSET \u2014 MISSION BOARD",W/2,by+16);

    // Mode list or sub-panel
    if(mbState.sub===null){
      // Main mode list
      MB_MODES.forEach((m,i)=>{
        const my=by+40+i*75;
        const sel=i===mbState.mode;
        // Selected glow
        if(sel){
          const glowA=0.06+Math.sin(f*0.06)*0.03;
          ctx.fillStyle=`rgba(255,68,102,${glowA})`;ctx.fillRect(bx+4,my-4,bw-8,68);
        }
        // Arrow cursor
        if(sel){
          ctx.fillStyle=Math.sin(f*0.1)>0?"#ff4466":"#cc2244";
          ctx.font="16px monospace";ctx.textAlign="left";ctx.fillText("\u25B8",bx+12,my+20);
        }
        // Mode name
        ctx.font="bold 18px monospace";ctx.fillStyle=sel?"#fff":"#888";ctx.textAlign="left";
        ctx.fillText(m.name,bx+32,my+20);
        // Stars
        ctx.font="14px serif";ctx.textAlign="right";
        let starStr="";for(let s=0;s<4;s++)starStr+=s<m.stars?"\u2605":"\u2606";
        ctx.fillStyle=sel?"#ff4466":"#555";ctx.fillText(starStr,bx+bw-14,my+20);
        // Description
        ctx.font="11px monospace";ctx.fillStyle=sel?"#aaa":"#555";ctx.textAlign="left";
        ctx.fillText(m.desc,bx+32,my+36);
        ctx.fillStyle=sel?"#666":"#444";ctx.fillText(m.players,bx+32,my+50);
        // Separator
        if(i<2){ctx.fillStyle="rgba(255,255,255,0.05)";ctx.fillRect(bx+20,my+63,bw-40,1);}
      });
    }else{
      // Sub-panel
      const opts=MB_SUBS[mbState.sub];
      const modeName=MB_MODES.find(m=>m.type===mbState.sub)?.name||"";
      ctx.font="bold 14px monospace";ctx.fillStyle="#ff4466";ctx.textAlign="center";
      ctx.fillText(modeName+" \u2014 SELECT",W/2,by+48);
      opts.forEach((opt,i)=>{
        const oy=by+70+i*36;
        const sel=i===mbState.subSel;
        if(sel){ctx.fillStyle="rgba(255,68,102,0.08)";ctx.fillRect(bx+10,oy-6,bw-20,30);}
        if(sel){ctx.fillStyle=Math.sin(f*0.1)>0?"#ff4466":"#cc2244";ctx.font="14px monospace";ctx.textAlign="left";ctx.fillText("\u25B8",bx+18,oy+12);}
        ctx.font=sel?"bold 15px monospace":"14px monospace";ctx.fillStyle=sel?"#fff":"#888";ctx.textAlign="center";
        ctx.fillText(opt,W/2,oy+12);
      });
      ctx.font="10px monospace";ctx.fillStyle="#555";ctx.textAlign="center";
      ctx.fillText("[B / Esc] back",W/2,by+bh-14);
    }

    // Footer
    ctx.fillStyle="rgba(255,255,255,0.05)";ctx.fillRect(bx,by+bh-24,bw,24);
    if(mbState.sub===null){
      ctx.font="9px monospace";ctx.fillStyle="#555";ctx.textAlign="center";
      ctx.fillText("[A/Enter] SELECT    [X/H] CONTROLS",W/2,by+bh-8);
    }

    // Controller status
    ctx.font="8px monospace";ctx.fillStyle=gpOn?"#44cc44":"#555";ctx.textAlign="center";
    ctx.fillText(gpOn?"\u{1F3AE} CONNECTED":"\u{1F3AE} NO CONTROLLERS",W/2,H-8);
  }

  function mbLoop(){mbUpdate();if(!mbAnimId)return;mbDraw();if(!mbAnimId)return;mbAnimId=requestAnimationFrame(mbLoop);}
  mbAnimId=requestAnimationFrame(mbLoop);
}

// Override goTitle to use mission board
// Init
startMissionBoard();
</script>
